<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Kelola Harga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #ddd; }
        h3 { margin-top: 0; color: #1e272e; border-bottom: 2px solid #72a339; padding-bottom: 8px; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-save { background: #5a822d; color: white; }
        
        .search-box { margin-bottom: 15px; padding: 10px; border: 2px solid #72a339; border-radius: 8px; width: 100%; box-sizing: border-box; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #1e272e; color: white; padding: 10px; text-align: left; font-size: 13px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .btn-del { background: #ff7675; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="card">
    <h3>Input / Update Harga</h3>
    <div class="form-row">
        <div class="form-group">
            <label>Agen</label>
            <select id="selAgen"><option value="">Pilih Agen</option></select>
        </div>
        <div class="form-group">
            <label>Barang</label>
            <select id="selBarang"><option value="">Pilih Barang</option></select>
        </div>
        <div class="form-group">
            <label>Satuan</label>
            <select id="selSatuan">
                <option value="Pcs">Pcs</option>
                <option value="Pack">Pack</option>
                <option value="Ball">Ball</option>
            </select>
        </div>
        <div class="form-group">
            <label>Harga Jual (Rp)</label>
            <input type="number" id="inpHarga" placeholder="0">
        </div>
    </div>
    <button class="btn btn-save" onclick="simpanHarga()">SIMPAN HARGA</button>
</div>

<div class="card">
    <h3>Daftar Harga (300+ Record)</h3>
    <input type="text" id="cariData" class="search-box" placeholder="Cari Nama Agen atau Barang..." onkeyup="filterTabel()">
    <div class="table-container">
        <table id="tabelHarga">
            <thead>
                <tr>
                    <th>Agen</th>
                    <th>Barang</th>
                    <th>Satuan</th>
                    <th>Harga</th>
                    <th>Opsi</th>
                </tr>
            </thead>
            <tbody id="bodyTabel"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    async function init() {
        // Ambil Data Agen untuk Dropdown
        const { data: agens } = await _sb.from('agen').select('nama_agen').order('nama_agen');
        agens.forEach(a => document.getElementById('selAgen').innerHTML += `<option value="${a.nama_agen}">${a.nama_agen}</option>`);

        // Ambil Data Barang untuk Dropdown
        const { data: barangs } = await _sb.from('barang').select('nama_barang').order('nama_barang');
        barangs.forEach(b => document.getElementById('selBarang').innerHTML += `<option value="${b.nama_barang}">${b.nama_barang}</option>`);

        muatDataHarga();
    }

    async function muatDataHarga() {
        const { data, error } = await _sb.from('harga').select('*').order('id', { ascending: false });
        const tbody = document.getElementById('bodyTabel');
        tbody.innerHTML = "";
        
        if (data) {
            data.forEach(h => {
                tbody.innerHTML += `
                    <tr>
                        <td>${h.nama_agen}</td>
                        <td>${h.nama_barang}</td>
                        <td>${h.satuan}</td>
                        <td style="font-weight:bold; color:#2e7d32">Rp ${h.harga_jual.toLocaleString('id-ID')}</td>
                        <td><button class="btn-del" onclick="hapusHarga(${h.id})">Hapus</button></td>
                    </tr>`;
            });
        }
    }

    async function simpanHarga() {
        const agen = document.getElementById('selAgen').value;
        const brg = document.getElementById('selBarang').value;
        const sat = document.getElementById('selSatuan').value;
        const hrg = document.getElementById('inpHarga').value;

        if(!agen || !brg || !hrg) return alert("Lengkapi data dulu!");

        const { error } = await _sb.from('harga').upsert({
            nama_agen: agen,
            nama_barang: brg,
            satuan: sat,
            harga_jual: hrg
        }, { onConflict: 'nama_agen,nama_barang,satuan' });

        if(error) alert("Gagal: " + error.message);
        else {
            alert("Harga berhasil disimpan!");
            muatDataHarga();
        }
    }

    async function hapusHarga(id) {
        if(confirm("Hapus harga ini?")) {
            await _sb.from('harga').delete().eq('id', id);
            muatDataHarga();
        }
    }

    function filterTabel() {
        const input = document.getElementById("cariData").value.toUpperCase();
        const tr = document.getElementById("bodyTabel").getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
            const tdAgen = tr[i].getElementsByTagName("td")[0];
            const tdBrg = tr[i].getElementsByTagName("td")[1];
            if (tdAgen || tdBrg) {
                const txtValue = (tdAgen.textContent || tdAgen.innerText) + (tdBrg.textContent || tdBrg.innerText);
                tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    init();
</script>
</body>
</html>
