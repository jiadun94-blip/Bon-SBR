<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Kelola Harga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0; padding: 0; 
            user-select: none;
        }

        /* Sticky Header */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #121212;
            padding: 15px 15px 10px 15px;
            border-bottom: 1px solid #333; 
        }
        
        .card { 
            background: #1e1e1e; 
            padding: 15px; border-radius: 10px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .header-section {
            background: #2d2d2d;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-size: 15px;
            letter-spacing: 1px;
            border: 1px solid #444;
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 6px; color: #bbb; letter-spacing: 0.5px; }
        
        select, input { 
            width: 100%; padding: 12px; border: 1px solid #444; 
            border-radius: 8px; background: #2d2d2d; color: #fff; box-sizing: border-box; 
            font-family: inherit; font-size: 15px; transition: border 0.3s;
        }
        select:focus, input:focus { border-color: #3498db; outline: none; }
        
        .btn-save { 
            background: #2980b9; color: white; border: none; padding: 14px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; 
            text-transform: uppercase; font-size: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 0 #1c5980; transition: all 0.1s; letter-spacing: 1px;
        }
        .btn-save:active { transform: translateY(4px); box-shadow: none; }

        .search-box { 
            padding: 12px; border: 1px solid #444; 
            border-radius: 8px; width: 100%; box-sizing: border-box; 
            background: #2d2d2d; color: white; font-family: inherit; font-size: 14px;
        }

        .content-body { padding: 15px; }
        
        .table-container { 
            width: 100%; overflow-x: auto; border-radius: 10px; 
            border: 1px solid #333; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; background: white; color: #1e293b; min-width: 650px;} 
        
        thead th { 
            background: #f8fafc; color: #475569; 
            padding: 15px 10px; font-size: 12px; text-transform: uppercase; 
            border-bottom: 2px solid #cbd5e1; text-align: left; letter-spacing: 0.5px;
        }
        thead th.center { text-align: center; }
        thead th.right { text-align: right; }
        
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        tr:hover { background: #f8fafc; }
        
        .text-bold { font-weight: bold; color: #0f172a; }
        .price-text { font-weight: bold; text-align: right; color: #16a085; font-size: 15px; }
        
        .badge-satuan { 
            background: #e2e8f0; color: #475569; 
            padding: 4px 8px; border-radius: 6px; 
            font-size: 11px; font-weight: bold; 
            display: inline-block; text-transform: uppercase;
        }
        
        /* Modifikasi Kolom Aksi agar Sejajar (Horizontal) */
        .action-cell { 
            display: flex; 
            gap: 6px; 
            justify-content: center; 
            align-items: center; 
        }
        
        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-action.edit:hover { background: #dbeafe; border-color: #93c5fd; }
        .btn-action.delete:hover { background: #fee2e2; border-color: #fca5a5; }

    </style>
</head>
<body>

<div class="sticky-header">
    <div class="card">
        <div class="header-section">TAMBAH / UPDATE HARGA</div>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>NAMA AGEN</label>
                <select id="selAgen"><option value="">Pilih Agen...</option></select>
            </div>
            <div class="form-group">
                <label>NAMA BARANG</label>
                <select id="selBarang"><option value="">Pilih Barang...</option></select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>SATUAN</label>
                <select id="selSatuan">
                    <option value="Pcs">Pcs</option>
                    <option value="Pack">Pack</option>
                    <option value="Ball">Ball</option>
                    <option value="Duz">Duz</option>
                    <option value="Karung">Karung</option>
                </select>
            </div>
            <div class="form-group">
                <label>HARGA JUAL (RP)</label>
                <input type="number" id="inpHarga" placeholder="0">
            </div>
        </div>
        <button class="btn-save" id="btnSimpan" onclick="simpanHarga()">SIMPAN DATA HARGA</button>
        
        <input type="text" id="cariData" class="search-box" placeholder="🔍 Cari Agen atau Barang..." onkeyup="filterTabel()">
    </div>
</div>

<div class="content-body">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="40" class="center">NO</th>
                    <th>NAMA AGEN</th>
                    <th>BARANG</th>
                    <th width="70" class="center">SATUAN</th>
                    <th width="120" class="right">HARGA JUAL</th>
                    <th width="110" class="center">AKSI</th>
                </tr>
            </thead>
            <tbody id="bodyTabel"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentData = []; 

    async function init() {
        const { data: agens } = await _sb.from('agen').select('nama_agen').order('nama_agen');
        agens?.forEach(a => document.getElementById('selAgen').innerHTML += `<option value="${a.nama_agen}">${a.nama_agen}</option>`);

        const { data: barangs } = await _sb.from('barang').select('nama_barang').order('nama_barang');
        barangs?.forEach(b => document.getElementById('selBarang').innerHTML += `<option value="${b.nama_barang}">${b.nama_barang}</option>`);

        muatDataHarga();
    }

    async function muatDataHarga() {
        const { data } = await _sb.from('harga').select('*').order('nama_agen', { ascending: true });
        const tbody = document.getElementById('bodyTabel');
        tbody.innerHTML = "";
        
        currentData = data || []; 
        
        currentData.forEach((h, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td align="center" style="color: #64748b;">${index + 1}</td>
                <td class="text-bold">${h.nama_agen}</td>
                <td>${h.nama_barang}</td>
                <td align="center"><span class="badge-satuan">${h.satuan}</span></td>
                <td class="price-text">Rp ${h.harga_jual.toLocaleString('id-ID')}</td>
                <td>
                    <div class="action-cell">
                        <button class="btn-action edit" onclick="handleEdit(${index})" title="Edit">✏️</button>
                        <button class="btn-action delete" onclick="handleDelete(${index})" title="Hapus">🗑️</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        filterTabel();
    }

    function handleEdit(index) {
        const targetData = currentData[index];
        document.getElementById('editId').value = targetData.id;
        document.getElementById('selAgen').value = targetData.nama_agen;
        document.getElementById('selBarang').value = targetData.nama_barang;
        document.getElementById('selSatuan').value = targetData.satuan;
        document.getElementById('inpHarga').value = targetData.harga_jual;
        
        const btn = document.getElementById('btnSimpan');
        btn.innerText = "UPDATE DATA HARGA";
        btn.style.background = "#e67e22";
        btn.style.boxShadow = "0 4px 0 #d35400";
        
        // Scroll dinonaktifkan agar posisi tabel tetap diam
    }

    async function handleDelete(index) {
        const targetData = currentData[index];
        if(confirm(`Hapus harga ${targetData.nama_barang} untuk agen ${targetData.nama_agen}?`)) {
            await _sb.from('harga').delete().eq('id', targetData.id);
            muatDataHarga();
        }
    }

    async function simpanHarga() {
        const id = document.getElementById('editId').value;
        const payload = { 
            nama_agen: document.getElementById('selAgen').value,
            nama_barang: document.getElementById('selBarang').value,
            satuan: document.getElementById('selSatuan').value,
            harga_jual: document.getElementById('inpHarga').value
        };
        if(!payload.nama_agen || !payload.nama_barang || !payload.harga_jual) return alert("Input belum lengkap!");

        if(id) payload.id = id;

        const btn = document.getElementById('btnSimpan');
        const oldText = btn.innerText;
        btn.innerText = "MENYIMPAN...";

        await _sb.from('harga').upsert(payload, { onConflict: 'nama_agen,nama_barang,satuan' });
        
        document.getElementById('editId').value = "";
        document.getElementById('inpHarga').value = "";
        btn.innerText = "SIMPAN DATA HARGA";
        btn.style.background = "#2980b9";
        btn.style.boxShadow = "0 4px 0 #1c5980";

        muatDataHarga();
    }

    function filterTabel() {
        const input = document.getElementById("cariData").value.toUpperCase();
        const tr = document.querySelectorAll("#bodyTabel tr");
        tr.forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
        });
    }

    init();
</script>
</body>
</html>
