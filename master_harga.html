<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Kelola Harga</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0; padding: 0; 
            user-select: none;
        }

        /* Modifikasi Sticky Header agar mencakup Search Bar */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #121212;
            padding: 15px 15px 10px 15px; /* Sedikit penyesuaian padding bawah */
            border-bottom: 1px solid #333; /* Pemisah visual yang jelas */
        }
        
        .card { 
            background: #1e1e1e; 
            padding: 15px; border-radius: 8px; 
            border: 1px solid #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .header-section {
            background: #2d2d2d;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-size: 13px;
            letter-spacing: 1px;
        }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #aaa; }
        
        select, input { 
            width: 100%; padding: 10px; border: 1px solid #444; 
            border-radius: 6px; background: #2d2d2d; color: #fff; box-sizing: border-box; 
            font-family: inherit; font-size: 14px;
        }
        
        .btn-save { 
            background: #34495e; color: white; border: none; padding: 12px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; 
            text-transform: uppercase; font-size: 13px; margin-bottom: 10px;
        }

        .search-box { 
            padding: 12px; border: 1px solid #444; 
            border-radius: 6px; width: 100%; box-sizing: border-box; 
            background: #2d2d2d; color: white; font-family: inherit;
        }

        .content-body {
            padding: 15px;
        }
        
        .table-container { 
            width: 100%; overflow-x: auto; border-radius: 6px; 
            border: 1px solid #333;
        }

        table { width: 100%; border-collapse: collapse; background: white; color: #000; min-width: 600px;} /* Min-width agar tabel tidak terlalu terjepit */
        
        thead th { 
            background: #e0e0e0; color: #000; 
            padding: 12px 8px; font-size: 11px; text-transform: uppercase; 
            border: 1px solid #ccc; text-align: center;
        }
        
        td { padding: 12px 8px; border: 1px solid #eee; font-size: 13px; color: #000; vertical-align: middle;}
        tr:nth-child(even) { background: #f2f2f2; }
        tr:nth-child(odd) { background: #ffffff; }
        
        .text-bold { font-weight: bold; }
        .price-text { font-weight: bold; text-align: right; color: #000; }
        
        /* Tombol Aksi di dalam tabel */
        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
            margin: 0 2px;
            border-radius: 4px;
        }
        .btn-action:hover { background: #e0e0e0; }

    </style>
</head>
<body>

<div class="sticky-header">
    <div class="card">
        <div class="header-section">TAMBAH / UPDATE HARGA</div>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>NAMA AGEN</label>
                <select id="selAgen"><option value="">Pilih Agen...</option></select>
            </div>
            <div class="form-group">
                <label>NAMA BARANG</label>
                <select id="selBarang"><option value="">Pilih Barang...</option></select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>SATUAN</label>
                <select id="selSatuan">
                    <option value="Pcs">Pcs</option>
                    <option value="Pack">Pack</option>
                    <option value="Ball">Ball</option>
                    <option value="Duz">Duz</option>
                    <option value="Karung">Karung</option>
                </select>
            </div>
            <div class="form-group">
                <label>HARGA JUAL (RP)</label>
                <input type="number" id="inpHarga" placeholder="0">
            </div>
        </div>
        <button class="btn-save" id="btnSimpan" onclick="simpanHarga()">SIMPAN DATA HARGA</button>
        
        <!-- Search Box dipindah ke dalam sticky header -->
        <input type="text" id="cariData" class="search-box" placeholder="Cari Agen atau Barang..." onkeyup="filterTabel()">
    </div>
</div>

<div class="content-body">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="30">NO</th>
                    <th>NAMA AGEN</th>
                    <th>BARANG</th>
                    <th width="40">SAT</th>
                    <th>HARGA JUAL</th>
                    <th width="70">AKSI</th> <!-- Tambahan Kolom Aksi -->
                </tr>
            </thead>
            <tbody id="bodyTabel"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    // Array global untuk menyimpan data sementara agar mudah diakses tombol aksi
    let currentData = []; 

    async function init() {
        const { data: agens } = await _sb.from('agen').select('nama_agen').order('nama_agen');
        agens?.forEach(a => document.getElementById('selAgen').innerHTML += `<option value="${a.nama_agen}">${a.nama_agen}</option>`);

        const { data: barangs } = await _sb.from('barang').select('nama_barang').order('nama_barang');
        barangs?.forEach(b => document.getElementById('selBarang').innerHTML += `<option value="${b.nama_barang}">${b.nama_barang}</option>`);

        muatDataHarga();
    }

    async function muatDataHarga() {
        const { data } = await _sb.from('harga').select('*').order('nama_agen', { ascending: true });
        const tbody = document.getElementById('bodyTabel');
        tbody.innerHTML = "";
        
        currentData = data || []; // Simpan ke global
        
        currentData.forEach((h, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td align="center">${index + 1}</td>
                <td class="text-bold">${h.nama_agen}</td>
                <td>${h.nama_barang}</td>
                <td align="center">${h.satuan}</td>
                <td class="price-text">${h.harga_jual.toLocaleString('id-ID')}</td>
                <td align="center">
                    <button class="btn-action" onclick="handleEdit(${index})" title="Edit">✏️</button>
                    <button class="btn-action" onclick="handleDelete(${index})" title="Hapus">🗑️</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        filterTabel();
    }

    function handleEdit(index) {
        const targetData = currentData[index];
        document.getElementById('editId').value = targetData.id;
        document.getElementById('selAgen').value = targetData.nama_agen;
        document.getElementById('selBarang').value = targetData.nama_barang;
        document.getElementById('selSatuan').value = targetData.satuan;
        document.getElementById('inpHarga').value = targetData.harga_jual;
        document.getElementById('btnSimpan').innerText = "UPDATE DATA HARGA";
        
        // Gulung kembali ke atas (form input)
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function handleDelete(index) {
        const targetData = currentData[index];
        if(confirm(`Hapus harga ${targetData.nama_barang} untuk agen ${targetData.nama_agen}?`)) {
            await _sb.from('harga').delete().eq('id', targetData.id);
            muatDataHarga();
        }
    }

    async function simpanHarga() {
        const id = document.getElementById('editId').value;
        const payload = { 
            nama_agen: document.getElementById('selAgen').value,
            nama_barang: document.getElementById('selBarang').value,
            satuan: document.getElementById('selSatuan').value,
            harga_jual: document.getElementById('inpHarga').value
        };
        if(!payload.nama_agen || !payload.nama_barang || !payload.harga_jual) return alert("Input belum lengkap!");

        if(id) payload.id = id;

        await _sb.from('harga').upsert(payload, { onConflict: 'nama_agen,nama_barang,satuan' });
        
        document.getElementById('editId').value = "";
        document.getElementById('inpHarga').value = "";
        document.getElementById('btnSimpan').innerText = "SIMPAN DATA HARGA";
        muatDataHarga();
    }

    function filterTabel() {
        const input = document.getElementById("cariData").value.toUpperCase();
        const tr = document.querySelectorAll("#bodyTabel tr");
        tr.forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
        });
    }

    init();
</script>
</body>
</html>
