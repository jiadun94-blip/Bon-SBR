<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR | Rekap Terpadu v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* TEMA CHARCOAL BASE - KHAS PAK HADIAT */
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background-color: #121212; 
            color: #eee; 
            margin: 0; padding: 10px;
        }

        .card { 
            background: #1e1e1e; 
            border-radius: 8px; 
            padding: 15px; 
            border: 1px solid #333; 
            margin-bottom: 20px; 
        }

        h2 { 
            margin: 0 0 15px; font-size: 16px; text-align: center; 
            background: #333; padding: 12px; border-radius: 6px; 
            color: #fff; text-transform: uppercase; 
        }

        /* FILTER SECTION GRID */
        .filter-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto auto; 
            gap: 8px; 
            align-items: end; 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px;
        }

        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 11px; margin-bottom: 4px; color: #aaa; }

        input[type="date"] { 
            background: #2d2d2d; border: 1px solid #444; 
            color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; 
        }

        .btn { 
            padding: 10px 15px; border-radius: 4px; 
            font-weight: bold; cursor: pointer; border: none; font-size: 12px;
        }
        .btn-tampilkan { background: #3b4c64; color: white; }
        .btn-excel { background: #166534; color: white; }
        .btn:active { transform: scale(0.95); }

        /* TABLE AREA - KONTRAST TINGGI */
        .table-container { 
            width: 100%; overflow-x: auto; 
            border-radius: 4px; background: #fff; 
            border: 1px solid #444;
        }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; color: #000; }
        
        th { 
            background: #f1f5f9; color: #1e293b; 
            padding: 10px 5px; font-size: 11px; 
            border: 1px solid #cbd5e1; position: sticky; top: 0; z-index: 10;
        }
        
        td { 
            padding: 6px 8px; border: 1px solid #e2e8f0; 
            font-size: 12px; text-align: center; white-space: nowrap; 
        }

        /* STICKY AGEN */
        .sticky-col { 
            position: sticky; left: 0; background: #fff; z-index: 5; 
            border-right: 2px solid #334155 !important; font-weight: bold;
        }
        th.sticky-col { background: #e2e8f0; z-index: 11; }

        /* TEKS BERWARNA */
        .link-detail { text-decoration: underline; cursor: pointer; font-weight: bold; }
        .text-kirim { color: #2563eb; }
        .text-retur { color: #dc2626; }
        .lunas { background: #dcfce7; color: #166534; font-weight: bold; border-radius: 4px; padding: 2px 6px; }
        .pending { background: #ffedd5; color: #9a3412; font-weight: bold; border-radius: 4px; padding: 2px 6px; }

        /* MODAL POP-UP DARK STYLE */
        .modal { 
            display: none; position: fixed; z-index: 100; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(3px);
        }
        .modal-content { 
            background: #1e1e1e; margin: 10% auto; 
            border-radius: 12px; width: 90%; max-width: 500px; 
            border: 1px solid #444; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }
        .modal-header { 
            background: #2d2d2d; padding: 15px; 
            display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #444; 
        }
        .modal-body { padding: 15px; max-height: 400px; overflow-y: auto; color: #eee; }
        .close-btn { font-size: 24px; cursor: pointer; color: #aaa; }
        
        .table-pop { width: 100%; border-collapse: collapse; }
        .table-pop th { background: #333; color: #fff; border: 1px solid #444; position: static; }
        .table-pop td { border: 1px solid #444; color: #eee; background: #1e1e1e; }
    </style>
</head>
<body>

<div class="card">
    <h2>REKAP TRANSAKSI TERPADU SBR</h2>

    <div class="filter-section">
        <div class="filter-group">
            <label>DARI TANGGAL</label>
            <input type="date" id="tglMulai">
        </div>
        <div class="filter-group">
            <label>SAMPAI TANGGAL</label>
            <input type="date" id="tglSelesai">
        </div>
        <button class="btn btn-tampilkan" onclick="muatLaporan()">TAMPILKAN</button>
        <button class="btn btn-excel" onclick="exportKeExcel()">EXCEL</button>
    </div>

    <div class="table-container">
        <table id="tabelLaporan">
            <thead>
                <tr>
                    <th class="sticky-col">AGEN</th>
                    <th>TGL</th>
                    <th>NOTA</th>
                    <th>DRIVER 1</th>
                    <th>DRIVER 2</th>
                    <th>KIRIM (▼)</th>
                    <th>RETUR (▼)</th>
                    <th>TAGIHAN</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="isiTabel">
                <tr><td colspan="9" style="padding:40px; background:#fff; color:#999;">Tentukan tanggal lalu klik Tampilkan.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Pop-up Rincian -->
<div id="modalDetail" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalJudul" style="margin:0; font-size:15px;">RINCIAN ITEM</h3>
            <span class="close-btn" onclick="tutupModal()">&times;</span>
        </div>
        <div class="modal-body" id="modalIsi"></div>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('tglMulai').value = today;
        document.getElementById('tglSelesai').value = today;
    };

    async function muatLaporan() {
        const body = document.getElementById('isiTabel');
        body.innerHTML = "<tr><td colspan='9' style='padding:30px; background:#fff;'>Memproses data Supabase...</td></tr>";

        const { data, error } = await _sb.from('transaksi')
            .select('*')
            .gte('tanggal', document.getElementById('tglMulai').value)
            .lte('tanggal', document.getElementById('tglSelesai').value)
            .order('tanggal', { ascending: false });

        if (error) { alert("Error: " + error.message); return; }
        if (data.length === 0) { body.innerHTML = "<tr><td colspan='9' style='padding:30px; background:#fff;'>Data tidak ditemukan.</td></tr>"; return; }

        body.innerHTML = "";
        data.forEach(t => {
            const netto = (t.total_kirim || 0) - (t.total_retur || 0);
            const bayar = (t.bayar_cash || 0) + (t.bayar_transfer || 0);
            const sisa = netto - bayar;

            body.innerHTML += `
                <tr>
                    <td class="sticky-col" style="text-align:left;">${t.nama_agen}</td>
                    <td>${t.tanggal}</td>
                    <td style="color:#666;">${t.no_nota}</td>
                    <td>${t.driver_1 || '-'}</td>
                    <td>${t.driver_2 || '-'}</td>
                    <td class="link-detail text-kirim" onclick="bukaPopUpDetail('${t.no_nota}', 'Kirim')">${(t.total_kirim || 0).toLocaleString()}</td>
                    <td class="link-detail text-retur" onclick="bukaPopUpDetail('${t.no_nota}', 'Retur')">${(t.total_retur || 0).toLocaleString()}</td>
                    <td style="font-weight:bold; color:#000;">${netto.toLocaleString()}</td>
                    <td><span class="${sisa <= 0 ? 'lunas' : 'pending'}">${sisa <= 0 ? 'LUNAS' : 'PENDING'}</span></td>
                </tr>
            `;
        });
    }

    async function bukaPopUpDetail(noNota, tipeKlik) {
        const modalIsi = document.getElementById('modalIsi');
        document.getElementById('modalJudul').innerText = `RINCIAN ${tipeKlik.toUpperCase()} - ${noNota}`;
        modalIsi.innerHTML = "<p style='text-align:center;'>Mengambil data...</p>";
        document.getElementById('modalDetail').style.display = "block";

        const { data, error } = await _sb.from('transaksi_detail')
            .select('nama_barang, qty, satuan')
            .eq('no_nota', noNota)
            .eq('tipe', tipeKlik);

        if (error) { modalIsi.innerHTML = "Gagal: " + error.message; return; }
        if (!data || data.length === 0) { modalIsi.innerHTML = "<p style='text-align:center;'>Tidak ada rincian.</p>"; return; }

        let html = `<table class="table-pop"><thead><tr><th style="text-align:left;">Barang</th><th>Qty</th><th>Satuan</th></tr></thead><tbody>`;
        data.forEach(item => {
            html += `<tr><td style="text-align:left;">${item.nama_barang}</td><td style="font-weight:bold;">${item.qty.toLocaleString()}</td><td>${item.satuan}</td></tr>`;
        });
        html += `</tbody></table>`;
        modalIsi.innerHTML = html;
    }

    function tutupModal() { document.getElementById('modalDetail').style.display = "none"; }
    window.onclick = (e) => { if (e.target == document.getElementById('modalDetail')) tutupModal(); }

    function exportKeExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById("tabelLaporan"));
        XLSX.writeFile(wb, `Rekap_SBR_${document.getElementById('tglMulai').value}.xlsx`);
    }
</script>

</body>
</html>
