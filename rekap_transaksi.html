<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR | Rekap Terpadu v6.2</title>
    <!-- Library Supabase & Excel -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Library HTML2Canvas untuk Simpan Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Courier+New:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 10px; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { margin: 0 0 15px; font-size: 16px; text-align: center; background: #333; padding: 12px; border-radius: 6px; color: #fff; text-transform: uppercase; }
        
        .filter-section { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: end; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 11px; margin-bottom: 4px; color: #aaa; }
        input[type="date"] { background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; width: 100%; box-sizing: border-box; }
        
        .btn-group { grid-column: span 2; display: flex; gap: 8px; margin-top: 5px; }
        .btn { padding: 10px 5px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 11px; flex: 1; }
        .btn-tampilkan { background: #3b4c64; color: white; }
        .btn-excel { background: #166534; color: white; }
        .btn:active { transform: scale(0.95); }

        .table-container { width: 100%; overflow-x: auto; border-radius: 4px; background: #fff; border: 1px solid #444; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; color: #000; }
        th { background: #f1f5f9; color: #1e293b; padding: 10px 5px; font-size: 11px; border: 1px solid #cbd5e1; position: sticky; top: 0; z-index: 10; }
        td { padding: 6px 8px; border: 1px solid #e2e8f0; font-size: 12px; text-align: center; white-space: nowrap; }

        .sticky-col { position: sticky; left: 0; background: #fff; z-index: 5; border-right: 2px solid #334155 !important; font-weight: bold; }
        th.sticky-col { background: #e2e8f0; z-index: 11; }

        .link-detail { text-decoration: underline; cursor: pointer; font-weight: bold; }
        .nota-link { color: #2563eb; text-decoration: underline; cursor: pointer; font-weight: bold; }
        .text-kirim { color: #2563eb; }
        .text-retur { color: #dc2626; }
        .lunas { background: #dcfce7; color: #166534; font-weight: bold; border-radius: 4px; padding: 2px 6px; }
        .pending { background: #ffedd5; color: #9a3412; font-weight: bold; border-radius: 4px; padding: 2px 6px; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(3px); }
        .modal-content { 
            background: #1e1e1e; 
            margin: 2% auto;
            border-radius: 12px; 
            width: 90%; 
            max-width: 480px; 
            border: 1px solid #444; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }
        .modal-header { background: #2d2d2d; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .modal-body { 
            padding: 15px; 
            max-height: 75vh;
            overflow-y: auto; 
            color: #eee; 
        }
        .close-btn { font-size: 24px; cursor: pointer; color: #aaa; margin-left: 10px; }
        
        .table-pop { width: 100%; border-collapse: collapse; }
        .table-pop th { background: #333; color: #fff; border: 1px solid #444; position: static; }
        .table-pop td { border: 1px solid #444; color: #eee; background: #1e1e1e; }

        .struk-box { background: #fff; border: 1px solid #cbd5e1; padding: 15px; border-radius: 6px; font-family: 'Courier New', Courier, monospace; color: #000; font-size: 13px; line-height: 1.4; }
        .struk-center { text-align: center; }
        .struk-bold { font-weight: bold; }
        .struk-title { font-size: 16px; font-weight: bold; margin: 0; font-family: 'Roboto Condensed', sans-serif; }
        .struk-separator { border-top: 1px dashed #000; margin: 6px 0; }
        .struk-double-separator { border-top: 2px double #000; margin: 6px 0; }
        .struk-row { display: flex; justify-content: space-between; }
        .struk-item-detail { padding-left: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>REKAP TRANSAKSI TERPADU SBR</h2>

    <div class="filter-section">
        <div class="filter-group">
            <label>DARI TANGGAL</label>
            <input type="date" id="tglMulai">
        </div>
        <div class="filter-group">
            <label>SAMPAI TANGGAL</label>
            <input type="date" id="tglSelesai">
        </div>
        <div class="btn-group">
            <button class="btn btn-tampilkan" onclick="muatLaporan()">TAMPILKAN</button>
            <button class="btn btn-excel" onclick="exportKeExcelDenganDetail()">EXCEL + DETAIL KOMPLIT</button>
        </div>
    </div>

    <div class="table-container">
        <table id="tabelLaporan">
            <thead>
                <tr>
                    <th class="sticky-col">AGEN</th>
                    <th>TGL</th>
                    <th>NOTA</th>
                    <th>DRIVER 1</th>
                    <th>DRIVER 2</th>
                    <th>PLAT NOMOR</th>
                    <th>KIRIM (▼)</th>
                    <th>RETUR (▼)</th>
                    <th>SISA AKHIR</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="isiTabel">
                <tr><td colspan="10" style="padding:40px; background:#fff; color:#999;">Tentukan tanggal lalu klik Tampilkan.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalDetail" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalJudul" style="margin:0; font-size:15px;">RINCIAN DATA</h3>
            <span class="close-btn" onclick="tutupModal()">&times;</span>
        </div>
        <div class="modal-body" id="modalIsi"></div>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let dataCacheTransaksi = [];
    let dataStrukAktif = null; 

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('tglMulai').value = today;
        document.getElementById('tglSelesai').value = today;
    };

    async function muatLaporan() {
        const body = document.getElementById('isiTabel');
        body.innerHTML = "<tr><td colspan='10' style='padding:30px; background:#fff; color:#000;'>Memproses data Supabase...</td></tr>";

        const { data, error } = await _sb.from('transaksi')
            .select('*')
            .gte('tanggal', document.getElementById('tglMulai').value)
            .lte('tanggal', document.getElementById('tglSelesai').value)
            .order('created_at', { ascending: false });

        if (error) { alert("Error: " + error.message); return; }
        if (!data || data.length === 0) { body.innerHTML = "<tr><td colspan='10' style='padding:30px; background:#fff; color:#000;'>Data tidak ditemukan untuk rentang tanggal ini.</td></tr>"; dataCacheTransaksi = []; return; }

        dataCacheTransaksi = data;
        body.innerHTML = "";
        data.forEach(t => {
            const sisaAkhir = t.sisa_akhir || 0; 
            const [y, m, d] = t.tanggal.split('-');
            const tglIndo = `${d}-${m}-${y}`;

            body.innerHTML += `
                <tr>
                    <td class="sticky-col" style="text-align:left;">${t.nama_agen || '-'}</td>
                    <td>${tglIndo}</td>
                    <td><span class="nota-link" onclick="bukaStrukNota('${t.no_nota}')">${t.no_nota || '-'}</span></td>
                    <td>${t.driver_1 || '-'}</td>
                    <td>${t.driver_2 || '-'}</td>
                    <td>${t.plat_nomor || '-'}</td>
                    <td class="link-detail text-kirim" onclick="bukaPopUpDetail('${t.no_nota}', 'Kirim')">${(t.total_kirim || 0).toLocaleString()}</td>
                    <td class="link-detail text-retur" onclick="bukaPopUpDetail('${t.no_nota}', 'Retur')">${(t.total_retur || 0).toLocaleString()}</td>
                    <td style="font-weight:bold; color:#000;">${sisaAkhir.toLocaleString()}</td>
                    <td><span class="${sisaAkhir <= 0 ? 'lunas' : 'pending'}">${sisaAkhir <= 0 ? 'LUNAS' : 'PENDING'}</span></td>
                </tr>
            `;
        });
    }

    async function bukaPopUpDetail(noNota, tipeKlik) {
        const modalIsi = document.getElementById('modalIsi');
        document.getElementById('modalJudul').innerText = `RINCIAN ${tipeKlik.toUpperCase()} - ${noNota}`;
        modalIsi.innerHTML = "<p style='text-align:center;'>Mengambil data...</p>";
        document.getElementById('modalDetail').style.display = "block";

        const { data, error } = await _sb.from('transaksi_detail')
            .select('nama_barang, qty, satuan')
            .eq('no_nota', noNota)
            .eq('tipe', tipeKlik);

        if (error) { modalIsi.innerHTML = "Gagal: " + error.message; return; }
        if (!data || data.length === 0) { modalIsi.innerHTML = "<p style='text-align:center;'>Tidak ada rincian data item untuk tipe ini.</p>"; return; }

        let html = `<table class="table-pop"><thead><tr><th style="text-align:left;">Barang</th><th>Qty</th><th>Satuan</th></tr></thead><tbody>`;
        data.forEach(item => {
            html += `<tr><td style="text-align:left;">${item.nama_barang || '-'}</td><td style="font-weight:bold;">${(item.qty || 0).toLocaleString()}</td><td>${item.satuan || ''}</td></tr>`;
        });
        html += `</tbody></table>`;
        modalIsi.innerHTML = html;
    }

    function formatTglBulanTahun(tglStr) {
        if (!tglStr) return "";
        const [y, m, d] = tglStr.split('-');
        const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        return `${d} ${namaBulan[parseInt(m)-1]} ${y.slice(-2)}`;
    }

    async function bukaStrukNota(noNota) {
        const modalIsi = document.getElementById('modalIsi');
        document.getElementById('modalJudul').innerText = `STRUK DETAIL NOTA`;
        modalIsi.innerHTML = "<p style='text-align:center;'>Membuka struk belanja...</p>";
        document.getElementById('modalDetail').style.display = "block";

        try {
            const { data: trx, error: errTrx } = await _sb.from('transaksi').select('*').eq('no_nota', noNota).single();
            if (errTrx) throw errTrx;

            const { data: detail, error: errDet } = await _sb.from('transaksi_detail').select('*').eq('no_nota', noNota);
            if (errDet) throw errDet;

            const { data: rawRiwayatBayar, error: errBayar } = await _sb.from('pembayaran_bon')
                .select('tanggal, bayar_cash, bayar_transfer, keterangan')
                .eq('no_nota_referensi', noNota);

            let riwayatBayar = rawRiwayatBayar || [];
            riwayatBayar.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));

            dataStrukAktif = { trx, detail, riwayatBayar };

            const [y, m, d] = trx.tanggal.split('-');
            const drvGabung = trx.driver_2 ? `${trx.driver_1} / ${trx.driver_2}` : trx.driver_1;

            let s = `<div class="struk-box" id="areaCetakStruk">
                        <div class="struk-center">
                            <span class="struk-title">SBR PUTRA FOOD</span><br>
                            Lembang, Bandung Barat<br>
                        </div>
                        <div class="struk-separator"></div>
                        <div class="struk-row"><span>NO: ${trx.no_nota}</span><span>TGL: ${d}-${m}-${y}</span></div>
                        <div class="struk-center struk-bold" style="font-size:14px; margin: 4px 0;">${trx.nama_agen.toUpperCase()}</div>
                        <div>DRV: ${drvGabung} [ ${trx.plat_nomor || '-'} ]</div>
                        <div class="struk-separator"></div>`;

            const itemsKirim = detail.filter(i => i.tipe === 'Kirim');
            const itemsRetur = detail.filter(i => i.tipe === 'Retur');

            itemsKirim.forEach(i => {
                s += `<div>${i.nama_barang}</div>`;
                s += `<div class="struk-row struk-item-detail">
                        <span>&nbsp;&nbsp;${i.qty} ${i.satuan} x ${(i.harga_satuan || 0).toLocaleString('id-ID')}</span>
                        <span>${(i.subtotal || 0).toLocaleString('id-ID')}</span>
                      </div>`;
            });
            s += `<div class="struk-separator"></div>`;
            s += `<div class="struk-row"><span>TOTAL KIRIM:</span><span>Rp ${(trx.total_kirim || 0).toLocaleString('id-ID')}</span></div>`;

            if(itemsRetur.length > 0) {
                s += `<br><div class="struk-bold">BARANG RETUR:</div>`;
                itemsRetur.forEach(i => {
                    s += `<div>[RETUR] ${i.nama_barang}</div>`;
                    s += `<div class="struk-row struk-item-detail">
                            <span>&nbsp;&nbsp;${i.qty} ${i.satuan} x ${(i.harga_satuan || 0).toLocaleString('id-ID')}</span>
                            <span>-${(i.subtotal || 0).toLocaleString('id-ID')}</span>
                          </div>`;
                });
                s += `<div class="struk-separator"></div>`;
                s += `<div class="struk-row"><span>TOTAL RETUR:</span><span>Rp ${(trx.total_retur || 0).toLocaleString('id-ID')}</span></div>`;
            }

            const tagihanBersih = (trx.total_kirim || 0) - (trx.total_retur || 0) + (trx.bon_lama || 0);
            let bonLama = trx.bon_lama || 0;
            let teksBonLama = bonLama < 0 ? "DEPOSIT:" : "BON LAMA:";
            s += `<br><div class="struk-row"><span>${teksBonLama}</span><span>Rp ${Math.abs(bonLama).toLocaleString('id-ID')}</span></div>`;
            
            s += `<div class="struk-double-separator"></div>`;
            s += `<div class="struk-row struk-bold"><span>TOTAL TAGIHAN:</span><span>Rp ${tagihanBersih.toLocaleString('id-ID')}</span></div>`;
            s += `<div class="struk-separator"></div>`;
            s += `<div class="struk-row"><span>Bayar CASH:</span><span>Rp ${(trx.bayar_cash || 0).toLocaleString('id-ID')}</span></div>`;
            s += `<div class="struk-row"><span>Bayar TRF:</span><span>Rp ${(trx.bayar_transfer || 0).toLocaleString('id-ID')}</span></div>`;
            s += `<div class="struk-separator"></div>`;

            if (riwayatBayar && riwayatBayar.length > 0) {
                s += `<br><div class="struk-bold">RIWAYAT CICILAN:</div>`;
                riwayatBayar.forEach(p => {
                    let detailBayar = "";
                    if ((p.bayar_cash || 0) > 0) detailBayar += `CASH: Rp ${p.bayar_cash.toLocaleString('id-ID')} `;
                    if ((p.bayar_transfer || 0) > 0) detailBayar += `TRF: Rp ${p.bayar_transfer.toLocaleString('id-ID')}`;
                    let ket = p.keterangan ? `<div style="font-size:11px; color:#555;">&nbsp;&nbsp;(${p.keterangan})</div>` : '';
                    let tglIndo = formatTglBulanTahun(p.tanggal);
                    
                    s += `<div class="struk-row"><span>&nbsp;&nbsp;${tglIndo}</span><span>${detailBayar}</span></div>${ket}`;
                });
                s += `<div class="struk-separator"></div>`;
            }

            let sisaAkhir = trx.sisa_akhir || 0;
            let teksSisa = sisaAkhir < 0 ? "DEPOSIT:" : "SISA BON:";
            s += `<div class="struk-row struk-bold" style="font-size:14px; color:#dc2626;"><span>${teksSisa}</span><span>Rp ${Math.abs(sisaAkhir).toLocaleString('id-ID')}</span></div>`;
            s += `<div class="struk-separator"></div>`;
            s += `<div class="struk-center struk-bold" style="margin-top:10px; text-align:center;">SBR PUTRA FOOD SYSTEM</div>`;
            
            s += `</div>`; // Akhir .struk-box
            
            // TOMBOL AKSI & PILIHAN PRINTER
            s += `<div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btnCetak" onclick="cetakStrukBluetooth()" style="flex:1; background:#2563eb; color:white; padding:12px 10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">🖨️ CETAK BLUETOOTH</button>
                    <button id="btnCetakGambar" onclick="cetakGambar()" style="flex:1; background:#16a34a; color:white; padding:12px 10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">📸 SIMPAN JPG</button>
                  </div>`;
                  
            s += `<div style="margin-top: 10px; text-align: center; background: #2d2d2d; padding: 12px; border-radius: 6px; border: 1px solid #444;">
                    <label for="lebarKertas" style="font-size: 13px; font-weight: bold; color: #ccc;">UKURAN KERTAS: </label>
                    <select id="lebarKertas" style="padding: 6px 10px; border-radius: 4px; font-weight: bold; background: #1e1e1e; color: white; border: 1px solid #555; outline: none; cursor: pointer; margin-left: 5px;">
                        <option value="48">80mm (Besar)</option>
                        <option value="32">58mm (Kecil)</option>
                    </select>
                  </div>`;

            modalIsi.innerHTML = s;
        } catch (e) {
            modalIsi.innerHTML = `<p style='color:red; text-align:center;'>Gagal memuat struk: ${e.message}</p>`;
        }
    }

    function tutupModal() { 
        document.getElementById('modalDetail').style.display = "none"; 
    }
    window.onclick = (e) => { if (e.target == document.getElementById('modalDetail')) tutupModal(); }

    function formatBarisKiriKanan(kiri, kanan) {
        const LEBAR_MAX = parseInt(document.getElementById('lebarKertas').value);
        let spasi = LEBAR_MAX - (kiri.length + String(kanan).length);
        if (spasi < 1) spasi = 1;
        return kiri + " ".repeat(spasi) + kanan + "\n";
    }

    async function cetakStrukBluetooth() {
        if (!navigator.bluetooth) {
            alert("Browser ini tidak mendukung Web Bluetooth API.");
            return;
        }
        if (!dataStrukAktif) return;

        const { trx, detail, riwayatBayar } = dataStrukAktif;

        const LEBAR_MAX = parseInt(document.getElementById('lebarKertas').value);
        const GARIS = "-".repeat(LEBAR_MAX) + "\n";
        const GARIS_GANDA = "=".repeat(LEBAR_MAX) + "\n";

        let teks = "";
        const ESC_INIT = "\x1B\x40"; 
        const ESC_CENTER = "\x1B\x61\x01";
        const ESC_LEFT = "\x1B\x61\x00";
        const ESC_BOLD_ON = "\x1B\x45\x01";
        const ESC_BOLD_OFF = "\x1B\x45\x00";

        const [y, m, d] = trx.tanggal.split('-');
        const drvGabung = trx.driver_2 ? `${trx.driver_1}/${trx.driver_2}` : trx.driver_1;

        teks += ESC_INIT;
        teks += ESC_CENTER + ESC_BOLD_ON + "SBR PUTRA FOOD\n" + ESC_BOLD_OFF;
        teks += "Lembang, Bandung Barat\n";
        teks += ESC_LEFT + GARIS;
        teks += formatBarisKiriKanan(`NO: ${trx.no_nota}`, `TGL: ${d}-${m}-${y}`);
        teks += ESC_CENTER + ESC_BOLD_ON + `${trx.nama_agen.toUpperCase()}\n` + ESC_BOLD_OFF;
        teks += ESC_LEFT + `DRV: ${drvGabung} [${trx.plat_nomor || '-'}]\n`;
        teks += GARIS;

        const itemsKirim = detail.filter(i => i.tipe === 'Kirim');
        const itemsRetur = detail.filter(i => i.tipe === 'Retur');

        itemsKirim.forEach(i => {
            teks += `${i.nama_barang}\n`;
            let rincian = `  ${i.qty} ${i.satuan} x ${(i.harga_satuan || 0).toLocaleString('id-ID')}`;
            let sub = `${(i.subtotal || 0).toLocaleString('id-ID')}`;
            teks += formatBarisKiriKanan(rincian, sub);
        });
        teks += GARIS;
        teks += formatBarisKiriKanan("TOTAL KIRIM:", `Rp ${(trx.total_kirim || 0).toLocaleString('id-ID')}`);

        if(itemsRetur.length > 0) {
            teks += GARIS;
            teks += ESC_BOLD_ON + "BARANG RETUR:\n" + ESC_BOLD_OFF;
            itemsRetur.forEach(i => {
                teks += `[R] ${i.nama_barang}\n`;
                let rincian = `  ${i.qty} ${i.satuan} x ${(i.harga_satuan || 0).toLocaleString('id-ID')}`;
                let sub = `-${(i.subtotal || 0).toLocaleString('id-ID')}`;
                teks += formatBarisKiriKanan(rincian, sub);
            });
            teks += GARIS;
            teks += formatBarisKiriKanan("TOTAL RETUR:", `Rp ${(trx.total_retur || 0).toLocaleString('id-ID')}`);
        }

        const tagihanBersih = (trx.total_kirim || 0) - (trx.total_retur || 0) + (trx.bon_lama || 0);
        let bonLama = trx.bon_lama || 0;
        let teksBonLama = bonLama < 0 ? "DEPOSIT:" : "BON LAMA:";
        
        teks += "\n";
        teks += formatBarisKiriKanan(teksBonLama, `Rp ${Math.abs(bonLama).toLocaleString('id-ID')}`);
        teks += GARIS_GANDA;
        teks += ESC_BOLD_ON + formatBarisKiriKanan("TOTAL TAGIHAN:", `Rp ${tagihanBersih.toLocaleString('id-ID')}`) + ESC_BOLD_OFF;
        teks += GARIS;
        teks += formatBarisKiriKanan("Bayar CASH:", `Rp ${(trx.bayar_cash || 0).toLocaleString('id-ID')}`);
        teks += formatBarisKiriKanan("Bayar TRF:", `Rp ${(trx.bayar_transfer || 0).toLocaleString('id-ID')}`);
        teks += GARIS;
        
        if (riwayatBayar && riwayatBayar.length > 0) {
            teks += ESC_BOLD_ON + "RIWAYAT CICILAN:\n" + ESC_BOLD_OFF;
            riwayatBayar.forEach(p => {
                let det = "";
                if ((p.bayar_cash || 0) > 0) det += `CSH: Rp ${p.bayar_cash.toLocaleString('id-ID')} `;
                if ((p.bayar_transfer || 0) > 0) det += `TRF: Rp ${p.bayar_transfer.toLocaleString('id-ID')}`;
                let tglIndo = formatTglBulanTahun(p.tanggal);
                teks += formatBarisKiriKanan(`  ${tglIndo}`, det.trim());
            });
            teks += GARIS;
        }

        let sisaAkhir = trx.sisa_akhir || 0;
        let teksSisa = sisaAkhir < 0 ? "DEPOSIT:" : "SISA BON:";
        teks += ESC_BOLD_ON + formatBarisKiriKanan(teksSisa, `Rp ${Math.abs(sisaAkhir).toLocaleString('id-ID')}`) + ESC_BOLD_OFF;
        teks += GARIS;

        teks += ESC_CENTER + ESC_BOLD_ON + "SBR PUTRA FOOD SYSTEM\n" + ESC_BOLD_OFF;
        teks += "\n\n\n"; 

        try {
            document.getElementById('btnCetak').innerText = "Menghubungkan...";
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '0000fee7-0000-1000-8000-00805f9b34fb']
            });

            const server = await device.gatt.connect();
            
            let service;
            const serviceUUIDs = ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '0000fee7-0000-1000-8000-00805f9b34fb'];
            for (let uuid of serviceUUIDs) {
                try {
                    service = await server.getPrimaryService(uuid);
                    if (service) break;
                } catch(e) {}
            }
            if (!service) throw new Error("Service printer tidak ditemukan.");

            let characteristic;
            const charUUIDs = ['00002af1-0000-1000-8000-00805f9b34fb', 'beab8f86-ea54-44a6-9817-ffb7db7bd4b2', '0000fec8-0000-1000-8000-00805f9b34fb'];
            for (let uuid of charUUIDs) {
                try {
                    characteristic = await service.getCharacteristic(uuid);
                    if (characteristic) break;
                } catch(e) {}
            }
            if (!characteristic) throw new Error("Karakteristik write tidak ditemukan.");

            let encoder = new TextEncoder();
            let dataUint8 = encoder.encode(teks);
            
            let chunkSize = 100; 
            for (let i = 0; i < dataUint8.length; i += chunkSize) {
                await characteristic.writeValue(dataUint8.slice(i, i + chunkSize));
                await new Promise(resolve => setTimeout(resolve, 100)); 
            }
            
            device.gatt.disconnect();
            document.getElementById('btnCetak').innerText = "🖨️ CETAK BLUETOOTH";

        } catch (error) {
            console.error(error);
            alert("Gagal cetak Bluetooth: " + error.message);
            document.getElementById('btnCetak').innerText = "🖨️ CETAK BLUETOOTH";
        }
    }

    async function exportKeExcelDenganDetail() {
        if (dataCacheTransaksi.length === 0) {
            alert("Silahkan klik 'TAMPILKAN' data terlebih dahulu sebelum export!");
            return;
        }

        alert("Sedang merakit Excel beserta detail keuangan, mohon tunggu sebentar...");

        const { data: semuaDetail, error } = await _sb.from('transaksi_detail')
            .select('no_nota, tipe, nama_barang, qty, satuan, harga_satuan, subtotal')
            .in('no_nota', dataCacheTransaksi.map(t => t.no_nota));

        if (error) {
            alert("Gagal mengambil detail barang untuk Excel: " + error.message);
            return;
        }

        let matriksExcel = [];
        matriksExcel.push([
            "AGEN / NAMA BARANG", "TANGGAL", "NO NOTA", "DRIVER 1", "DRIVER 2", 
            "PLAT NOMOR", "KIRIM (RP)", "RETUR (RP)", "BON LAMA (RP)", "CASH (RP)", "TRANSFER (RP)", "SISA AKHIR (RP)", "STATUS"
        ]);

        dataCacheTransaksi.forEach(t => {
            const [y, m, d] = t.tanggal.split('-');
            const statusNota = (t.sisa_akhir || 0) <= 0 ? "LUNAS" : "PENDING";

            matriksExcel.push([
                t.nama_agen, `${d}-${m}-${y}`, t.no_nota, t.driver_1, t.driver_2, t.plat_nomor,
                t.total_kirim || 0, t.total_retur || 0, t.bon_lama || 0, t.bayar_cash || 0, t.bayar_transfer || 0, t.sisa_akhir || 0, statusNota
            ]);

            const detailNota = semuaDetail.filter(d => d.no_nota === t.no_nota);
            if (detailNota.length > 0) {
                matriksExcel.push(["   ↳ DETAIL BARANG:", "Tipe", "Nama Barang", "Qty", "Satuan", "Harga Satuan", "Subtotal Item"]);
                detailNota.forEach(item => {
                    matriksExcel.push(["", `   [${item.tipe}]`, item.nama_barang, item.qty, item.satuan, item.harga_satuan, item.subtotal]);
                });
                matriksExcel.push([]); 
            }
        });

        const worksheet = XLSX.utils.aoa_to_sheet(matriksExcel);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap Detail Keuangan");
        XLSX.writeFile(workbook, `Rekap_SBR_Komplit_${document.getElementById('tglMulai').value}.xlsx`);
    }

    async function cetakGambar() {
        const areaStruk = document.getElementById('areaCetakStruk');
        if (!areaStruk) {
            alert("Area struk tidak ditemukan!");
            return;
        }

        const btn = document.getElementById('btnCetakGambar');
        const teksAsli = btn.innerText;
        btn.innerText = "⏳ Memproses...";
        btn.disabled = true;

        try {
            const canvas = await html2canvas(areaStruk, {
                scale: 2, 
                backgroundColor: "#ffffff",
                logging: false
            });

            const imageURL = canvas.toDataURL("image/jpeg", 0.9);

            const downloadLink = document.createElement("a");
            downloadLink.href = imageURL;
            
            let namaFile = "Bukti_Validasi_SBR";
            if (dataStrukAktif && dataStrukAktif.trx && dataStrukAktif.trx.no_nota) {
                namaFile += "_" + dataStrukAktif.trx.no_nota;
            }
            
            downloadLink.download = namaFile + ".jpg";
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

        } catch (error) {
            console.error("Error cetak gambar:", error);
            alert("Gagal memproses gambar: " + error.message);
        } finally {
            btn.innerText = teksAsli;
            btn.disabled = false;
        }
    }
