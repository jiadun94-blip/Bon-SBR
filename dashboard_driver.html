<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Driver Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS IDENTIK DENGAN ADMIN AGAR TIDAK SYIRIK */
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; margin: 0; padding: 15px; }
        .welcome { margin-bottom: 10px; font-size: 14px; color: #666; text-align: center; }
        .header { background: #1e272e; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h2 span { color: #72a339; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .btn-menu { 
            background: white; padding: 25px; border-radius: 15px; text-align: left; 
            text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center;
        }
        .btn-menu:active { transform: scale(0.98); background: #f9f9f9; }
        .icon { font-size: 32px; margin-right: 20px; }
        
        .btn-logout { width: 100%; margin-top: 25px; padding: 15px; background: transparent; color: #d63031; border: 1px solid #d63031; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="welcome">Selamat bekerja, Pak <b id="driverNama">Driver</b></div>

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px;">SBR<span>digital</span> DRIVER</h2>
</div>

<div class="grid-menu">
    <a href="./bon.html" class="btn-menu">
        <span class="icon">📝</span> BUAT BON BARU
    </a>

    <a href="./riwayat.html" class="btn-menu">
        <span class="icon">📋</span> RIWAYAT KIRIMAN SAYA
    </a>
    
    <a href="./monitoring_kendaraan.html" class="btn-menu">
        <span class="icon">🔧</span> MONITORING UNIT / CEK OLI
    </a>
</div>

<button class="btn-logout" onclick="logout()">KELUAR DARI SISTEM</button>

<script>
    const userNama = localStorage.getItem("userNama");
    if (!userNama) {
        window.location.replace("index.html");
    } else {
        document.getElementById('driverNama').innerText = userNama;
    }

    function logout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>
</body>
</html>
