<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Driver Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #72a339; margin: 0; padding: 20px; }
        .card-main { background: white; padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .user-info { text-align: center; margin-bottom: 30px; }
        .user-info h2 { margin: 0; color: #1e272e; }
        .user-info p { margin: 5px 0; color: #666; font-size: 14px; }
        
        .menu-list { display: flex; flex-direction: column; gap: 15px; }
        .btn-menu { 
            display: flex; align-items: center; background: #f1f2f6; 
            padding: 20px; border-radius: 15px; text-decoration: none; 
            color: #1e272e; font-weight: bold; font-size: 18px; border: 1px solid #ddd;
        }
        .btn-menu .icon { margin-right: 15px; font-size: 24px; }
        .btn-menu:active { background: #e2e3e7; transform: scale(0.98); }
        
        .btn-keluar { margin-top: 30px; background: transparent; border: 1px solid #d63031; color: #d63031; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card-main">
    <div class="user-info">
        <p>Halo, Driver SBR!</p>
        <h2 id="driverNama">PENGGUNA</h2>
    </div>

    <div class="menu-list">
        <a href="./bon.html" class="btn-menu">
            <span class="icon">➕</span>
            BUAT BON BARU
        </a>

        <a href="./riwayat.html" class="btn-menu">
            <span class="icon">📋</span>
            RIWAYAT KIRIMAN
        </a>
        
        <a href="./monitoring_kendaraan.html" class="btn-menu">
            <span class="icon">🔧</span>
            CEK OLI / UNIT
        </a>
    </div>

    <button class="btn-keluar" onclick="logout()">KELUAR AKUN</button>
</div>

<script>
    const userNama = localStorage.getItem("userNama");
    if (!userNama) {
        window.location.replace("index.html");
    } else {
        document.getElementById('driverNama').innerText = userNama;
    }

    function logout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>
</body>
</html>
