<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Dashboard Driver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #72a339; --text: #e0e0e0; }
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .welcome-section { text-align: center; padding: 25px 15px; background: var(--card); border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .welcome-section h1 { margin: 0; font-size: 22px; color: #fff; }
        .welcome-section h1 span { color: var(--accent); }
        .welcome-section p { color: #888; margin-top: 5px; font-size: 14px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .menu-card { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #444; text-align: center; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-card:active { background: #2a2a2a; transform: translateY(2px); }
        .menu-card b { font-size: 14px; color: var(--accent); text-transform: uppercase; margin-top: 8px; }
        .icon-box { font-size: 24px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 5px; }
        .section-title { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .history-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #252525; padding: 12px 10px; text-align: left; color: #666; font-size: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #2a2a2a; vertical-align: top; }
        
        .txt-tgl { font-weight: bold; color: #fff; display: block; }
        .txt-agen { color: var(--accent); font-weight: 700; font-size: 14px; text-transform: uppercase; display: block; }
        .txt-partner { font-size: 11px; color: #fbc531; display: block; margin-top: 3px; }
        .txt-nota { font-size: 11px; color: #666; }
    </style>
</head>
<body>

<div class="welcome-section">
    <h1>Halo, <span id="namaUser">...</span>!</h1>
    <p>Driver SBR Putra Food</p>
</div>

<div class="section-header">
    <span class="section-title">Menu Cepat</span>
</div>
<div class="menu-grid">
    <a href="bon.html" class="menu-card">
        <span class="icon-box">📝</span>
        <b>Buat Bon</b>
    </a>
    <a href="laporan_setoran.html" class="menu-card">
        <span class="icon-box">🚀</span>
        <b>Laporan</b>
    </a>
</div>

<div class="section-header">
    <span class="section-title">Riwayat 2 Pekan Terakhir</span>
</div>
<div class="history-card">
    <table id="tabelRiwayat">
        <thead>
            <tr>
                <th>WAKTU / NOTA</th>
                <th>AGEN / PARTNER</th>
            </tr>
        </thead>
        <tbody id="bodyRiwayat">
            <tr><td colspan="2" style="text-align:center; padding:30px; color:#666;">Memuat data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Gunakan Key Bapak
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Ambil nama dari login (Fallback ke profil Pak Hadiat sesuai instruksi)
    const userLogin = localStorage.getItem("userNama") || "Hadiat";
    document.getElementById('namaUser').innerText = userLogin;

    async function loadRiwayat() {
        try {
            // Hitung tanggal 14 hari yang lalu (2 pekan)
            const duaPekanLalu = new Date();
            duaPekanLalu.setDate(duaPekanLalu.getDate() - 14);
            const isoDate = duaPekanLalu.toISOString();

// Ganti baris ini (Hapus filter .gte):
const { data, error } = await _sb
    .from('transaksi')
    .select('*')
    .or(`driver_1.eq.${userLogin},driver_2.eq.${userLogin}`)
    .order('created_at', { ascending: false });


            const tbody = document.getElementById('bodyRiwayat');
            tbody.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach(item => {
                    const tglObj = new Date(item.created_at);
                    const tglStr = tglObj.toLocaleDateString('id-ID', { weekday: 'short', day: '2-digit', month: 'short' });
                    
                    // Tentukan Partner (Jika saya driver 1, partnernya driver 2, dan sebaliknya)
                    let partner = "-";
                    if (item.driver_1 === userLogin) {
                        partner = item.driver_2 || "Sendiri";
                    } else {
                        partner = item.driver_1 || "Sendiri";
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>
                                <span class="txt-tgl">${tglStr}</span>
                                <span class="txt-nota">${item.no_nota}</span>
                            </td>
                            <td>
                                <span class="txt-agen">${item.nama_agen}</span>
                                <span class="txt-partner">Partner: ${partner}</span>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:40px; color:#666;">Tidak ada kiriman dalam 2 pekan ini.</td></tr>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    window.onload = loadRiwayat;
</script>

</body>
</html>
