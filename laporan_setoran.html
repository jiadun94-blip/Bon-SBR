<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBRdigital | Driver Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #72a339; --text: #e0e0e0; --input-bg: #2d2d2d; }
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .header { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .header h2 span { color: var(--accent); }
        .section-title { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin: 20px 0 10px 5px; letter-spacing: 1px; }
        .card-form { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 8px; color: #888; font-weight: bold; }
        select, input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: var(--input-bg); color: white; font-size: 16px; box-sizing: border-box; }
        
        .nota-container { background: var(--input-bg); border: 1px solid #444; border-radius: 8px; padding: 5px; margin-bottom: 15px; max-height: 350px; overflow-y: auto; }
        .nota-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #444; gap: 15px; }
        .nota-item:last-child { border-bottom: none; }
        .nota-item input[type="checkbox"] { width: 35px; height: 35px; accent-color: var(--accent); flex-shrink: 0; }
        .nota-info { flex: 1; }
        .txt-tgl { font-size: 18px; color: #bbb; display: block; margin-bottom: 4px; border-bottom: 1px dashed #444; padding-bottom: 2px; }
        .baris-bawah { display: flex; justify-content: space-between; gap: 10px; }
        .txt-agen { font-size: 18px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .txt-nota { font-size: 18px; color: #fff; font-weight: 700; }
        
        .readonly-auto { color: #fbc531 !important; font-weight: bold; }
        select:disabled { opacity: 0.5; background: #1a1a1a; cursor: not-allowed; border-color: #333; }
        .btn-setor { width: 100%; padding: 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent) 0%, #2ecc71 100%); color: white; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(114, 163, 57, 0.4); }
    </style>
</head>
<body>

<div style="text-align: center; font-size: 12px; color: #666; margin-bottom: 10px;">Halo, <b id="driverNama" style="color: var(--accent);">...</b></div>
<div class="header"><h2>SBR<span>digital</span> DRIVER</h2></div>

<div class="section-title">📦 PILIH ARMADA & NOTA</div>
<div class="card-form">
    <label>UNIT ARMADA</label>
    <select id="selMobil" onchange="cariNotaAktif()"><option value="">-- Pilih Armada --</option></select>

    <label>DAFTAR NOTA TERKINI</label>
    <div id="notaList" class="nota-container">
        <div style="color:#666; font-size:14px; text-align:center; padding:30px;">Pilih armada...</div>
    </div>

    <label>TOTAL SELURUH CASH (Rp)</label>
    <input type="text" id="uang_cash_disp" class="readonly-auto" placeholder="0" readonly>
    
    <label>ODOMETER TERAKHIR (KM)</label>
    <input type="text" id="km_input" placeholder="Isi angka KM..." oninput="formatRibuan(this)" inputmode="numeric">
</div>

<div class="section-title">💸 RINCIAN PENGELUARAN</div>
<div class="card-form">
    <label id="labelSumber" style="color: #fbc531;">BIAYA DIAMBIL DARI KAS:</label>
    <select id="sumberBiaya" disabled>
        <option value="">-- Otomatis --</option>
    </select>

    <label>UANG JALAN</label>
    <input type="text" id="exp_jalan" placeholder="0" oninput="formatRibuan(this)" inputmode="numeric">
    <label>BENSIN/SOLAR</label>
    <input type="text" id="exp_bbm" placeholder="0" oninput="formatRibuan(this)" inputmode="numeric">
    <label>UANG BONGKAR</label>
    <input type="text" id="exp_bongkar" placeholder="0" oninput="formatRibuan(this)" inputmode="numeric">
    
    <label style="color: #fbc531;">PENGELUARAN LAINNYA</label>
    <input type="text" id="exp_lain_ket" placeholder="Ket: misal Parkir">
    <input type="text" id="exp_lain_nom" placeholder="0" oninput="formatRibuan(this)" inputmode="numeric">

    <button class="btn-setor" onclick="setorDataHariIni()">🚀 SIMPAN & KIRIM WA</button>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dataNotaTerakhir = [];

    function formatRibuan(elemen) {
        let val = elemen.value.replace(/[^0-9]/g, "");
        if (val === "") { elemen.value = ""; return; }
        elemen.value = parseInt(val).toLocaleString('id-ID');
    }

    function getAngka(str) {
        return parseInt(str.replace(/[^0-9]/g, "")) || 0;
    }

    async function loadArmada() {
        const { data } = await _sb.from('monitoring_kendaraan').select('plat_nomor, nama_unit');
        const sel = document.getElementById('selMobil');
        sel.innerHTML = '<option value="">-- Pilih Armada --</option>';
        data.forEach(v => {
            let opt = document.createElement('option');
            opt.value = v.plat_nomor;
            opt.text = v.nama_unit;
            sel.appendChild(opt);
        });
    }

    async function cariNotaAktif() {
        const plat = document.getElementById('selMobil').value;
        if(!plat) return;
        const { data } = await _sb.from('transaksi').select('*').eq('plat_nomor', plat).order('created_at', { ascending: false }).limit(3);
        dataNotaTerakhir = data;
        const container = document.getElementById('notaList');
        container.innerHTML = '';
        
        data.forEach(n => {
            const tglNota = new Date(n.created_at).toLocaleDateString('id-ID', { weekday: 'short', day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
            const div = document.createElement('div');
            div.className = 'nota-item';
            div.innerHTML = `
                <input type="checkbox" name="nota_pilih" value="${n.no_nota}" onchange="hitungOtomatis()">
                <div class="nota-info">
                    <span class="txt-tgl">${tglNota}</span>
                    <div class="baris-bawah">
                        <span class="txt-agen">${n.nama_agen}</span>
                        <span class="txt-nota">${n.no_nota}</span>
                    </div>
                </div>`;
            container.appendChild(div);
        });
    }

    function hitungOtomatis() {
        const checked = Array.from(document.querySelectorAll('input[name="nota_pilih"]:checked'));
        let totalCash = 0; let detailBundel = []; let drivers = new Set();
        const selSumber = document.getElementById('sumberBiaya');
        const labelSumber = document.getElementById('labelSumber');
        
        selSumber.innerHTML = '';
        
        checked.forEach(cb => {
            const item = dataNotaTerakhir.find(x => x.no_nota === cb.value);
            if(item) {
                totalCash += parseInt(item.bayar_cash);
                detailBundel.push({ agen: item.nama_agen, nota: item.no_nota, cash: item.bayar_cash });
                if(item.driver_1) drivers.add(item.driver_1);
                if(item.driver_2) drivers.add(item.driver_2);
                
                let opt = document.createElement('option');
                opt.value = item.nama_agen;
                opt.text = item.nama_agen;
                selSumber.appendChild(opt);
            }
        });

        if (checked.length > 1) {
            selSumber.disabled = false;
            labelSumber.innerText = "BIAYA DIAMBIL DARI KAS (PILIH SALAH SATU):";
            selSumber.style.borderColor = "#fbc531";
        } else {
            selSumber.disabled = true;
            labelSumber.innerText = "BIAYA DIAMBIL DARI KAS (OTOMATIS):";
            selSumber.style.borderColor = "#444";
        }
        
        document.getElementById('uang_cash_disp').value = totalCash.toLocaleString('id-ID');
        return { detail: detailBundel, drv: Array.from(drivers).join(' & '), rawTotal: totalCash };
    }

    async function setorDataHariIni() {
        const plat = document.getElementById('selMobil').value;
        const kmRaw = getAngka(document.getElementById('km_input').value);
        const checked = Array.from(document.querySelectorAll('input[name="nota_pilih"]:checked'));
        const calc = hitungOtomatis();

        if(checked.length === 0 || kmRaw === 0) return alert("Pilih Nota & Isi Odometer!");
        
        const sumber = document.getElementById('sumberBiaya').value || (calc.detail.length > 0 ? calc.detail[0].agen : "");
        if(checked.length > 1 && !document.getElementById('sumberBiaya').value) return alert("Pilih agen mana yang uangnya dipakai!");

        const uJalan = getAngka(document.getElementById('exp_jalan').value);
        const uBBM = getAngka(document.getElementById('exp_bbm').value);
        const uBongkar = getAngka(document.getElementById('exp_bongkar').value);
        const ketLain = document.getElementById('exp_lain_ket').value || "Lain-lain";
        const nomLain = getAngka(document.getElementById('exp_lain_nom').value);
        
        const totalExp = uJalan + uBBM + uBongkar + nomLain;
        const sisaBersih = calc.rawTotal - totalExp;

        try {
            // 1. Simpan ke rekap laporan
            await _sb.from('rekap_laporan_driver').insert([{
                nama_driver: calc.drv, plat_nomor: plat, 
                nama_agen: calc.detail.map(d => d.agen).join(', '), 
                no_nota: calc.detail.map(d => d.nota).join(', '),
                uang_cash_diterima: calc.rawTotal, km_input: kmRaw,
                uang_jalan: uJalan, uang_bbm: uBBM, uang_bongkar: uBongkar,
                ket_lainnya: ketLain, nominal_lainnya: nomLain,
                sumber_biaya_dari: sumber
            }]);

            // 2. SINKRONISASI: Update KM di monitoring kendaraan
            await _sb.from('monitoring_kendaraan')
                .update({ km_saat_ini: kmRaw })
                .eq('plat_nomor', plat);

            const tgl = new Date().toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
            
            let pesan = "*LAPORAN SETORAN DRIVER*\n";
            pesan += "----------------------------\n";
            pesan += "📅 *Tgl:* " + tgl + "\n";
            pesan += "👤 *Driver:* " + calc.drv + "\n";
            pesan += "🚗 *Unit:* " + plat + "\n";
            pesan += "📍 *Odo:* " + kmRaw.toLocaleString('id-ID') + " KM\n\n";
            
            pesan += "*RINCIAN BUNDEL CASH:*\n";
            calc.detail.forEach(b => {
                pesan += "▫️ " + b.agen + " (" + b.nota + "): *Rp " + parseInt(b.cash).toLocaleString('id-ID') + "*\n";
            });
            pesan += "💰 *Total Kotor:* Rp " + calc.rawTotal.toLocaleString('id-ID') + "\n\n";

            pesan += "*PENGELUARAN JALAN:*\n";
            pesan += "👉 _Biaya dari bundel: *" + sumber + "*_\n";
            pesan += "▫️ Uang Jalan: Rp " + uJalan.toLocaleString('id-ID') + "\n";
            pesan += "▫️ BBM/Solar: Rp " + uBBM.toLocaleString('id-ID') + "\n";
            pesan += "▫️ Bongkar: Rp " + uBongkar.toLocaleString('id-ID') + "\n";
            if(nomLain > 0) pesan += "▫️ " + ketLain + ": Rp " + nomLain.toLocaleString('id-ID') + "\n";
            
            pesan += "----------------------------\n";
            pesan += "📊 *Total Biaya:* Rp " + totalExp.toLocaleString('id-ID') + "\n";
            pesan += "💵 *SISA SETOR:* Rp " + sisaBersih.toLocaleString('id-ID') + "\n\n";
            pesan += "_Data tersimpan di SBRdigital_";

            window.open("https://wa.me/?text=" + encodeURIComponent(pesan), '_blank');
            location.reload();
        } catch (e) { alert(e.message); }
    }

    window.onload = loadArmada;
    document.getElementById('driverNama').innerText = localStorage.getItem("userNama") || "Driver";
</script>
</body>
</html>
