<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBRdigital | Fleet Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #121212; 
            --card-dark: #1e1e1e;
            --accent: #72a339;
            --danger: #ff7675;
            --blue: #3498db;
            --text: #e0e0e0;
        }

        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-dark); 
            color: var(--text); 
        }

        .container { max-width: 500px; margin: auto; }

        /* --- BAGIAN YANG DI-FREEZE (STICKY) --- */
        .sticky-top-panel {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-dark);
            padding: 15px 15px 5px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .header-main { text-align: center; margin-bottom: 15px; }
        .header-main h2 { margin: 0; color: var(--accent); font-size: 20px; letter-spacing: 1px; }
        
        .quick-update {
            background: var(--card-dark); 
            padding: 12px; border-radius: 12px; 
            border: 1px solid #333;
        }
        .quick-update label { 
            font-size: 10px; font-weight: bold; color: var(--blue); 
            margin-bottom: 8px; display: block; text-transform: uppercase;
        }

        select, input { 
            width: 100%; padding: 10px; margin-bottom: 8px; 
            border-radius: 6px; border: 1px solid #444; 
            background: #2d2d2d; color: white; font-family: inherit; font-size: 14px;
        }

        button { 
            width: 100%; padding: 12px; border-radius: 6px; 
            border: none; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; font-family: inherit; font-size: 13px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-wa { background: #25D366; color: white; margin-top: 6px; }

        /* --- BAGIAN DAFTAR ARMADA (SCROLLABLE) --- */
        .scroll-content {
            padding: 15px;
        }

        .unit-card { 
            background: var(--card-dark); border-radius: 12px; 
            padding: 15px; margin-bottom: 15px; 
            border: 1px solid #333; border-left: 5px solid #444;
        }
        .unit-card.critical { border-left-color: var(--danger); background: #2a1a1a; }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-top strong { font-size: 18px; color: white; }
        .plat-tag { background: #333; color: var(--blue); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .stat-label { font-size: 9px; color: #888; display: block; text-transform: uppercase; margin-bottom: 3px; }
        .stat-val { font-size: 13px; font-weight: bold; }
        
        /* MODAL */
        #modalDetail { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            z-index: 200; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        .modal-content { 
            background: var(--card-dark); border-radius: 15px; 
            padding: 20px; border: 1px solid #444; max-width: 450px; margin: auto;
        }
        .section-h { 
            background: #333; color: var(--accent); padding: 8px; 
            border-radius: 4px; font-size: 12px; font-weight: bold; 
            margin: 15px 0 10px 0; border-left: 3px solid var(--accent);
        }

        .service-item { 
            display: flex; justify-content: space-between; 
            padding: 10px 0; border-bottom: 1px solid #333; font-size: 13px; 
        }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .tag-ok { background: #1b2e1b; color: #72a339; }
        .tag-danger { background: #3a1a1a; color: var(--danger); }
        .status-red { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <!-- PANEL INI AKAN TETAP DI ATAS -->
    <div class="sticky-top-panel">
        <div class="header-main">
            <h2>SBR FLEET CONTROL</h2>
        </div>

        <div class="quick-update">
            <label>📍 ODOMETER & ALERT SYSTEM</label>
            <select id="selMobilQuick"></select>
            <input type="number" id="valKMQuick" placeholder="Input KM Sekarang..." inputmode="numeric">
            <button class="btn-primary" onclick="quickUpdateKM()">SIMPAN KM</button>
            <button class="btn-wa" onclick="sendWAAlert()">📢 KIRIM ALERT WA KE GRUP</button>
        </div>
        <div style="font-size: 10px; color: #555; font-weight: bold; margin-top: 10px; text-align: center;">DAFTAR STATUS UNIT</div>
    </div>

    <!-- PANEL INI YANG BISA DI-SCROLL -->
    <div id="dashboard" class="scroll-content">
        <div style="text-align:center; padding:20px; color:#666;">Memuat data...</div>
    </div>
</div>

<!-- MODAL DETAIL -->
<div id="modalDetail">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h2 id="m_unit" style="margin: 0; color:white;"></h2>
                <span id="m_plat" style="color: var(--blue); font-weight: bold;"></span>
            </div>
            <div style="text-align: right;">
                <span id="m_km" style="font-size: 20px; font-weight: bold; color:var(--accent);"></span><br>
                <small style="color: #666;">ODO KM</small>
            </div>
        </div>
        <div class="section-h">🛠️ SERVIS BERKALA</div>
        <div id="group_berkala"></div>
        <div class="section-h">⚙️ SERVIS MENDALAM</div>
        <div id="group_mendalam"></div>
        <div class="section-h">🔄 UPDATE DATA</div>
        <select id="m_jenis">
            <option value="km_terakhir_oli">Ganti Oli (5rb)</option>
            <option value="km_terakhir_servis_berkala">Servis Berkala (10rb)</option>
            <option value="km_terakhir_servis_mendalam">Servis Mendalam (20rb)</option>
            <option value="km_terakhir_servis_gardan">Oli Gardan (40rb)</option>
            <option value="tgl_kir_expired">Update Expired KIR</option>
            <option value="tgl_pajak_expired">Update Expired Pajak</option>
        </select>
        <input type="text" id="m_val" placeholder="KM Baru / Tgl">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button class="btn-primary" onclick="submitMaintenance()">SIMPAN</button>
            <button style="background:#444; color:white;" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let listArmada = [];
    let activePlat = "";

    document.getElementById('m_jenis').addEventListener('change', function() {
        const inp = document.getElementById('m_val');
        inp.type = this.value.includes('tgl') ? 'date' : 'number';
    });

    async function init() {
        const { data } = await clientSupabase.from('monitoring_kendaraan').select('*').order('nama_unit');
        listArmada = data || [];
        renderDashboard();
    }

    function renderDashboard() {
        const dash = document.getElementById('dashboard');
        const sel = document.getElementById('selMobilQuick');
        dash.innerHTML = "";
        sel.innerHTML = '<option value="">-- PILIH MOBIL --</option>';

        listArmada.forEach(v => {
            sel.options.add(new Option(`${v.nama_unit} (${v.plat_nomor})`, v.plat_nomor));
            const sisaOli = (v.km_terakhir_oli + 5000) - v.km_saat_ini;
            const sisaKIR = v.tgl_kir_expired ? Math.ceil((new Date(v.tgl_kir_expired) - new Date()) / 86400000) : '-';
            const sisaPajak = v.tgl_pajak_expired ? Math.ceil((new Date(v.tgl_pajak_expired) - new Date()) / 86400000) : '-';
            const isCritical = sisaOli < 500 || (sisaKIR !== '-' && sisaKIR < 14) || (sisaPajak !== '-' && sisaPajak < 14);

            dash.innerHTML += `
                <div class="unit-card ${isCritical?'critical':''}" onclick="openDetail('${v.plat_nomor}')">
                    <div class="card-top"><strong>${v.nama_unit}</strong><span class="plat-tag">${v.plat_nomor}</span></div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">SISA OLI</span><span class="stat-val ${sisaOli<500?'status-red':''}">${sisaOli.toLocaleString()} KM</span></div>
                        <div class="stat-box"><span class="stat-label">SISA KIR</span><span class="stat-val ${sisaKIR<14?'status-red':''}">${sisaKIR} Hr</span></div>
                        <div class="stat-box"><span class="stat-label">SISA PAJAK</span><span class="stat-val ${sisaPajak<14?'status-red':''}">${sisaPajak} Hr</span></div>
                        <div class="stat-box"><span class="stat-label">ODO KM</span><span class="stat-val" style="color:var(--accent)">${(v.km_saat_ini||0).toLocaleString()}</span></div>
                    </div>
                </div>`;
        });
    }

    function sendWAAlert() {
        let pesan = "*⚠️ SBR FLEET CONTROL ALERT ⚠️*%0A%0AMohon atensi driver unit berikut:%0A";
        let adaData = false;
        listArmada.forEach(v => {
            const sisaOli = (v.km_terakhir_oli + 5000) - v.km_saat_ini;
            const sisaKIR = v.tgl_kir_expired ? Math.ceil((new Date(v.tgl_kir_expired) - new Date()) / 86400000) : 999;
            const sisaPajak = v.tgl_pajak_expired ? Math.ceil((new Date(v.tgl_pajak_expired) - new Date()) / 86400000) : 999;
            if(sisaOli < 500 || sisaKIR < 14 || sisaPajak < 14) {
                adaData = true;
                pesan += `%0A📌 *${v.nama_unit}* (${v.plat_nomor}):`;
                if(sisaOli < 500) pesan += `%0A  - Oli: ${sisaOli.toLocaleString()} KM lagi`;
                if(sisaKIR < 14) pesan += `%0A  - KIR: ${sisaKIR} hr lagi`;
                if(sisaPajak < 14) pesan += `%0A  - Pajak: ${sisaPajak} hr lagi`;
                pesan += "%0A";
            }
        });
        if(!adaData) return alert("Unit aman.");
        pesan += "%0AMohon segera diagendakan servis/perpanjangan. Salam SBR! 🙏";
        window.open(`https://wa.me/?text=${pesan}`, '_blank');
    }

    async function openDetail(plat) {
        activePlat = plat;
        const v = listArmada.find(x => x.plat_nomor === plat);
        document.getElementById('m_unit').innerText = v.nama_unit;
        document.getElementById('m_plat').innerText = v.plat_nomor;
        document.getElementById('m_km').innerText = (v.km_saat_ini||0).toLocaleString();
        
        renderServiceItems('group_berkala', [
            {n:"Ganti Oli Mesin", l:v.km_terakhir_oli, i:5000},
            {n:"Filter Oli & Udara", l:v.km_terakhir_servis_berkala||0, i:10000},
            {n:"Tune Up Berkala", l:v.km_terakhir_servis_berkala||0, i:10000}
        ], v.km_saat_ini);

        renderServiceItems('group_mendalam', [
            {n:"Rem & Busi", l:v.km_terakhir_servis_mendalam||0, i:20000},
            {n:"Kaki-kaki / Suspensi", l:v.km_terakhir_servis_mendalam||0, i:20000},
            {n:"Oli Transmisi/Gardan", l:v.km_terakhir_servis_gardan||0, i:40000}
        ], v.km_saat_ini);

        document.getElementById('modalDetail').style.display = "block";
    }

    function renderServiceItems(id, items, kmNow) {
        const container = document.getElementById(id); container.innerHTML = "";
        items.forEach(item => {
            const sisa = (item.l + item.i) - kmNow;
            const isLate = sisa < 0;
            container.innerHTML += `<div class="service-item"><span>${item.n}</span><span class="tag ${isLate?'tag-danger':'tag-ok'}">${isLate?'LEWAT':'AMAN'} (${sisa.toLocaleString()} KM)</span></div>`;
        });
    }

    function closeModal() { document.getElementById('modalDetail').style.display = "none"; }

    async function quickUpdateKM() {
        const plat = document.getElementById('selMobilQuick').value;
        const km = parseInt(document.getElementById('valKMQuick').value);
        if(!plat || !km) return alert("Pilih unit & input KM!");
        const { error } = await clientSupabase.from('monitoring_kendaraan').update({ km_saat_ini: km }).eq('plat_nomor', plat);
        if(!error) location.reload();
    }

    async function submitMaintenance() {
        const kol = document.getElementById('m_jenis').value;
        const val = document.getElementById('m_val').value;
        if(!val) return alert("Input nilai!");
        const upd = {}; upd[kol] = kol.includes('tgl') ? val : parseInt(val);
        const { error } = await clientSupabase.from('monitoring_kendaraan').update(upd).eq('plat_nomor', activePlat);
        if(!error) location.reload();
    }

    window.onload = init;
</script>
</body>
</html>
