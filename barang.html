<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Barang</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f1f2f6; --card: #ffffff; --accent: #72a339; }
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg); padding: 15px; }
        .card-form { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
        label { display: block; font-size: 11px; margin-bottom: 8px; color: #888; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-aksi { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-batal { background: #636e72; display: none; margin-top: 10px; }
        
        /* Tabel & Popup */
        .tabel-barang { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        .tabel-barang th { background: #1e272e; color: white; padding: 12px; text-align: left; font-size: 14px; }
        .tabel-barang td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        #popupOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div style="padding-bottom:10px;"><a href="dashboard.html" style="text-decoration:none; color:#72a339; font-weight:bold;">« Kembali ke Menu Utama</a></div>

<div class="card-form">
    <input type="hidden" id="edit_id">
    <label>KODE BARANG</label>
    <input type="text" id="kode_barang" placeholder="SBR035">
    <label>NAMA BARANG</label>
    <input type="text" id="nama_barang" placeholder="Nama barang...">
    <button class="btn-aksi" id="btn_simpan" onclick="prosesData()">🚀 SIMPAN BARANG</button>
    <button class="btn-aksi btn-batal" id="btn_batal" onclick="resetForm()">❌ BATAL EDIT</button>
</div>

<div class="card-form">
    <table class="tabel-barang">
        <thead><tr><th>Kode</th><th>Nama Barang</th></tr></thead>
        <tbody id="tabelBody"></tbody>
    </table>
</div>

<div id="popupOverlay">
    <div style="background:#2d2d2d; color:white; width:80%; max-width:300px; border-radius:15px; overflow:hidden; text-align:center;">
        <button onclick="pilihAksi('edit')" style="width:100%; padding:20px; border:none; background:transparent; color:#fff; font-size:16px; border-bottom:1px solid #444;">📝 EDIT DATA</button>
        <button onclick="pilihAksi('hapus')" style="width:100%; padding:20px; border:none; background:transparent; color:#ff4757; font-size:16px; border-bottom:1px solid #444;">🗑️ HAPUS DATA</button>
        <button onclick="document.getElementById('popupOverlay').style.display='none'" style="width:100%; padding:20px; border:none; background:transparent; color:#fff; font-size:16px;">❌ BATAL</button>
    </div>
</div>

<script>
    const _sb = supabase.createClient("https://yxcxvkairftqzmptkorr.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs");
    let pressTimer, selectedBarang;

    async function muatData() {
        const { data } = await _sb.from('barang').select('*').order('id', { ascending: false });
        const tbody = document.getElementById('tabelBody');
        tbody.innerHTML = '';
        data?.forEach(b => {
            const tr = document.createElement('tr');
            tr.onmousedown = () => pressTimer = setTimeout(() => { selectedBarang = b; document.getElementById('popupOverlay').style.display="flex"; }, 600);
            tr.onmouseup = () => clearTimeout(pressTimer);
            tr.ontouchstart = () => pressTimer = setTimeout(() => { selectedBarang = b; document.getElementById('popupOverlay').style.display="flex"; }, 600);
            tr.ontouchend = () => clearTimeout(pressTimer);
            tr.innerHTML = `<td>${b.kode_barang}</td><td>${b.nama_barang}</td>`;
            tbody.appendChild(tr);
        });
    }

    function pilihAksi(aksi) {
        document.getElementById('popupOverlay').style.display = "none";
        if(aksi === 'edit') {
            document.getElementById('edit_id').value = selectedBarang.id;
            document.getElementById('kode_barang').value = selectedBarang.kode_barang;
            document.getElementById('nama_barang').value = selectedBarang.nama_barang;
            document.getElementById('btn_simpan').innerText = "💾 UPDATE DATA";
            document.getElementById('btn_batal').style.display = "block";
        } else {
            if(confirm("Yakin hapus data ini?")) hapusBarang(selectedBarang.id);
        }
    }

    async function prosesData() {
        const id = document.getElementById('edit_id').value;
        const data = { kode_barang: document.getElementById('kode_barang').value, nama_barang: document.getElementById('nama_barang').value };
        if(id) await _sb.from('barang').update(data).eq('id', id);
        else await _sb.from('barang').insert([data]);
        resetForm(); muatData();
    }

    async function hapusBarang(id) {
        await _sb.from('barang').delete().eq('id', id);
        muatData();
    }

    function resetForm() {
        document.getElementById('edit_id').value = '';
        document.getElementById('kode_barang').value = '';
        document.getElementById('nama_barang').value = '';
        document.getElementById('btn_simpan').innerText = "🚀 SIMPAN BARANG";
        document.getElementById('btn_batal').style.display = "none";
    }

    window.onload = muatData;
</script>
</body>
</html>
