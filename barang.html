<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBRdigital | Input Barang</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #72a339; --text: #e0e0e0; --input-bg: #2d2d2d; }
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #333; }
        .header h2 span { color: var(--accent); }
        .card-form { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #333; }
        label { display: block; font-size: 11px; margin-bottom: 8px; color: #888; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #444; background: var(--input-bg); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-simpan { width: 100%; padding: 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent) 0%, #2ecc71 100%); color: white; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header"><h2>SBR<span>digital</span> INPUT BARANG</h2></div>

<div class="card-form">
    <label>KODE BARANG</label>
    <input type="text" id="kode_barang" placeholder="Contoh: SBR035">
    
    <label>NAMA BARANG</label>
    <input type="text" id="nama_barang" placeholder="Nama barang...">

    <button class="btn-simpan" onclick="simpanBarang()">🚀 SIMPAN BARANG</button>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function simpanBarang() {
        const kode = document.getElementById('kode_barang').value;
        const nama = document.getElementById('nama_barang').value;

        if(!kode || !nama) return alert("⚠️ Harap isi Kode dan Nama Barang!");

        try {
            const { error } = await _sb.from('barang').insert([{
                kode_barang: kode,
                nama_barang: nama
            }]);

            if(error) throw error;

            alert("✅ Barang berhasil disimpan!");
            document.getElementById('kode_barang').value = '';
            document.getElementById('nama_barang').value = '';
        } catch(e) {
            alert("❌ Error: " + e.message);
        }
    }
</script>
</body>
</html>
