<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR | Report Mingguan v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* TEMA CHARCOAL BASE */
        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background-color: #121212; 
            color: #eee; 
            margin: 0; padding: 10px; 
        }

        .card { 
            background: #1e1e1e; 
            border-radius: 8px; 
            padding: 15px; 
            border: 1px solid #333; 
            margin-bottom: 20px; 
        }

        h2 { 
            margin: 0 0 15px; font-size: 16px; text-align: center; 
            background: #333; padding: 10px; border-radius: 6px; 
            color: #fff; text-transform: uppercase; 
        }

        /* FILTER SECTION - LEBIH LEGA UNTUK TABLET */
        .filter-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto; 
            gap: 10px; 
            align-items: end; 
            margin-bottom: 15px; 
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
        }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 11px; margin-bottom: 5px; color: #aaa; }
        
        input[type="date"] { 
            background: #2d2d2d; border: 1px solid #444; 
            color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; 
        }
        
        button { 
            background: #3b4c64; color: white; border: none; 
            padding: 11px 20px; border-radius: 4px; cursor: pointer; 
            font-weight: bold; font-size: 13px; 
        }
        button:active { transform: scale(0.98); background: #2c3e50; }

        /* TABLE AREA - TETAP PUTIH AGAR KONTRAST */
        .table-container { 
            width: 100%; 
            max-height: 70vh; 
            overflow: auto; 
            border: 1px solid #444; 
            border-radius: 4px; 
            background: #fff; 
        }

        table { width: auto; min-width: 100%; border-collapse: separate; border-spacing: 0; background: white; color: #000; }
        th, td { border: 1px solid #333; padding: 4px 6px; font-size: 11px; text-align: center; white-space: nowrap; }
        
        /* FREEZE HEADER & KOLOM */
        thead tr th { position: sticky; top: 0; z-index: 20; background: #f0f0f0; }
        thead tr:nth-child(2) th { top: 25px; } /* Sesuaikan tinggi baris pertama */
        
        .sticky-col-1 { position: sticky; left: 0; z-index: 25; background: #fff; border-right: 1px solid #333; }
        .sticky-col-2 { position: sticky; left: 32px; z-index: 25; background: #fff; border-right: 2px solid #333; }
        thead th.sticky-col-1, thead th.sticky-col-2 { z-index: 30; background: #e2e8f0; }

        .head-driver { background: #dcfce7 !important; color: #166534; font-weight: bold; font-size: 12px; }
        .row-day { background: #f1f5f9; font-weight: bold; text-align: left; color: #1e293b; }

        /* Badge Agen Auto-Color */
        .badge-agen { 
            display: block; font-size: 10px; font-weight: bold;
            line-height: 1.3; margin: 2px 0; padding: 3px 5px;
            border-radius: 3px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="card">
    <h2>REPORT MINGGUAN AGEN vs DRIVER</h2>
    
    <div class="filter-section">
        <div class="filter-group">
            <label>TANGGAL MULAI</label>
            <input type="date" id="tglAwal" onchange="updateTglAkhir()">
        </div>
        <div class="filter-group">
            <label>TANGGAL SELESAI (AUTO)</label>
            <input type="date" id="tglAkhirDisplay" readonly>
        </div>
        <button onclick="muatReport()">TAMPILKAN</button>
    </div>

    <div class="table-container">
        <table id="tabelReport">
            <thead>
                <tr id="headerDriver">
                    <th class="sticky-col-1">TGL</th>
                    <th class="sticky-col-2">SHIFT</th>
                    <!-- Nama driver akan masuk sini lewat JS -->
                </tr>
                <tr id="subHeaderJumlah">
                    <th colspan="2" class="sticky-col-1">TOTAL KIRIM</th>
                    <!-- Total per driver akan masuk sini lewat JS -->
                </tr>
            </thead>
            <tbody id="bodyReport">
                <tr><td colspan="13" style="padding:30px; color:#666;">Pilih tanggal awal lalu klik Tampilkan.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    const listDriver = ["Mpang", "Ikih", "Ebod", "Kido", "Ugun", "Dena", "Bento", "Ahen", "Nur", "Aceng", "Robbi"];

    window.onload = () => {
        const d = new Date();
        d.setDate(d.getDate() - 6);
        document.getElementById('tglAwal').value = d.toISOString().split('T')[0];
        updateTglAkhir();
        renderHeader();
    };

    function updateTglAkhir() {
        const val = document.getElementById('tglAwal').value;
        if(val) {
            const tglSelesai = new Date(val);
            tglSelesai.setDate(tglSelesai.getDate() + 6);
            document.getElementById('tglAkhirDisplay').value = tglSelesai.toISOString().split('T')[0];
        }
    }

    function renderHeader() {
        const headRow = document.getElementById('headerDriver');
        const subRow = document.getElementById('subHeaderJumlah');
        listDriver.forEach(dv => {
            headRow.innerHTML += `<th class="head-driver">${dv.toUpperCase()}</th>`;
            subRow.innerHTML += `<th id="total-${dv}" style="background:#f0fdf4; color:#166534; font-weight:bold;">0</th>`;
        });
    }

    function getBadgeStyle(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const hex = (hash & 0x00FFFFFF).toString(16).toUpperCase().padStart(6, '0');
        const r = parseInt(hex.substr(0,2), 16), g = parseInt(hex.substr(2,2), 16), b = parseInt(hex.substr(4,2), 16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return `background-color: #${hex}; color: ${(yiq >= 128) ? 'black' : 'white'};`;
    }

    async function muatReport() {
        const tglAwal = document.getElementById('tglAwal').value;
        const tglAkhir = document.getElementById('tglAkhirDisplay').value;
        const body = document.getElementById('bodyReport');
        body.innerHTML = "<tr><td colspan='15' style='padding:40px;'>Sedang menarik data transaksi...</td></tr>";

        const { data, error } = await _sb.from('transaksi')
            .select('tanggal, nama_agen, driver_1, driver_2, created_at')
            .gte('tanggal', tglAwal).lte('tanggal', tglAkhir);

        if (error) { alert(error.message); return; }

        body.innerHTML = "";
        let counts = {};
        listDriver.forEach(dv => counts[dv] = 0);

        for (let i = 0; i < 7; i++) {
            let curr = new Date(tglAwal);
            curr.setDate(curr.getDate() + i);
            let tglStr = curr.toISOString().split('T')[0];
            let hari = curr.toLocaleDateString('id-ID', { weekday: 'long' });

            body.innerHTML += `<tr class="row-day"><td colspan="15" style="padding:8px 12px; border-bottom:2px solid #333;">📅 ${hari.toUpperCase()}, ${tglStr}</td></tr>`;

            const shifts = [
                { nama: "Subuh", jam: [4, 9] },
                { nama: "Siang", jam: [10, 17] },
                { nama: "Malam", jam: [18, 3] }
            ];

            shifts.forEach(sh => {
                let row = `<tr>`;
                if (sh.nama === "Subuh") row += `<td rowspan="3" class="text-bold sticky-col-1" style="background:#fff;">${tglStr.split('-').reverse()[0]}</td>`;
                row += `<td class="text-bold sticky-col-2" style="background:#fff; color:#3b4c64;">${sh.nama}</td>`;

                listDriver.forEach(dv => {
                    const filtered = data.filter(d => {
                        if (d.tanggal !== tglStr || (d.driver_1 !== dv && d.driver_2 !== dv)) return false;
                        let jamInput = new Date(d.created_at).getHours();
                        return sh.nama === "Malam" ? (jamInput >= 18 || jamInput <= 3) : (jamInput >= sh.jam[0] && jamInput <= sh.jam[1]);
                    });

                    let agenHtml = filtered.map(f => `<span class="badge-agen" style="${getBadgeStyle(f.nama_agen)}">${f.nama_agen}</span>`).join('');
                    row += `<td>${agenHtml}</td>`;
                    counts[dv] += filtered.length;
                });
                row += `</tr>`;
                body.innerHTML += row;
            });
        }
        listDriver.forEach(dv => document.getElementById(`total-${dv}`).innerText = counts[dv]);
    }
</script>
</body>
</html>
