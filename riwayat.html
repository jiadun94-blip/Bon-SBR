<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | History Driver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; padding: 10px; color: #333; }
        
        /* Mengatur batas tinggi container agar fungsi sticky header berjalan saat di-scroll */
        .table-container { 
            overflow-x: auto; 
            overflow-y: auto; 
            max-height: 80vh; /* Mengunci tinggi wadah agar bisa di-scroll ke bawah */
            background: white; 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
        }
        
        /* Menggunakan 'separate' agar garis border th tetap stabil saat di-freeze */
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 14px; white-space: nowrap; background: white; }
        th, td { border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; padding: 10px 8px; text-align: center; }
        th:first-child, td:first-child { border-left: 1px solid #ddd; }
        
        /* --- FITUR FREEZE HEADER --- */
        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        th { 
            background: #1e272e; 
            color: white; 
            font-weight: bold; 
            font-size: 15px; /* Menggedekan teks header utama */
            border-top: 1px solid #ddd;
            letter-spacing: 0.5px;
        }
        
        tr:nth-child(even) { background: #f9f9f9; }
        h3 { font-size: 18px; color: #222; margin: 12px 0; font-weight: bold; }
        a { font-size: 15px; text-decoration: none; color: #72a339; font-weight: bold; }
        
        /* Ukuran font Hari/Tanggal dibuat lebih besar dan tebal */
        .row-day-title { font-size: 14px; font-weight: bold; text-align: left; background: #edf2f7; color: #1e293b; }
        
        /* --- UKURAN BADGE AGEN DIPERBESAR & DITEBALKAN --- */
        .badge-agen { 
            display: block; 
            font-weight: bold; 
            font-size: 15px; /* Dongkrak font nama agen agar jelas di HP */
            padding: 4px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        
        /* Style Tambahan untuk Baris Total Mingguan */
        .row-total-weekly { background: #1a202c !important; color: #fff !important; font-weight: bold; }
        .row-total-weekly td { border: 1px solid #4a5568; padding: 10px 8px; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div style="padding-bottom:10px;"><a href="dashboard.html">« Kembali ke Menu Utama</a></div>
<h3>HISTORY TRANSAKSI TIM DRIVER (SPLIT MINGGUAN)</h3>

<div class="table-container">
    <table id="tabelHistory">
        <thead>
            <tr id="headerRow">
                <th style="background: #1e272e; color: white;">HARI / TANGGAL</th>
            </tr>
        </thead>
        <tbody id="bodyRow">
            <tr><td colspan="1" style="padding:20px; color:#666; font-size:14px;">Sedang memuat history...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Menggunakan API Key asli bawaan Anda yang berfungsi normal
    const _sb = supabase.createClient("https://yxcxvkairftqzmptkorr.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs");

    // --- FITUR AUTO WARNA TEKS AGEN ---
    function getWarnaAgen(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash % 360);
        const saturation = 85; // Menaikkan saturasi sedikit agar warna makin kontras di font besar
        const lightness = 30;  // Dibuat agak gelap sedikit agar makin solid terbaca
        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    }

    async function loadHistory() {
        const { data: listTransaksi, error } = await _sb.from('transaksi').select('tanggal, nama_agen, driver_1, driver_2');
        
        if (error) return alert("Gagal ambil data: " + error.message);

        let driverUnik = new Set();
        let dataMap = {}; 

        // 1. Olah data transaksi masuk ke map
        listTransaksi.forEach(t => {
            if (!t.tanggal) return;

            let tglKey = t.tanggal; 
            let dateObj = new Date(tglKey);
            let hariNo = dateObj.getDay(); 
            let hariNama = dateObj.toLocaleDateString('id-ID', { weekday: 'long' });
            let tglIndo = tglKey.split('-').reverse().join('/'); 
            let labelHariTanggal = `${hariNama}, ${tglIndo}`;
            let agen = t.nama_agen || "Tanpa Agen";

            if (t.driver_1) driverUnik.add(t.driver_1);
            if (t.driver_2) driverUnik.add(t.driver_2);

            if (!dataMap[tglKey]) {
                dataMap[tglKey] = { 
                    label: labelHariTanggal, 
                    timestamp: dateObj.getTime(), 
                    hariKe: hariNo, 
                    drivers: {} 
                };
            }

            const masukkanDataDriver = (namaDriver) => {
                if (namaDriver) {
                    if (!dataMap[tglKey].drivers[namaDriver]) {
                        dataMap[tglKey].drivers[namaDriver] = [];
                    }
                    if (!dataMap[tglKey].drivers[namaDriver].includes(agen)) {
                        dataMap[tglKey].drivers[namaDriver].push(agen);
                    }
                }
            };

            masukkanDataDriver(t.driver_1);
            masukkanDataDriver(t.driver_2);
        });

        let listDriverSorted = Array.from(driverUnik).sort();

        // 2. Render Header Driver (dengan CSS Sticky & Font Besar)
        const headerRow = document.getElementById('headerRow');
        listDriverSorted.forEach(dv => {
            headerRow.innerHTML += `<th style="background: #166534; color: white; position: sticky; top: 0; font-size: 15px; font-weight: bold;">${dv.toUpperCase()}</th>`;
        });

        // 3. Render Baris Data + Hitung Totalan Mingguan
        const bodyRow = document.getElementById('bodyRow');
        bodyRow.innerHTML = ""; 

        let sortedDates = Object.keys(dataMap).sort((a, b) => dataMap[a].timestamp - dataMap[b].timestamp);

        if (sortedDates.length === 0) {
            bodyRow.innerHTML = `<tr><td colspan="${listDriverSorted.length + 1}" style="padding:20px; color:#666; font-size:14px;">Belum ada data history transaksi.</td></tr>`;
            return;
        }

        let akumulasiMingguan = {};
        const resetAkumulasi = () => {
            listDriverSorted.forEach(dv => akumulasiMingguan[dv] = 0);
        };
        resetAkumulasi();

        const cetakBarisTotal = (keteranganMinggu) => {
            let totalRowHtml = `<tr class="row-total-weekly"><td style="text-align:left;">📊 TOTAL ${keteranganMinggu}</td>`;
            listDriverSorted.forEach(dv => {
                totalRowHtml += `<td>${akumulasiMingguan[dv]} Agen</td>`;
            });
            totalRowHtml += `</tr>`;
            bodyRow.innerHTML += totalRowHtml;
        };

        sortedDates.forEach((tglKey, index) => {
            let barisHari = dataMap[tglKey];
            let rowHtml = `<tr><td class="row-day-title">${barisHari.label}</td>`;
            
            listDriverSorted.forEach(dv => {
                let listAgen = barisHari.drivers[dv];
                
                if (listAgen && listAgen.length > 0) {
                    let listAgenHtml = listAgen.map(ag => {
                        let warnaTeks = getWarnaAgen(ag); // Mendapatkan kode warna unik per nama agen
                        return `<span class="badge-agen" style="color: ${warnaTeks};">${ag}</span>`;
                    }).join('');
                    
                    rowHtml += `<td style="background: #f0fdf4; vertical-align: middle; padding: 6px 8px;">${listAgenHtml}</td>`;
                    akumulasiMingguan[dv] += listAgen.length;
                } else {
                    rowHtml += `<td style="color: #bbb; vertical-align: middle; font-size: 14px; font-weight: bold;">-</td>`;
                }
            });
            
            rowHtml += `</tr>`;
            bodyRow.innerHTML += rowHtml;

            if (barisHari.hariKe === 0 || index === sortedDates.length - 1) {
                let tglFormat = tglKey.split('-').reverse().slice(0,2).join('/');
                cetakBarisTotal(`MINGGU INI (s/d ${tglFormat})`);
                resetAkumulasi();
            }
        });
    }

    window.onload = loadHistory;
</script>
</body>
</html>
