<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | History Driver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; padding: 10px; color: #333; }
        .table-container { overflow-x: auto; background: white; padding: 8px; border-radius: 10px; border: 1px solid #ddd; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; white-space: nowrap; background: white; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #1e272e; color: white; font-weight: normal; font-size: 11px; }
        tr:nth-child(even) { background: #f9f9f9; }
        h3 { font-size: 14px; color: #555; margin: 10px 0; }
        a { font-size: 12px; text-decoration: none; color: #72a339; font-weight: bold; }
        .row-day-title { font-weight: bold; text-align: left; background: #edf2f7; color: #1e293b; }
        .badge-agen { display: block; font-weight: bold; color: #166534; font-size: 11px; }
    </style>
</head>
<body>

<div style="padding-bottom:10px;"><a href="dashboard.html">« Kembali ke Menu Utama</a></div>
<h3>HISTORY TRANSAKSI TIM DRIVER</h3>

<div class="table-container">
    <table id="tabelHistory">
        <thead>
            <tr id="headerRow">
                <th>HARI / TANGGAL</th>
            </tr>
        </thead>
        <tbody id="bodyRow">
            <tr><td colspan="1" style="padding:20px; color:#666;">Sedang memuat history...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient("https://yxcxvkairftqzmptkorr.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs");

    async function loadHistory() {
        // Menarik data tanggal, agen, driver_1, dan driver_2
        const { data: listTransaksi, error } = await _sb.from('transaksi').select('tanggal, nama_agen, driver_1, driver_2');
        
        if (error) return alert("Gagal ambil data: " + error.message);

        let driverUnik = new Set();
        let dataMap = {}; 

        // 1. Kumpulkan semua nama driver yang pernah melakukan transaksi & petakan datanya
        listTransaksi.forEach(t => {
            if (!t.tanggal) return;

            let tglKey = t.tanggal; // Format YYYY-MM-DD dari database
            let dateObj = new Date(tglKey);
            let hari = dateObj.toLocaleDateString('id-ID', { weekday: 'long' });
            let tglIndo = tglKey.split('-').reverse().join('/'); // Ubah jadi DD/MM/YYYY
            let labelHariTanggal = `${hari}, ${tglIndo}`;
            let agen = t.nama_agen || "Tanpa Agen";

            // Tambahkan driver ke daftar unik jika ada datanya
            if (t.driver_1) driverUnik.add(t.driver_1);
            if (t.driver_2) driverUnik.add(t.driver_2);

            // Inisialisasi map tanggal jika belum ada
            if (!dataMap[tglKey]) {
                dataMap[tglKey] = { 
                    label: labelHariTanggal, 
                    timestamp: dateObj.getTime(), 
                    drivers: {} 
                };
            }

            // Fungsi pembantu untuk memasukkan agen ke driver terkait tanpa duplikat di hari yang sama
            const masukkanDataDriver = (namaDriver) => {
                if (namaDriver) {
                    if (!dataMap[tglKey].drivers[namaDriver]) {
                        dataMap[tglKey].drivers[namaDriver] = [];
                    }
                    if (!dataMap[tglKey].drivers[namaDriver].includes(agen)) {
                        dataMap[tglKey].drivers[namaDriver].push(agen);
                    }
                }
            };

            masukkanDataDriver(t.driver_1);
            masukkanDataDriver(t.driver_2);
        });

        // Urutkan daftar driver berdasarkan abjad A-Z
        let listDriverSorted = Array.from(driverUnik).sort();

        // 2. Buat Elemen Header Kolom Berdasarkan Nama Driver
        const headerRow = document.getElementById('headerRow');
        listDriverSorted.forEach(dv => {
            headerRow.innerHTML += `<th style="background: #166534; color: white;">${dv.toUpperCase()}</th>`;
        });

        // 3. Susun Baris Data (Urutkan Tanggal dari Terlama ke Terbaru)
        const bodyRow = document.getElementById('bodyRow');
        bodyRow.innerHTML = ""; // Bersihkan text loading

        let sortedDates = Object.keys(dataMap).sort((a, b) => dataMap[a].timestamp - dataMap[b].timestamp);

        if (sortedDates.length === 0) {
            bodyRow.innerHTML = `<tr><td colspan="${listDriverSorted.length + 1}" style="padding:20px; color:#666;">Belum ada data history transaksi.</td></tr>`;
            return;
        }

        sortedDates.forEach(tglKey => {
            let barisHari = dataMap[tglKey];
            let rowHtml = `<tr><td class="row-day-title">${barisHari.label}</td>`;
            
            // Periksa daftar tujuan kirim (agen) untuk masing-masing driver pada hari ini
            listDriverSorted.forEach(dv => {
                let listAgen = barisHari.drivers[dv];
                
                if (listAgen && listAgen.length > 0) {
                    // Gabungkan nama agen ke bawah dengan tag <span class="badge-agen">
                    let listAgenHtml = listAgen.map(ag => `<span class="badge-agen">${ag}</span>`).join('');
                    rowHtml += `<td style="background: #f0fdf4; vertical-align: middle; padding: 4px 6px;">${listAgenHtml}</td>`;
                } else {
                    rowHtml += `<td style="color: #ccc; vertical-align: middle;">-</td>`;
                }
            });
            
            rowHtml += `</tr>`;
            bodyRow.innerHTML += rowHtml;
        });
    }

    window.onload = loadHistory;
</script>
</body>
</html>
