<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBR Putra Food - Matriks Rencana Kirim</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-color: #2c3e50; --s-color: #27ae60; --bg: #121214; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #fff; font-size: 16px; }
        .container { background: #1e1e24; padding: 12px; border-radius: 15px; max-width: 950px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        header { margin-bottom: 15px; border-bottom: 3px solid #3182ce; padding-bottom: 8px; }
        header h2 { margin: 0; color: #fff; font-size: 22px; text-transform: uppercase; font-weight: 900; }
        .subtitle { font-size: 12px; color: #a0aec0; font-weight: bold; }

        .global-filter { background: #2d3748; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: 900; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .global-filter input { padding: 10px; border-radius: 6px; border: 2px solid #4a5568; font-size: 16px; font-weight: 700; width: 180px; background: #1a202c; color: white; }

        .selector-box { display: flex; gap: 8px; background: #2d3748; padding: 10px; border-radius: 10px; margin-bottom: 15px; align-items: center; }
        .selector-box select { flex: 1; padding: 10px; font-size: 16px; font-weight: 700; border: 2px solid #4a5568; border-radius: 8px; background: #1a202c; color: white; }

        .section-label { font-size: 15px; font-weight: 900; padding: 8px; background: #2b6cb0; color: white; border-radius: 6px; margin: 20px 0 8px; text-transform: uppercase; }
        .section-label.database { background: #d35400; }

        /* CARD INPUT FORM UTAMA (ATAS) */
        .card-jadwal-agen { background: #2d3748; border: 2px solid #4a5568; border-radius: 12px; padding: 12px; margin-bottom: 15px; }
        .card-header-agen { display: flex; justify-content: space-between; align-items: center; background: #1a202c; padding: 10px; border-radius: 8px; border-bottom: 2px solid #4a5568; margin-bottom: 10px; }
        .card-title { font-size: 16px; font-weight: 900; color: #63b3ed; }
        .status-badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }
        .status-draft { background: #feebc8; color: #c05621; }

        /* TABLE FORM BARANG INPUT UTAMA */
        table.table-input { width: 100%; border-collapse: collapse; margin: 5px 0; }
        table.table-input th { font-size: 12px; text-align: left; padding: 6px; background: #1a202c; border-bottom: 2px solid #4a5568; font-weight: 900; color: #cbd5e0; }
        table.table-input td { padding: 6px; border-bottom: 1px solid #4a5568; font-size: 15px; font-weight: 700; }
        .input-qty { width: 65px; padding: 5px; border: 2px solid #4a5568; border-radius: 6px; text-align: center; font-weight: 700; font-size: 14px; background: #1a202c; color: white; }
        
        /* LAYOUTING UTAMA KANAN-KIRI */
        .compact-list-card, .history-card { 
            background: #2d3748; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 14px; border: 2px solid #4a5568;
            display: flex; flex-direction: column; gap: 8px;
        }
        .history-card { background: #1a202c; border-color: #2d3748; }

        .card-top-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #4a5568; padding-bottom: 6px; }
        
        /* PROPORSIONAL LAYOUT */
        .card-main-content { display: flex; gap: 12px; align-items: stretch; }
        .card-left-inputs { flex: 65; min-width: 0; }
        .card-right-muatan { flex: 35; background: #121214; padding: 8px; border-radius: 8px; border: 1px solid #4a5568; min-width: 0; display: flex; flex-direction: column; }

        /* GRID LOGISTIK */
        .logistik-grid { 
            display: grid; 
            grid-template-rows: auto auto; 
            gap: 10px; 
            background: #1a202c; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #3182ce; 
        }
        .grid-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .logistik-grid select, .logistik-grid input[type="date"] { 
            width: 100%; 
            padding: 8px 6px; 
            font-size: 13px; 
            font-weight: 700; 
            border: 2px solid #4a5568; 
            border-radius: 6px; 
            background: #2d3748; 
            color: white; 
            box-sizing: border-box; 
        }
        .logistik-grid label { font-size: 11px; font-weight: 900; color: #cbd5e0; display: block; margin-bottom: 4px; text-transform: uppercase; }

        /* TABEL RINGKAS UNTUK RENCANA MUATAN BARANG */
        .table-muatan { width: 100%; border-collapse: collapse; margin-top: 4px; }
        .table-muatan th { background: #1a202c; color: #a0aec0; font-size: 11px; font-weight: 900; padding: 6px 5px; border-bottom: 1px solid #4a5568; text-transform: uppercase; }
        .table-muatan td { padding: 6px 5px; border-bottom: 1px solid #2d3748; font-size: 12px; color: #cbd5e0; font-weight: 700; }
        .table-muatan td.num-col { text-align: center; width: 50px; font-size: 13px; }

        /* BUTTONS STYLING */
        .btn-action { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .btn-add { background: #3182ce; color: white; font-size: 14px; }
        .btn-del-item { background: #742a2a; color: #feb2b2; border: 1px solid #9b2c2c; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 12px; }
        
        .btn-comp-edit { background: #dd6b20; color: white; padding: 6px 12px; border: none; border-radius: 6px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase; box-shadow: 0 2px 0 #b35415; display: inline-flex; align-items: center; }
        .btn-comp-del { background: #e53e3e; color: white; padding: 6px 12px; border: none; border-radius: 6px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase; box-shadow: 0 2px 0 #b83232; display: inline-flex; align-items: center; }
        .btn-primary-blue { background: #3182ce; color: white; width: 100%; border: none; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; }
        
        /* STYLING BARU UNTUK TOMBOL SIMPAN PER CARD */
        .btn-card-save { background: #27ae60; color: white; width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; box-shadow: 0 3px 0 #1e8449; margin-top: 8px; }
        .btn-card-save:disabled { background: #718096; box-shadow: none; cursor: not-allowed; }

        .badge-shift { padding: 4px 8px; border-radius: 5px; color: white; font-size: 11px; font-weight: 900; text-transform: uppercase; display: inline-block; }
        .SUBUH { background: #e67e22; } .SIANG { background: #3498db; } .MALAM { background: #9b59b6; }
        .badge-tgl { background: #4a5568; padding: 4px 8px; border-radius: 5px; color: #cbd5e0; font-size: 11px; font-weight: 700; display: inline-block; }
        .badge-armada { background: #2b6cb0; padding: 4px 8px; border-radius: 5px; color: #fff; font-size: 11px; font-weight: 900; display: inline-block; border: 1px solid #4299e1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>SBR PUTRA FOOD</h2>
        <div class="subtitle">MATRIKS PLANNING & PENYUSUNAN JADWAL KIRIM AGEN</div>
    </header>

    <div class="global-filter">
        <div>
            <label style="margin-right: 10px; display:block; font-size:12px; color:#cbd5e0; margin-bottom:4px;">📅 TANGGAL OPERASIONAL JALAN :</label>
            <input type="date" id="tglKirimGlobal" onchange="sinkronisasiTanggalGlobal()">
        </div>
    </div>

    <div class="selector-box">
        <select id="dropdownPilihAgen">
            <option value="">-- Sedang memuat daftar agen... --</option>
        </select>
        <button type="button" class="btn-action btn-add" onclick="tambahAgenKeDraftAwal()">+ PILIH AGEN</button>
    </div>

    <div id="containerDraftAwal"></div>

    <div class="section-label">📋 LIST ANTREAN KIRIM (PENGATURAN LOGISTIK & ARMADA MASSAL)</div>
    <div id="containerListKirim">
        <div style="text-align:center; color:#a0aec0; font-style:italic; padding:20px; background:#2d3748; border:2px dashed #4a5568; border-radius:12px;">
            Belum ada agen yang dimasukkan ke list kirim sementara.
        </div>
    </div>

    <div class="section-label database">📜 HISTORY PENGIRIMAN (SUDAH FIX)</div>
    <div id="logJadwalTerkini"></div>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    
    const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let masterDaftarBarangAgen = {}; 
    let masterKaryawan = [];
    let masterKendaraan = []; 
    
    let objDraftAwal = null;       
    let listKirimSementara = [];   

    async function initAplikasi() {
        document.getElementById('tglKirimGlobal').valueAsDate = new Date();
        const dropdownAgen = document.getElementById('dropdownPilihAgen');

        const simpananLokal = localStorage.getItem('sbr_list_kirim_sementara');
        if(simpananLokal) {
            try { listKirimSementara = JSON.parse(simpananLokal); } catch(e) { listKirimSementara = []; }
        }

        const draftLokal = localStorage.getItem('sbr_obj_draft_awal');
        if(draftLokal) {
            try { objDraftAwal = JSON.parse(draftLokal); } catch(e) { objDraftAwal = null; }
        }

        // 1. Ambil Data Agen
        try {
            const { data: agen, error: errAgen } = await clientSupabase.from('agen').select('*').order('nama_agen', { ascending: true });
            if (errAgen) {
                dropdownAgen.innerHTML = '<option value="">❌ Gagal memuat agen dari database</option>';
            } else if (agen && agen.length > 0) {
                dropdownAgen.innerHTML = '<option value="">-- Pilih Agen Untuk Dijadwalkan --</option>';
                agen.forEach(a => {
                    if(a.nama_agen) dropdownAgen.options.add(new Option(a.nama_agen, a.nama_agen));
                });
            }
        } catch(e) {
            dropdownAgen.innerHTML = '<option value="">❌ Koneksi terputus / Error memuat agen</option>';
        }

        // 2. Ambil Data Mapping Barang
        try {
            const { data: harga } = await clientSupabase.from('harga').select('*');
            if (harga) {
                masterDaftarBarangAgen = {};
                harga.forEach(h => {
                    if (h.nama_agen && h.nama_barang) {
                        if (!masterDaftarBarangAgen[h.nama_agen]) masterDaftarBarangAgen[h.nama_agen] = [];
                        if (!masterDaftarBarangAgen[h.nama_agen].includes(h.nama_barang)) {
                            masterDaftarBarangAgen[h.nama_agen].push(h.nama_barang);
                        }
                    }
                });
            }
        } catch(e) { console.error(e); }

        // 3. Ambil Data Karyawan
        try {
            const { data: karyawan } = await clientSupabase.from('karyawan').select('*').eq('aktif', true);
            if (karyawan) masterKaryawan = karyawan.map(k => k.nama_karyawan).filter(Boolean).sort();
        } catch(e) { console.error(e); }

        // 4. Ambil Data Kendaraan Bersih
        try {
            const { data: mobil } = await clientSupabase.from('kendaraan').select('*');
            if (mobil) {
                masterKendaraan = mobil.map(m => {
                    return {
                        plat: (m.plat_nomor || "").trim(),
                        nama_unit: (m.nama_unit || m.jenis_kendaraan || "").trim()
                    };
                });
            }
        } catch(e) { console.error(e); }

        renderDraftAwal();
        renderListKirimCompact();
        muatRiwayatJadwalSelesai();
    }

    function simpanKePenyimpananLokal() {
        localStorage.setItem('sbr_list_kirim_sementara', JSON.stringify(listKirimSementara));
        localStorage.setItem('sbr_obj_draft_awal', JSON.stringify(objDraftAwal));
    }

    function sinkronisasiTanggalGlobal() {
        const tglGlobal = document.getElementById('tglKirimGlobal').value;
        if(objDraftAwal) objDraftAwal.tanggal_berangkat = tglGlobal;
        simpanKePenyimpananLokal();
        renderDraftAwal();
        muatRiwayatJadwalSelesai();
    }

    function tambahAgenKeDraftAwal() {
        const ag = document.getElementById('dropdownPilihAgen').value;
        if(!ag) return alert("Silakan pilih nama Agen terlebih dahulu!");

        if(listKirimSementara.some(item => item.nama_agen === ag)) {
            return alert("Agen ini sudah berada di List Antrean sementara!");
        }

        const tglDefault = document.getElementById('tglKirimGlobal').value;
        let listBarangMaster = masterDaftarBarangAgen[ag] || [];

        objDraftAwal = {
            nama_agen: ag,
            tanggal_berangkat: tglDefault, 
            plat_nomor: "",
            shift: "SUBUH",
            driver_1: "",
            driver_2: "",
            is_editing: false,
            barang: listBarangMaster.map(b => ({ nama_barang: b, qty_order: 0, qty_real: 0 }))
        };

        simpanKePenyimpananLokal();
        renderDraftAwal();
    }

    function masukkanKeListKirimTengah() {
        if(!objDraftAwal) return;
        const adaMuatan = objDraftAwal.barang.some(b => b.qty_order > 0 || b.qty_real > 0);
        if(!adaMuatan) {
            if(!confirm("Anda belum mengisi jumlah barang (masih 0 semua). Tetap masukkan ke list antrean?")) return;
        }
        listKirimSementara.push(JSON.parse(JSON.stringify(objDraftAwal)));
        objDraftAwal = null; 
        simpanKePenyimpananLokal();
        renderDraftAwal();
        renderListKirimCompact();
    }

    function ubahQtyDraft(idxB, kolom, nilai) { 
        if(objDraftAwal) {
            objDraftAwal.barang[idxB][kolom] = parseInt(nilai) || 0; 
            simpanKePenyimpananLokal();
        }
    }

    function hapusItemBarangDraft(idxB) { 
        if(objDraftAwal) { 
            objDraftAwal.barang.splice(idxB, 1); 
            simpanKePenyimpananLokal();
            renderDraftAwal(); 
        } 
    }

    function ubahLogistikDiList(indexList, properti, nilai) {
        listKirimSementara[indexList][properti] = nilai;
        simpanKePenyimpananLokal();
    }

    function tarikKembaliUntukEdit(index) {
        objDraftAwal = JSON.parse(JSON.stringify(listKirimSementara[index]));
        objDraftAwal.is_editing = true;
        listKirimSementara.splice(index, 1); 
        simpanKePenyimpananLokal();
        renderDraftAwal();
        renderListKirimCompact();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hapusDariListSementara(index) {
        if(confirm(`Hapus agen ${listKirimSementara[index].nama_agen.toUpperCase()} dari list kirim sementara?`)) {
            listKirimSementara.splice(index, 1);
            simpanKePenyimpananLokal();
            renderListKirimCompact();
        }
    }

    function renderDraftAwal() {
        const container = document.getElementById('containerDraftAwal');
        if(!objDraftAwal) { container.innerHTML = ''; return; }

        let barisBarang = '';
        objDraftAwal.barang.forEach((b, idx) => {
            barisBarang += `
                <tr>
                    <td style="text-align:center;"><button type="button" class="btn-del-item" onclick="hapusItemBarangDraft(${idx})">X</button></td>
                    <td><strong>${b.nama_barang}</strong></td>
                    <td><input type="number" class="input-qty" value="${b.qty_order}" onchange="ubahQtyDraft(${idx}, 'qty_order', this.value)" onfocus="if(this.value=='0')this.value=''"></td>
                    <td><input type="number" class="input-qty" value="${b.qty_real}" onchange="ubahQtyDraft(${idx}, 'qty_real', this.value)" onfocus="if(this.value=='0')this.value=''"></td>
                </tr>
            `;
        });

        container.innerHTML = `
            <div class="card-jadwal-agen" style="border-color: #3182ce; background: #1a202c;">
                <div class="card-header-agen">
                    <span class="card-title">🏢 MASUKKAN DATA BARANG: <span style="color:#63b3ed;">${objDraftAwal.nama_agen.toUpperCase()}</span></span>
                    <span class="status-badge status-draft">${objDraftAwal.is_editing ? '🔄 EDISI ULANG' : '📝 INPUT BARANG'}</span>
                </div>
                <table class="table-input">
                    <thead><tr><th style="width:40px; text-align:center;">HAPUS</th><th>NAMA ITEM</th><th>EST. ORDER</th><th>PEMENUHAN</th></tr></thead>
                    <tbody>${barisBarang}</tbody>
                </table>
                <button type="button" class="btn-primary-blue" style="margin-top:12px; padding:12px; font-size:14px;" onclick="masukkanKeListKirimTengah()">➡️ MASUKKAN KE LIST ANTREAN UTAMA (DI BAWAH)</button>
            </div>
        `;
    }

    function renderListKirimCompact() {
        const container = document.getElementById('containerListKirim');
        if(listKirimSementara.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; color:#a0aec0; font-style:italic; padding:20px; background:#2d3748; border:2px dashed #4a5568; border-radius:12px;">
                    Belum ada agen yang dimasukkan ke list kirim sementara.
                </div>`;
            return;
        }

        container.innerHTML = '';
        listKirimSementara.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'compact-list-card';

            let optMobil = `<option value="">-- Pilih Mobil --</option>`;
            if (masterKendaraan && masterKendaraan.length > 0) {
                masterKendaraan.forEach(m => {
                    let teksTampil = m.plat ? `${m.plat} ( ${m.nama_unit} )` : m.nama_unit;
                    optMobil += `<option value="${m.plat}" ${item.plat_nomor === m.plat ? "selected" : ""}>${teksTampil}</option>`;
                });
            }

            let optDriver1 = `<option value="">-- Driver 1 --</option>`;
            let optDriver2 = `<option value="">-- Driver 2 --</option>`;
            masterKaryawan.forEach(k => {
                optDriver1 += `<option value="${k}" ${item.driver_1 === k ? "selected" : ""}>${k}</option>`;
                optDriver2 += `<option value="${k}" ${item.driver_2 === k ? "selected" : ""}>${k}</option>`;
            });

            let tableRowsHTML = '';
            item.barang.forEach(b => {
                if(b.qty_order > 0 || b.qty_real > 0) {
                    tableRowsHTML += `
                        <tr>
                            <td>• ${b.nama_barang}</td>
                            <td class="num-col">${b.qty_order}</td>
                            <td class="num-col" style="color:#27ae60; font-weight:bold;">${b.qty_real}</td>
                        </tr>`;
                }
            });
            
            if(!tableRowsHTML) {
                tableRowsHTML = `<tr><td colspan="3" style="color:#e53e3e; font-style:italic; text-align:center; padding:10px;">• Belum ada muatan diinput</td></tr>`;
            }

            let kendaraanTerpilih = masterKendaraan.find(m => m.plat === item.plat_nomor);
            let namaUnitTampil = kendaraanTerpilih ? `${kendaraanTerpilih.plat} ( ${kendaraanTerpilih.nama_unit} )` : "Belum Set Truk";
            const infoArmada = item.plat_nomor ? `<span class="badge-armada">🚚 ${namaUnitTampil}</span>` : `<span class="badge-armada" style="background:#742a2a; border-color:#9b2c2c;">🚚 Belum Set Truk</span>`;

            card.innerHTML = `
                <div class="card-top-info">
                    <div style="display:flex; align-items:center; gap:8px;">
                        🏢 Agen: <strong style="color:#63b3ed; font-size:16px;">${item.nama_agen.toUpperCase()}</strong>
                        ${infoArmada}
                    </div>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <span class="badge-tgl">📅 ${item.tanggal_berangkat}</span>
                        <span class="badge-shift ${item.shift}">${item.shift}</span>
                        <button type="button" class="btn-comp-edit" onclick="tarikKembaliUntukEdit(${index})">✏️ EDIT BARANG</button>
                        <button type="button" class="btn-comp-del" onclick="hapusDariListSementara(${index})">❌ HAPUS AGEN</button>
                    </div>
                </div>
                
                <div class="card-main-content">
                    <div class="card-left-inputs">
                        <div class="logistik-grid">
                            <div class="grid-row">
                                <div>
                                    <label>Tgl Jalan</label>
                                    <input type="date" value="${item.tanggal_berangkat}" onchange="ubahLogistikDiList(${index}, 'tanggal_berangkat', this.value); checkBatasanLangsung(this, '${item.nama_agen}', 'tanggal_berangkat');">
                                </div>
                                <div>
                                    <label>Shift</label>
                                    <select onchange="ubahLogistikDiList(${index}, 'shift', this.value); checkBatasanLangsung(this, '${item.nama_agen}', 'shift');">
                                        <option value="SUBUH" ${item.shift === "SUBUH" ? "selected" : ""}>SUBUH</option>
                                        <option value="SIANG" ${item.shift === "SIANG" ? "selected" : ""}>SIANG</option>
                                        <option value="MALAM" ${item.shift === "MALAM" ? "selected" : ""}>MALAM</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid-row">
                                <div>
                                    <label>Armada Mobil (Nama Unit)</label>
                                    <select onchange="ubahLogistikDiList(${index}, 'plat_nomor', this.value); checkBatasanLangsung(this, '${item.nama_agen}', 'plat_nomor');">${optMobil}</select>
                                </div>
                                <div>
                                    <label>Driver Couple (Maks 2x Panggil)</label>
                                    <div style="display:flex; gap:4px;">
                                        <select onchange="ubahLogistikDiList(${index}, 'driver_1', this.value); checkBatasanLangsung(this, '${item.nama_agen}', 'driver_1');">${optDriver1}</select>
                                        <select onchange="ubahLogistikDiList(${index}, 'driver_2', this.value); checkBatasanLangsung(this, '${item.nama_agen}', 'driver_2');">${optDriver2}</select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn-card-save" id="btnSimpan_${index}" onclick="simpanSatuAgenKeDatabase(${index})">🔒 FIX JADWAL AGEN INI</button>
                    </div>

                    <div class="card-right-muatan">
                        <table class="table-muatan">
                            <thead>
                                <tr>
                                    <th style="text-align: left;">Muatan Barang</th>
                                    <th>Order</th>
                                    <th>Pemen.</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRowsHTML}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function checkBatasanLangsung(elemenHtml, namaAgen, tipeProperti) {
        let hitungMobil = {};
        let hitungDriverGlobal = {};

        for (let i = 0; i < listKirimSementara.length; i++) {
            let data = listKirimSementara[i];
            if (!data.tanggal_berangkat) continue;

            let keyMobil = `${data.tanggal_berangkat}_${data.shift}_${data.plat_nomor}`;
            if (data.plat_nomor) {
                hitungMobil[keyMobil] = (hitungMobil[keyMobil] || 0) + 1;
            }

            let keyD1 = `${data.tanggal_berangkat}_${data.driver_1}`;
            let keyD2 = `${data.tanggal_berangkat}_${data.driver_2}`;

            if (data.driver_1) hitungDriverGlobal[keyD1] = (hitungDriverGlobal[keyD1] || 0) + 1;
            if (data.driver_2) hitungDriverGlobal[keyD2] = (hitungDriverGlobal[keyD2] || 0) + 1;

            if (hitungMobil[keyMobil] > 2) {
                let mobilObj = masterKendaraan.find(m => m.plat === data.plat_nomor);
                let namaMobilPeringatan = mobilObj ? `${mobilObj.plat} (${mobilObj.nama_unit})` : data.plat_nomor;
                alert(`[BATAS ARMADA TERLAMPAUI]\n\nMobil "${namaMobilPeringatan}" sudah terpilih 2 kali pada Shift ${data.shift} tanggal ${data.tanggal_berangkat}.\nTidak boleh dipilih lagi!`);
                resetNilaiKomponenLogistik(namaAgen, tipeProperti);
                return false;
            }

            if (hitungDriverGlobal[keyD1] > 2 || hitungDriverGlobal[keyD2] > 2) {
                let namaSopirBermasalah = hitungDriverGlobal[keyD1] > 2 ? data.driver_1 : data.driver_2;
                alert(`[BATAS DRIVER GLOBAL TERLAMPAUI]\n\nDriver "${namaSopirBermasalah}" sudah dipanggil 2 kali pada tanggal ${data.tanggal_berangkat} (Total Akumulasi Semua Shift).\nSopir tidak boleh dipilih untuk ketiga kalinya!`);
                resetNilaiKomponenLogistik(namaAgen, tipeProperti);
                return false;
            }
        }
        
        renderListKirimCompact();
        return true;
    }

    function resetNilaiKomponenLogistik(namaAgen, tipeProperti) {
        let idxAgen = listKirimSementara.findIndex(x => x.nama_agen === namaAgen);
        if (idxAgen !== -1) {
            listKirimSementara[idxAgen][tipeProperti] = "";
        }
        simpanKePenyimpananLokal();
        renderListKirimCompact();
    }

    // FUNGSI BARU: Simpan data per satu Card Agen pilihan
    async function simpanSatuAgenKeDatabase(index) {
        let data = listKirimSementara[index];
        if(!data) return;

        let namaAg = data.nama_agen.toUpperCase();

        // Validasi Kelengkapan Data Sebelum Kirim
        if(!data.tanggal_berangkat) return alert(`[Validasi Gagal] Tanggal berangkat untuk Agen ${namaAg} kosong!`);
        if(!data.plat_nomor) return alert(`[Validasi Gagal] Armada Mobil untuk Agen ${namaAg} belum dipilih!`);
        if(!data.driver_1 || !data.driver_2) return alert(`[Validasi Gagal] Driver Couple untuk Agen ${namaAg} belum lengkap!`);
        if(data.driver_1 === data.driver_2) return alert(`[Validasi Gagal] Driver 1 dan Driver 2 untuk Agen ${namaAg} tidak boleh sama!`);

        const btnCard = document.getElementById(`btnSimpan_${index}`);
        if(btnCard) {
            btnCard.disabled = true;
            btnCard.innerText = "SEDANG FIX DATA...";
        }

        try {
            const coupleDriver = `${data.driver_1} / ${data.driver_2}`;

            // 1. Insert ke tabel Master (jadwal_kirim)
            const { data: resJadwal, error: errMaster } = await clientSupabase
                .from('jadwal_kirim')
                .insert([{
                    tanggal_kirim: data.tanggal_berangkat, 
                    shift: data.shift,
                    nama_agen: data.nama_agen,
                    plat_nomor: data.plat_nomor,
                    driver: coupleDriver
                }])
                .select();

            if(errMaster) throw errMaster;
            const idJadwal = resJadwal[0].id_jadwal;

            // 2. Siapkan data detail barang
            let detailInserts = [];
            data.barang.forEach(b => {
                if(b.qty_order > 0 || b.qty_real > 0) {
                    detailInserts.push({
                        id_jadwal: idJadwal,
                        nama_barang: b.nama_barang,
                        qty_order: b.qty_order,
                        qty_real: b.qty_real
                    });
                }
            });

            // 3. Insert ke tabel Detail jika ada barangnya
            if(detailInserts.length > 0) {
                const { error: errDetail } = await clientSupabase.from('jadwal_kirim_detail').insert(detailInserts);
                if(errDetail) throw errDetail;
            }

            alert(`✅ FIX BERHASIL: Jadwal untuk agen ${namaAg} aman masuk ke database!`);
            
            // Hapus hanya agen ini dari list sementara
            listKirimSementara.splice(index, 1);
            simpanKePenyimpananLokal();
            
            renderDraftAwal();
            renderListKirimCompact();
            muatRiwayatJadwalSelesai();

        } catch(e) {
            alert("❌ Gagal Kirim Jadwal Agen: " + e.message);
            if(btnCard) {
                btnCard.disabled = false;
                btnCard.innerText = "🔒 FIX JADWAL AGEN INI";
            }
        }
    }

    async function muatRiwayatJadwalSelesai() {
        const containerLog = document.getElementById('logJadwalTerkini');
        const tglTerpilih = document.getElementById('tglKirimGlobal').value;
        containerLog.innerHTML = `<span style="font-size:14px; color:#cbd5e0;">Memuat data...</span>`;

        try {
            const { data: listJadwal, error } = await clientSupabase
                .from('jadwal_kirim')
                .select(`id_jadwal, tanggal_kirim, shift, nama_agen, plat_nomor, driver, jadwal_kirim_detail(nama_barang, qty_order, qty_real)`)
                .eq('tanggal_kirim', tglTerpilih)
                .order('id_jadwal', { ascending: false });

            if(error) throw error;
            if(!listJadwal || listJadwal.length === 0) {
                containerLog.innerHTML = `<span style="font-size:14px; color:#a0aec0; font-style:italic;">Belum ada history pengiriman terkonfirmasi untuk tanggal operasional ini.</span>`;
                return;
            }

            containerLog.innerHTML = '';
            listJadwal.forEach(j => {
                const div = document.createElement('div');
                div.className = 'history-card';
                
                let tableRowsHistoryHTML = '';
                if(j.jadwal_kirim_detail) {
                    j.jadwal_kirim_detail.forEach(det => {
                        tableRowsHistoryHTML += `
                            <tr>
                                <td>• ${det.nama_barang}</td>
                                <td class="num-col">${det.qty_order}</td>
                                <td class="num-col" style="font-weight:bold;">${det.qty_real}</td>
                            </tr>`;
                    });
                }

                let unitHistori = masterKendaraan.find(m => m.plat === j.plat_nomor);
                let namaUnitHistori = unitHistori ? `${unitHistori.plat} ( ${unitHistori.nama_unit} )` : j.plat_nomor;

                div.innerHTML = `
                    <div class="card-top-info">
                        <div style="display:flex; align-items:center; gap:8px;">
                            🏢 Agen: <strong style="color:#27ae60; font-size:16px;">${j.nama_agen.toUpperCase()}</strong>
                            <span class="badge-armada">🚚 ${namaUnitHistori}</span>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <span class="badge-tgl">📅 ${j.tanggal_kirim}</span>
                            <span class="badge-shift ${j.shift}">${j.shift}</span>
                        </div>
                    </div>
                    <div class="card-main-content">
                        <div class="card-left-inputs">
                            <div class="logistik-grid" style="border-color: #4a5568;">
                                <div class="grid-row">
                                    <div>
                                        <label>Tgl Jalan</label>
                                        <input type="text" value="${j.tanggal_kirim}" disabled style="background:#2d3748; color:#cbd5e0; border:1px solid #4a5568; padding:8px; width:100%; box-sizing:border-box; border-radius:6px; font-weight:bold; font-size:13px;">
                                    </div>
                                    <div>
                                        <label>Shift</label>
                                        <input type="text" value="${j.shift}" disabled style="background:#2d3748; color:#cbd5e0; border:1px solid #4a5568; padding:8px; width:100%; box-sizing:border-box; border-radius:6px; font-weight:bold; font-size:13px;">
                                    </div>
                                </div>
                                <div class="grid-row">
                                    <div>
                                        <label>Armada Mobil</label>
                                        <input type="text" value="${namaUnitHistori}" disabled style="background:#2d3748; color:#cbd5e0; border:1px solid #4a5568; padding:8px; width:100%; box-sizing:border-box; border-radius:6px; font-weight:bold; font-size:13px;">
                                    </div>
                                    <div>
                                        <label>Driver Couple</label>
                                        <input type="text" value="${j.driver}" disabled style="background:#2d3748; color:#cbd5e0; border:1px solid #4a5568; padding:8px; width:100%; box-sizing:border-box; border-radius:6px; font-weight:bold; font-size:13px;">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-right-muatan" style="background: #2d3748;">
                            <table class="table-muatan">
                                <thead>
                                    <tr>
                                        <th style="text-align: left;">Muatan Barang</th>
                                        <th>Order</th>
                                        <th>Pemen.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRowsHistoryHTML}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                containerLog.appendChild(div);
            });
        } catch(e) { console.error(e); }
    }

    window.onload = initAplikasi;
</script>
