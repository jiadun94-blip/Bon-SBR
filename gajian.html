<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBR Putra Food - Penggajian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --p-color: #2c3e50; --s-color: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 10px; background: var(--bg); font-size: 14px; color: #1a202c; }
        .container { background: white; padding: 15px; border-radius: 15px; max-width: 1100px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* Modal Preview */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 85vh; display: flex; flex-direction: column; }
        .preview-box { background: #f8fafc; border: 2px dashed #cbd5e0; padding: 15px; border-radius: 10px; font-family: 'Courier New', Courier, monospace; font-size: 13px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; color: #000; margin-bottom: 15px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        header h2 { margin: 0; color: #1a202c; font-size: 20px; text-transform: uppercase; font-weight: 900; }
        .btn-back { background: #718096; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; text-decoration: none; font-size: 12px; }
        
        .filter-box { background: #f0f4f8; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .grid-3 { display: flex; flex-direction: row; gap: 15px; }
        @media (max-width: 600px) { .grid-3 { flex-direction: column; } }
        
        .form-group { flex: 1; }
        .form-group label { display: block; font-weight: 900; margin-bottom: 6px; font-size: 11px; color: #4a5568; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 14px; font-weight: 700; background: white; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #3182ce; }
        
        .btn-bt { width: 100%; padding: 12px; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: 900; font-size: 15px; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
        #statusBT { font-size: 12px; font-weight: bold; display: block; color: #e53e3e; text-align: center; margin-bottom: 15px; }
        
        /* Tabel Penyesuaian Lebar */
        .table-wrapper { overflow-x: auto; border: 1px solid #cbd5e0; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border-bottom: 1px solid #cbd5e0; padding: 12px 10px; vertical-align: top; }
        th { background: #1a202c; color: white; font-weight: 900; font-size: 13px; text-transform: uppercase; text-align: left; }
        
        /* Persentase Lebar Kolom */
        th:nth-child(1) { width: 20%; }
        th:nth-child(2) { width: 35%; }
        th:nth-child(3) { width: 25%; }
        th:nth-child(4) { width: 20%; text-align: center; } /* Kolom total dibuat center */
        
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
        .detail-row span:last-child { font-weight: 900; }
        
        /* Font size Total Pendapatan & Potongan disamakan (14px) */
        .subtotal-row { border-top: 1px dashed #cbd5e0; margin-top: 6px; padding-top: 6px; font-weight: 900; color: #2b6cb0; font-size: 14px; }
        
        .potongan-item { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 4px; color: #e53e3e; }
        .potongan-item span:last-child { font-weight: 900; }
        
        /* Font size Total Pendapatan & Potongan disamakan (14px) */
        .total-potongan { border-top: 1px dashed #feb2b2; margin-top: 6px; padding-top: 6px; font-weight: 900; color: #c53030; display: flex; justify-content: space-between; font-size: 14px; }
        
        /* Total Gaji di-tengah secara horizontal dan vertikal */
        .total-gaji { color: #27ae60; font-size: 22px; font-weight: 900; white-space: nowrap; text-align: center; vertical-align: middle; }

        .btn-preview-all { background: #3182ce; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 15px; width: 100%; box-shadow: 0 4px 0 #2b6cb0; text-transform: uppercase; display: none; }
        .btn-preview-all:active { transform: translateY(2px); box-shadow: 0 2px 0 #2b6cb0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>REKAP & SLIP GAJI</h2>
        <a href="javascript:history.back()" class="btn-back">⬅ KEMBALI</a>
    </header>

    <button class="btn-bt" id="btnConnect" onclick="connectBT()">🖨️ HUBUNGKAN PRINTER BLUETOOTH</button>
    <span id="statusBT">Status Printer: Terputus</span>

    <div class="filter-box">
        <div class="grid-3">
            <div class="form-group">
                <label>BAGIAN</label>
                <select id="pilihBagian" onchange="hitungRekapMingguan()">
                    <option value="">-- Pilih --</option>
                    <option value="Aro">Aro</option>
                    <option value="Sisrik">Sisrik</option>
                    <option value="Simping">Simping</option>
                    <option value="Terigu">Terigu</option>
                    <option value="Distribusi">Distribusi</option>
                    <option value="Driver">Driver</option>
                </select>
            </div>
            <div class="form-group"><label>DARI TANGGAL</label><input type="date" id="tglDari" onchange="hitungRekapMingguan()"></div>
            <div class="form-group"><label>SAMPAI TANGGAL</label><input type="date" id="tglSampai" onchange="hitungRekapMingguan()"></div>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="tabelGaji">
            <thead>
                <tr>
                    <th>NAMA & BAGIAN</th>
                    <th>RINCIAN PENDAPATAN</th>
                    <th>RINCIAN POTONGAN</th>
                    <th>TOTAL DITERIMA</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="4" style="text-align:center; padding:20px; font-weight:bold; color:#718096;">Tentukan filter terlebih dahulu.</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn-preview-all" id="btnPreviewSemua" onclick="previewSemuaSlip()">🖨️ PREVIEW & CETAK SEMUA SLIP</button>
</div>

<!-- MODAL PREVIEW SELURUH KARYAWAN -->
<div id="modalPreview" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; margin-top:0; color:#2c3e50;">PREVIEW SLIP GAJI</h3>
        <div id="areaPreview" class="preview-box"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="tutupPreview()" style="flex:1; padding:15px; background:#e2e8f0; color:#4a5568; border:none; border-radius:8px; font-weight:900; cursor:pointer;">BATAL</button>
            <button onclick="finalkanCetakSemua()" id="btnCetakFinal" style="flex:2; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:900; cursor:pointer;">✅ CETAK SEMUA</button>
        </div>
    </div>
</div>

<script>
    const clientSupabase = supabase.createClient("https://yxcxvkairftqzmptkorr.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs");
    let btCharacteristic = null;
    let dataKaryawanGlobal = [];
    const bagianProduksi = ["Aro", "Sisrik", "Simping", "Terigu"];

    // Set Default Rentang Waktu (Sabtu - Jumat)
    window.onload = () => {
        let today = new Date();
        let day = today.getDay(); 
        let daysToSubtract = (day + 1) % 7; 
        
        let saturday = new Date(today);
        saturday.setDate(today.getDate() - daysToSubtract);
        
        let friday = new Date(saturday);
        friday.setDate(saturday.getDate() + 6);

        document.getElementById('tglDari').valueAsDate = saturday;
        document.getElementById('tglSampai').valueAsDate = friday;
    };

    async function connectBT() {
        try {
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
            const chars = await service.getCharacteristics();
            btCharacteristic = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
            document.getElementById('statusBT').innerText = "Status Printer: TERHUBUNG ✅ (" + device.name + ")";
            document.getElementById('statusBT').style.color = "#27ae60";
        } catch (e) { alert("Koneksi printer dibatalkan atau gagal."); }
    }

    async function printDataToBT(text) {
        if (!btCharacteristic) throw "Printer belum terhubung! Klik tombol oranye di atas.";
        const data = new TextEncoder().encode(text);
        for (let i = 0; i < data.length; i += 20) {
            await btCharacteristic.writeValue(data.slice(i, i + 20));
            await new Promise(r => setTimeout(r, 40)); 
        }
    }

    function formatRp(angka) { return Number(angka).toLocaleString('id-ID'); }

    async function hitungRekapMingguan() {
        const bag = document.getElementById('pilihBagian').value;
        const tglAwal = document.getElementById('tglDari').value;
        const tglAkhir = document.getElementById('tglSampai').value;
        const btnPreview = document.getElementById('btnPreviewSemua');

        if (!bag || !tglAwal || !tglAkhir) {
            btnPreview.style.display = 'none';
            return;
        }

        const tbody = document.querySelector('#tabelGaji tbody');
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px; font-weight:bold;">⏳ Menghitung & Memuat Data...</td></tr>';
        btnPreview.style.display = 'none';

        const { data: absensi } = await clientSupabase.from('absensi').select('*').eq('bagian', bag).gte('tanggal', tglAwal).lte('tanggal', tglAkhir);
        const { data: dbHarga } = await clientSupabase.from('harga_produksi').select('*').eq('bagian', bag);
        
        if (!absensi || absensi.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#e53e3e; font-weight:bold; padding:20px;">Belum ada data absensi/kinerja di rentang ini.</td></tr>';
            return;
        }

        let mapHarga = {};
        dbHarga.forEach(h => {
            mapHarga[h.nama_karyawan] = { 
                normal: Number(h.harga_normal) || 0, 
                lembur: Number(h.harga_lembur) || 0, 
                potArr: h.potongan_rutin || [] 
            };
        });

        let rekap = {};
        absensi.forEach(row => {
            if (!rekap[row.nama_karyawan]) rekap[row.nama_karyawan] = { nama: row.nama_karyawan, bag: row.bagian, hadir: 0, prod: 0, lembur: 0 };
            if (row.status_hadir === 'Hadir') {
                rekap[row.nama_karyawan].hadir++;
                rekap[row.nama_karyawan].prod += Number(row.hasil_produksi) || 0;
                rekap[row.nama_karyawan].lembur += Number(row.jam_lembur) || 0;
            }
        });

        dataKaryawanGlobal = Object.values(rekap).sort((a,b) => a.nama.localeCompare(b.nama));
        tbody.innerHTML = '';
        
        dataKaryawanGlobal.forEach((kar) => {
            let hrg = mapHarga[kar.nama] || { normal: 0, lembur: 0, potArr: [] };
            let isProd = bagianProduksi.includes(bag);
            
            // Hitung Pendapatan
            let satuan = isProd ? "Pcs" : "Hari";
            let nilaiReguler = isProd ? kar.prod : kar.hadir;
            let gajiKinerja = nilaiReguler * hrg.normal;
            let gajiLembur = kar.lembur * hrg.lembur;
            let totalPendapatan = gajiKinerja + gajiLembur;
            
            // Hitung Potongan
            let totalPot = 0;
            let htmlPotongan = "";
            if(hrg.potArr.length > 0) {
                hrg.potArr.forEach(p => {
                    let nom = Number(p.nominal) || 0;
                    if(nom > 0) {
                        totalPot += nom;
                        let nm = p.nama || "Lainnya";
                        htmlPotongan += `<div class="potongan-item"><span>- ${nm}</span><span>Rp ${formatRp(nom)}</span></div>`;
                    }
                });
            }
            if(totalPot === 0) htmlPotongan = '<div style="font-size:12px; color:#a0aec0; font-style:italic;">- Tidak ada potongan -</div>';
            
            let totalBersih = totalPendapatan - totalPot;

            // Simpan Calc ke Object
            kar.calc = { isProd, satuan, nilaiReguler, gajiKinerja, gajiLembur, totalPendapatan, totalPot, totalBersih, tarif: hrg, potArr: hrg.potArr };

            // Render Baris Tabel
            tbody.innerHTML += `
                <tr>
                    <td>
                        <strong style="font-size:15px; color:#1a202c;">${kar.nama}</strong><br>
                        <small style="color:#718096; font-weight:bold;">${kar.bag}</small>
                        ${!mapHarga[kar.nama] ? '<br><small style="color:#e53e3e;">⚠️ Tarif belum diisi!</small>' : ''}
                    </td>
                    <td>
                        <div class="detail-row"><span>Reguler (${nilaiReguler} ${satuan}):</span> <span>Rp ${formatRp(gajiKinerja)}</span></div>
                        <div class="detail-row"><span>Lembur (${kar.lembur} Pcs):</span> <span>Rp ${formatRp(gajiLembur)}</span></div>
                        <div class="detail-row subtotal-row"><span>Total Pendapatan:</span> <span>Rp ${formatRp(totalPendapatan)}</span></div>
                    </td>
                    <td>
                        ${htmlPotongan}
                        ${totalPot > 0 ? `<div class="total-potongan"><span>Total Potongan:</span> <span>-Rp ${formatRp(totalPot)}</span></div>` : ''}
                    </td>
                    <td class="total-gaji">Rp ${formatRp(totalBersih)}</td>
                </tr>
            `;
        });

        if(dataKaryawanGlobal.length > 0) {
            btnPreview.style.display = 'block';
        }
    }

    // --- FUNGSI PREVIEW SLIP ---
    function previewSemuaSlip() {
        if (dataKaryawanGlobal.length === 0) return;
        
        let htmlPreview = "";
        dataKaryawanGlobal.forEach((kar) => {
            const c = kar.calc;
            let txt = `================================\n`;
            txt += `NAMA   : ${kar.nama.toUpperCase()}\n`;
            txt += `BAGIAN : ${kar.bag.toUpperCase()}\n`;
            txt += `--------------------------------\n`;
            txt += `PENDAPATAN:\n`;
            txt += ` Reguler (${c.nilaiReguler} ${c.satuan}) : Rp ${formatRp(c.gajiKinerja)}\n`;
            if(c.gajiLembur > 0) {
                txt += ` Lembur (${kar.lembur} Pcs)  : Rp ${formatRp(c.gajiLembur)}\n`;
            }
            txt += ` TOTAL PENDAPATAN : Rp ${formatRp(c.totalPendapatan)}\n`;
            txt += `--------------------------------\n`;
            txt += `POTONGAN:\n`;
            
            if(c.totalPot > 0) {
                c.potArr.forEach(pot => {
                    let nom = Number(pot.nominal) || 0;
                    if(nom > 0) {
                        let nm = pot.nama ? pot.nama : "Lainnya";
                        // Meratakan spasi
                        let spasi = 18 - nm.length;
                        if(spasi < 1) spasi = 1;
                        txt += ` - ${nm}${" ".repeat(spasi)}: -Rp ${formatRp(nom)}\n`;
                    }
                });
            } else {
                txt += ` - Tidak ada potongan -\n`;
            }
            txt += ` TOTAL POTONGAN   : -Rp ${formatRp(c.totalPot)}\n`;
            txt += `--------------------------------\n`;
            txt += `DITERIMA BERSIH   : Rp ${formatRp(c.totalBersih)}\n`;
            txt += `================================\n\n`;
            
            htmlPreview += txt;
        });
        
        document.getElementById('areaPreview').innerText = htmlPreview;
        document.getElementById('modalPreview').style.display = 'block';
    }

    function tutupPreview() { 
        document.getElementById('modalPreview').style.display = 'none'; 
    }

    // --- FUNGSI CETAK KE BLUETOOTH PRINTER ---
    function generateSlipBluetooth(kar) {
        const c = kar.calc;
        const tglAwal = document.getElementById('tglDari').value.split('-').reverse().join('/');
        const tglAkhir = document.getElementById('tglSampai').value.split('-').reverse().join('/');
        let lebar = 32; 

        const buatBaris = (kiri, kanan) => { 
            let spasi = lebar - String(kiri).length - String(kanan).length; 
            return kiri + " ".repeat(Math.max(1, spasi)) + kanan + "\n"; 
        };
        const garisStrip = "-".repeat(lebar) + "\n";
        const garisSama = "=".repeat(lebar) + "\n";

        let p = `\x1B\x40\x1B\x61\x01\x1B\x45\x01\x1B\x21\x10SBR PUTRA FOOD\n\x1B\x21\x00\x1B\x45\x00`; 
        p += `SLIP GAJI KARYAWAN\nPeriode: ${tglAwal} - ${tglAkhir}\n${garisSama}`;
        
        p += `\x1B\x61\x00`; 
        p += buatBaris(`NAMA:`, kar.nama.toUpperCase());
        p += buatBaris(`BAGIAN:`, kar.bag.toUpperCase());
        p += garisStrip;

        // PENDAPATAN
        p += `\x1B\x45\x01PENDAPATAN:\x1B\x45\x00\n`;
        p += buatBaris(`Reguler (${c.nilaiReguler} ${c.satuan})`, `Rp ${formatRp(c.gajiKinerja)}`);
        if (c.gajiLembur > 0) {
            p += buatBaris(`Lembur (${kar.lembur} Pcs)`, `Rp ${formatRp(c.gajiLembur)}`);
        }
        p += garisStrip;
        p += buatBaris(`TOTAL PENDAPATAN`, `Rp ${formatRp(c.totalPendapatan)}`);
        
        // POTONGAN
        if (c.totalPot > 0) {
            p += `\n\x1B\x45\x01POTONGAN:\x1B\x45\x00\n`;
            c.potArr.forEach(pot => {
                let nom = Number(pot.nominal) || 0;
                if (nom > 0) {
                    let nm = pot.nama ? pot.nama : "Lainnya";
                    let nmStr = nm.length > 15 ? nm.substring(0, 15) + ".." : nm;
                    p += buatBaris(`- ${nmStr}`, `-Rp ${formatRp(nom)}`);
                }
            });
            p += garisStrip;
            p += buatBaris(`TOTAL POTONGAN`, `-Rp ${formatRp(c.totalPot)}`);
        }
        
        // TOTAL BERSIH
        p += garisSama;
        p += `\x1B\x45\x01` + buatBaris(`DITERIMA BERSIH:`, `Rp ${formatRp(c.totalBersih)}`) + `\x1B\x45\x00`;
        p += `\n\n\x1B\x61\x01Diterima Oleh,\n\n\n\n( ${kar.nama} )\n\n\n\n\x1D\x56\x42\x00`; 

        return p;
    }

    async function finalkanCetakSemua() {
        if (!btCharacteristic) { 
            alert("⚠️ Printer belum terhubung! Silakan tutup preview dan klik tombol hubungkan printer di atas."); 
            return; 
        }

        const btn = document.getElementById('btnCetakFinal');
        btn.innerText = "⏳ MENCETAK KE PRINTER..."; btn.disabled = true;

        try {
            let gabunganPrint = "";
            for(let i = 0; i < dataKaryawanGlobal.length; i++) {
                gabunganPrint += generateSlipBluetooth(dataKaryawanGlobal[i]);
            }
            await printDataToBT(gabunganPrint);
            tutupPreview();
            alert("✅ Seluruh slip berhasil dicetak ke Printer Bluetooth.");
        } catch (e) {
            alert("❌ Gagal mencetak: " + e);
        } finally {
            btn.innerText = "✅ CETAK SEMUA"; btn.disabled = false;
        }
    }
</script>

</body>
</html>
