<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBR | Database Agen v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 10px; user-select: none; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { margin: 0 0 15px; font-size: 16px; text-align: center; background: #333; padding: 10px; border-radius: 6px; color: #fff; text-transform: uppercase; }
        
        /* FORM LAYOUT ASLI BAPAK */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; margin-bottom: 4px; color: #aaa; font-weight: bold; }
        input { background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-family: inherit; }
        .btn-save { background: #3b4c64; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        .btn-save:active { background: #2c3e50; transform: scale(0.98); }

        /* TABLE AREA */
        .table-container { width: 100%; max-height: 60vh; overflow: auto; border: 1px solid #444; border-radius: 4px; background: #fff; }
        table { width: 100%; border-collapse: collapse; color: #000; }
        th { background: #f0f0f0; position: sticky; top: 0; z-index: 10; border: 1px solid #ccc; padding: 10px; font-size: 12px; }
        td { border: 1px solid #eee; padding: 10px; font-size: 13px; text-align: center; cursor: pointer; }
        tr:nth-child(even) { background: #fafafa; }
        tr:active { background: #dbeafe !important; }

        /* POPUP MENU */
        #context-menu {
            display: none;
            position: fixed;
            z-index: 1000;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 160px;
        }
        .menu-item { padding: 12px 15px; color: #fff; cursor: pointer; font-size: 14px; border-bottom: 1px solid #333; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: #3b4c64; }
        .menu-del { color: #ff6b6b; }
    </style>
</head>
<body onclick="hideMenu()">

<div class="card">
    <h2 id="title-form">TAMBAH AGEN BARU</h2>
    <div class="form-grid">
        <input type="hidden" id="edit_id">
        <div class="form-group">
            <label>NAMA AGEN</label>
            <input type="text" id="in_nama" placeholder="Nama Lengkap Agen">
        </div>
        <div class="form-group">
            <label>ALAMAT (KOTA)</label>
            <input type="text" id="in_alamat" placeholder="Contoh: CIKARANG">
        </div>
        <div class="form-group">
            <label>NO. TELEPON</label>
            <input type="number" id="in_tlp" placeholder="6281...">
        </div>
        <div class="form-group">
            <label>SALDO BON AWAL</label>
            <input type="number" id="in_saldo" value="0">
        </div>
    </div>
    <button class="btn-save" id="btn-aksi" onclick="simpanAgen()">SIMPAN DATA AGEN</button>
    <button class="btn-save" id="btn-batal" onclick="resetForm()" style="display:none; background:#555; margin-top:10px;">BATAL EDIT</button>
</div>

<div class="card">
    <h2>DATA AGEN TERINPUT</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>NO</th>
                    <th>NAMA AGEN</th>
                    <th>ALAMAT</th>
                    <th>NO. TLP</th>
                    <th>SALDO BON</th>
                </tr>
            </thead>
            <tbody id="list-agen">
                <tr><td colspan="5">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MENU POPUP -->
<div id="context-menu">
    <div class="menu-item" onclick="prepareEdit()">📝 Edit Data</div>
    <div class="menu-item menu-del" onclick="hapusAgen()">🗑️ Hapus Agen</div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let selectedData = null;
    let longPressTimer;

    window.onload = () => muatTabelAgen();

    async function muatTabelAgen() {
        const { data, error } = await _sb.from('agen').select('*').order('nama_agen', { ascending: true });
        if (error) return;
        
        const listBody = document.getElementById('list-agen');
        listBody.innerHTML = "";
        data.forEach((ag, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td style="text-align:left; font-weight:bold;">${ag.nama_agen}</td>
                <td style="text-align:left;">${ag.alamat}</td>
                <td>${ag.No_tlp || '-'}</td>
                <td style="font-weight:bold;">${ag.saldo_bon ? ag.saldo_bon.toLocaleString('id-ID') : 0}</td>
            `;

            // EVENT TEKAN LAMA
            tr.ontouchstart = (e) => {
                selectedData = ag;
                longPressTimer = setTimeout(() => showMenu(e), 600);
            };
            tr.ontouchend = () => clearTimeout(longPressTimer);
            tr.oncontextmenu = (e) => { e.preventDefault(); selectedData = ag; showMenu(e); };

            listBody.appendChild(tr);
        });
    }

    function showMenu(e) {
        const menu = document.getElementById('context-menu');
        const x = e.touches ? e.touches[0].pageX : e.pageX;
        const y = e.touches ? e.touches[0].pageY : e.pageY;
        menu.style.display = 'block';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
    }

    function hideMenu() { document.getElementById('context-menu').style.display = 'none'; }

    function prepareEdit() {
        if(!selectedData) return;
        document.getElementById('title-form').innerText = "EDIT DATA AGEN";
        document.getElementById('edit_id').value = selectedData.id;
        document.getElementById('in_nama').value = selectedData.nama_agen;
        document.getElementById('in_alamat').value = selectedData.alamat;
        document.getElementById('in_tlp').value = selectedData.No_tlp;
        document.getElementById('in_saldo').value = selectedData.saldo_bon;
        
        document.getElementById('btn-aksi').innerText = "UPDATE DATA AGEN";
        document.getElementById('btn-aksi').style.background = "#2ecc71";
        document.getElementById('btn-batal').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    async function simpanAgen() {
        const id = document.getElementById('edit_id').value;
        const payload = {
            nama_agen: document.getElementById('in_nama').value,
            alamat: document.getElementById('in_alamat').value.toUpperCase(),
            No_tlp: parseInt(document.getElementById('in_tlp').value) || 0,
            saldo_bon: parseFloat(document.getElementById('in_saldo').value) || 0
        };

        if(!payload.nama_agen || !payload.alamat) return alert("Data wajib diisi!");

        let res;
        if(id) res = await _sb.from('agen').update(payload).eq('id', id);
        else res = await _sb.from('agen').insert([payload]);

        if(res.error) alert(res.error.message);
        else {
            alert(id ? "Data diperbarui!" : "Agen ditambahkan!");
            resetForm();
            muatTabelAgen();
        }
    }

    async function hapusAgen() {
        if(!selectedData) return;
        if(confirm(`Hapus agen ${selectedData.nama_agen}?`)) {
            const { error } = await _sb.from('agen').delete().eq('id', selectedData.id);
            if(error) alert(error.message);
            else muatTabelAgen();
        }
    }

    function resetForm() {
        document.getElementById('title-form').innerText = "TAMBAH AGEN BARU";
        document.getElementById('edit_id').value = "";
        document.getElementById('in_nama').value = "";
        document.getElementById('in_alamat').value = "";
        document.getElementById('in_tlp').value = "";
        document.getElementById('in_saldo').value = "0";
        document.getElementById('btn-aksi').innerText = "SIMPAN DATA AGEN";
        document.getElementById('btn-aksi').style.background = "#3b4c64";
        document.getElementById('btn-batal').style.display = "none";
        selectedData = null;
    }
</script>
</body>
</html>
