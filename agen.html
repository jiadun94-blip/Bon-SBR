<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBR | Database Agen v4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 8px; user-select: none; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 12px; border: 1px solid #333; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        h2 { margin: 0 0 12px; font-size: 14px; text-align: center; background: #2d2d2d; padding: 10px; border-radius: 6px; color: #fff; text-transform: uppercase; border: 1px solid #444; letter-spacing: 1px; }
        
        /* FORM LAYOUT */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 10px; margin-bottom: 4px; color: #bbb; font-weight: bold; letter-spacing: 0.5px; }
        input, select { background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; font-size: 13px; transition: border 0.3s; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        select { cursor: pointer; }
        
        .btn-save { background: #3b4c64; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.1s; }
        .btn-save:active { transform: translateY(4px); }

        /* PENCARIAN */
        .search-container { margin-bottom: 12px; width: 100%; box-sizing: border-box; }
        .search-input { width: 100%; background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; box-sizing: border-box; font-size: 13px; }
        .search-input:focus { border-color: #3498db; outline: none; }

        /* TABLE AREA (Gaya Baru & Diperkecil) */
        .table-container { width: 100%; max-height: 60vh; overflow-x: auto; border: 1px solid #333; border-radius: 8px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        table { width: 100%; border-collapse: collapse; color: #1e293b; min-width: 100%; } 
        
        thead th { background: #f8fafc; color: #475569; position: sticky; top: 0; z-index: 10; padding: 10px 5px; font-size: 10px; text-transform: uppercase; border-bottom: 2px solid #cbd5e1; text-align: left; letter-spacing: 0.5px; }
        thead th.center { text-align: center; }
        thead th.right { text-align: right; }
        
        td { border-bottom: 1px solid #f1f5f9; padding: 8px 5px; font-size: 12px; vertical-align: middle; }
        tr:hover { background: #f8fafc; }
        
        .text-bold { font-weight: bold; color: #0f172a; }
        .price-text { font-weight: bold; text-align: right; color: #16a085; font-size: 12px; white-space: nowrap; }
        .nowrap { white-space: nowrap; }

        /* Badge tipe agen */
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; text-transform: uppercase; display: inline-block; white-space: nowrap;}
        .badge-normal { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .badge-khusus { background: #ffedd5; color: #c2410c; border: 1px solid #fed7aa; }

        /* Kolom Aksi */
        .action-cell { display: flex; gap: 4px; justify-content: center; align-items: center; }
        .btn-action { display: inline-flex; align-items: center; justify-content: center; background: #f1f5f9; border: 1px solid #cbd5e1; cursor: pointer; font-size: 12px; padding: 5px 8px; border-radius: 4px; transition: all 0.2s; }
        .btn-action.edit:hover { background: #dbeafe; border-color: #93c5fd; }
        .btn-action.delete:hover { background: #fee2e2; border-color: #fca5a5; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title-form">TAMBAH AGEN BARU</h2>
    <div class="form-grid">
        <input type="hidden" id="edit_id">
        <div class="form-group">
            <label>NAMA AGEN</label>
            <input type="text" id="in_nama" placeholder="Nama Agen">
        </div>
        <div class="form-group">
            <label>ALAMAT (KOTA)</label>
            <input type="text" id="in_alamat" placeholder="Contoh: CIKARANG">
        </div>
        <div class="form-group">
            <label>NO. TELEPON</label>
            <input type="number" id="in_tlp" placeholder="6281...">
        </div>
        <div class="form-group">
            <label>TYPE AGEN</label>
            <select id="in_type">
                <option value="NORMAL">NORMAL</option>
                <option value="KHUSUS">KHUSUS</option>
            </select>
        </div>
        <div class="form-group" style="grid-column: span 2;">
            <label>SALDO BON AWAL (RP)</label>
            <input type="number" id="in_saldo" value="0">
        </div>
    </div>
    <button class="btn-save" id="btn-aksi" onclick="simpanAgen()">SIMPAN DATA AGEN</button>
    <button class="btn-save" id="btn-batal" onclick="resetForm()" style="display:none; background:#555; margin-top:8px;">BATAL EDIT</button>
</div>

<div class="card">
    <h2>DATA AGEN TERINPUT</h2>
    
    <div class="search-container">
        <input type="text" id="in_cari" class="search-input" placeholder="🔍 Cari agen..." onkeyup="cariAgen()">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th width="20" class="center">NO</th>
                    <th>NAMA AGEN</th>
                    <th>ALAMAT</th>
                    <th width="45" class="center">TYPE</th>
                    <th width="65">NO. TLP</th>
                    <th width="75" class="right">SALDO BON</th>
                    <th width="60" class="center">AKSI</th>
                </tr>
            </thead>
            <tbody id="list-agen">
                <tr><td colspan="7" style="text-align: center;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentAgenData = [];

    window.onload = () => muatTabelAgen();

    async function muatTabelAgen() {
        const { data, error } = await _sb.from('agen').select('*').order('nama_agen', { ascending: true });
        
        if (error) {
            document.getElementById('list-agen').innerHTML = `<tr><td colspan="7" style="color:red; text-align:center;">Gagal muat data</td></tr>`;
            return;
        }

        currentAgenData = data || [];
        const listBody = document.getElementById('list-agen');
        listBody.innerHTML = "";

        if (currentAgenData.length === 0) {
            listBody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Tidak ada data agen.</td></tr>`;
            return;
        }

        currentAgenData.forEach((ag, index) => {
            const tr = document.createElement('tr');
            const badgeClass = (ag.type_agen || 'NORMAL').toLowerCase() === 'khusus' ? 'badge-khusus' : 'badge-normal';

            tr.innerHTML = `
                <td align="center" style="color: #64748b;">${index + 1}</td>
                <td class="text-bold">${ag.nama_agen}</td>
                <td>${ag.alamat}</td>
                <td align="center"><span class="badge ${badgeClass}">${ag.type_agen || 'NORMAL'}</span></td>
                <td class="nowrap">${ag.No_tlp || '-'}</td>
                <td class="price-text nowrap">Rp ${ag.saldo_bon ? ag.saldo_bon.toLocaleString('id-ID') : 0}</td>
                <td>
                    <div class="action-cell">
                        <button class="btn-action edit" onclick="prepareEdit(${index})" title="Edit">✏️</button>
                        <button class="btn-action delete" onclick="hapusAgen(${index})" title="Hapus">🗑️</button>
                    </div>
                </td>
            `;
            listBody.appendChild(tr);
        });
        cariAgen();
    }

    function cariAgen() {
        const input = document.getElementById('in_cari').value.toUpperCase();
        const tr = document.querySelectorAll("#list-agen tr");
        tr.forEach(row => {
            row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
        });
    }

    function prepareEdit(index) {
        const ag = currentAgenData[index];
        document.getElementById('title-form').innerText = "EDIT DATA AGEN";
        document.getElementById('edit_id').value = ag.id;
        document.getElementById('in_nama').value = ag.nama_agen;
        document.getElementById('in_alamat').value = ag.alamat;
        document.getElementById('in_tlp').value = ag.No_tlp;
        document.getElementById('in_type').value = ag.type_agen || "NORMAL";
        document.getElementById('in_saldo').value = ag.saldo_bon;
        
        const btnAksi = document.getElementById('btn-aksi');
        btnAksi.innerText = "UPDATE DATA AGEN";
        btnAksi.style.background = "#2ecc71";
        document.getElementById('btn-batal').style.display = "block";
    }

    async function simpanAgen() {
        const id = document.getElementById('edit_id').value;
        const payload = {
            nama_agen: document.getElementById('in_nama').value,
            alamat: document.getElementById('in_alamat').value.toUpperCase(),
            No_tlp: parseInt(document.getElementById('in_tlp').value) || 0,
            type_agen: document.getElementById('in_type').value,
            saldo_bon: parseFloat(document.getElementById('in_saldo').value) || 0
        };

        if(!payload.nama_agen || !payload.alamat) return alert("Data wajib diisi!");

        const btnAksi = document.getElementById('btn-aksi');
        btnAksi.innerText = "MENYIMPAN...";

        let res;
        if(id) res = await _sb.from('agen').update(payload).eq('id', id);
        else res = await _sb.from('agen').insert([payload]);

        if(res.error) alert(res.error.message);
        else {
            resetForm();
            muatTabelAgen();
        }
        btnAksi.innerText = id ? "UPDATE DATA AGEN" : "SIMPAN DATA AGEN";
    }

    async function hapusAgen(index) {
        const ag = currentAgenData[index];
        if(confirm(`Hapus agen ${ag.nama_agen}?`)) {
            const { error } = await _sb.from('agen').delete().eq('id', ag.id);
            if(error) alert(error.message);
            else muatTabelAgen();
        }
    }

    function resetForm() {
        document.getElementById('title-form').innerText = "TAMBAH AGEN BARU";
        document.getElementById('edit_id').value = "";
        document.getElementById('in_nama').value = "";
        document.getElementById('in_alamat').value = "";
        document.getElementById('in_tlp').value = "";
        document.getElementById('in_type').value = "NORMAL";
        document.getElementById('in_saldo').value = "0";
        document.getElementById('btn-aksi').innerText = "SIMPAN DATA AGEN";
        document.getElementById('btn-aksi').style.background = "#3b4c64";
        document.getElementById('btn-batal').style.display = "none";
    }
</script>
</body>
</html>
