<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; margin: 0; padding: 15px; }
        .header { background: #1e272e; color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .welcome { margin-bottom: 15px; font-size: 14px; color: #555; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-card { 
            background: white; padding: 25px 15px; border-radius: 15px; text-align: center; 
            text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
        }
        .menu-card:active { transform: scale(0.95); background: #f9f9f9; }
        .icon { font-size: 30px; margin-bottom: 10px; }
        .btn-logout { width: 100%; margin-top: 20px; padding: 12px; background: #d63031; color: white; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: bold; }
    </style>
</head>
<body>

<div class="welcome">Selamat datang kembali, <b id="namaUser">Admin</b></div>

<div class="header">
    <h2 style="margin:0">SBR<span>digital</span> ADMIN</h2>
</div>

<div class="grid-menu">
    <a href="./bon.html" class="menu-card">
        <span class="icon">📝</span>
        BUAT BON BARU
    </a>

    <a href="./rekap_transaksi.html" class="menu-card">
        <span class="icon">📊</span>
        REKAP TRANSAKSI
    </a>

    <a href="./master_harga.html" class="menu-card">
        <span class="icon">💰</span>
        MASTER HARGA
    </a>

    <a href="./agen.html" class="menu-card">
        <span class="icon">👥</span>
        DATA AGEN
    </a>

    <a href="./kendaraan.html" class="menu-card">
        <span class="icon">🚛</span>
        ARMADA UNIT
    </a>

    <a href="./daftar.html" class="menu-card">
        <span class="icon">⚙️</span>
        KELOLA AKUN
    </a>
</div>

<button class="btn-logout" onclick="logout()">LOGOUT / KELUAR</button>

<script>
    // Cek Sesi & Nama
    const userNama = localStorage.getItem("userNama");
    const userRole = localStorage.getItem("userRole");

    if (!userNama || userRole !== 'admin') {
        window.location.replace("index.html");
    } else {
        document.getElementById('namaUser').innerText = userNama;
    }

    function logout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>
</body>
</html>
