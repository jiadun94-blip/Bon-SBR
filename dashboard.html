<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBRdigital | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background: #f1f2f6; margin: 0; padding: 15px; }
        .welcome { margin-bottom: 10px; font-size: 14px; color: #666; text-align: center; }
        .header { background: #1e272e; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h2 span { color: #72a339; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-menu { 
            background: white; padding: 20px 10px; border-radius: 15px; text-align: center; 
            text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-menu:active { transform: scale(0.95); background: #f9f9f9; }
        .icon { font-size: 32px; margin-bottom: 8px; }
        
        .btn-logout { width: 100%; margin-top: 25px; padding: 15px; background: #d63031; color: white; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="welcome">Selamat datang kembali, <b id="adminNama">Admin</b> (SBR Putra Food)</div>

<div class="header">
    <h2 style="margin:0; letter-spacing: 2px;">SBR<span>digital</span> ADMIN</h2>
</div>

<div class="grid-menu">
    <a href="./bon.html" class="btn-menu">
        <span class="icon">📝</span> BUAT BON
    </a>
    <a href="./rekap_transaksi.html" class="btn-menu">
        <span class="icon">📊</span> REKAP DATA
    </a>
    <a href="./master_harga.html" class="btn-menu">
        <span class="icon">💰</span> HARGA AGEN
    </a>
    <a href="./monitoring_kendaraan.html" class="btn-menu">
        <span class="icon">🔧</span> MONITORING
    </a>
    <a href="./agen.html" class="btn-menu">
        <span class="icon">👥</span> DATA AGEN
    </a>
    <a href="./kendaraan.html" class="btn-menu">
        <span class="icon">🚛</span> DATA UNIT
    </a>
    <a href="./daftar.html" class="btn-menu">
        <span class="icon">⚙️</span> KELOLA AKUN
    </a>
    <a href="./riwayat.html" class="btn-menu">
        <span class="icon">📋</span> SEMUA KIRIM
    </a>
</div>

<button class="btn-logout" onclick="logout()">LOGOUT / KELUAR</button>

<script>
    const userNama = localStorage.getItem("userNama");
    const userRole = localStorage.getItem("userRole");

    if (!userNama || userRole !== 'admin') {
        window.location.replace("index.html");
    } else {
        document.getElementById('adminNama').innerText = userNama;
    }

    function logout() {
        localStorage.clear();
        window.location.replace("index.html");
    }
</script>
</body>
</html>
