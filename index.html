<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SBR Putra Food</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Roboto Condensed -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Roboto Condensed', sans-serif;
            background: url('bg1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.45); z-index: 1;
        }
        .login-card {
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px; border-radius: 20px;
            width: 350px; text-align: center; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 { font-size: 38px; margin-bottom: 40px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Floating Label CSS */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%; padding: 14px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px; color: white; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute; left: 14px; top: 14px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s ease all;
            pointer-events: none;
            font-size: 16px;
        }
        /* Efek saat klik/fokus atau saat input ada isinya */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -22px; left: 5px; font-size: 13px; color: #fff; font-weight: bold;
        }
        .input-group input:focus { border-color: #72a339; background: rgba(255, 255, 255, 0.2); }

        .btn-login {
            width: 100%; padding: 14px; background: #5a822d;
            border: none; border-radius: 10px; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: 0.3s ease; text-transform: uppercase;
        }
        .btn-login:hover { background: #72a339; transform: translateY(-2px); }
        
        .extra-options {
            margin-top: 20px; display: flex; justify-content: space-between;
            font-size: 13px; color: rgba(255, 255, 255, 0.8);
        }
        .extra-options a { color: inherit; text-decoration: none; cursor: pointer; }
        .extra-options a:hover { text-decoration: underline; }

        .signup-text {
            margin-top: 35px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        .signup-link { color: #fff; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-card">
    <h2>Log In</h2>
    
    <div class="input-group">
        <input type="text" id="userLogin" placeholder=" " required>
        <label>E-mail / Username</label>
    </div>
    
    <div class="input-group">
        <input type="password" id="passLogin" placeholder=" " required>
        <label>Password</label>
    </div>

    <button class="btn-login" onclick="doLogin()">Log in</button>

    <div class="extra-options">
        <label style="cursor: pointer;">
            <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a onclick="resetPass()">Forgotten password?</a>
    </div>

    <div class="signup-text">
        Belum punya akun? <br>
        <span class="signup-link" onclick="daftar()">Daftar Akun Baru</span>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Cek fitur "Remember Me" saat halaman dimuat
    window.onload = () => {
        const savedUser = localStorage.getItem("rememberedUser");
        if(savedUser) {
            document.getElementById('userLogin').value = savedUser;
            document.getElementById('rememberMe').checked = true;
        }
    }

    async function doLogin() {
        const u = document.getElementById('userLogin').value;
        const p = document.getElementById('passLogin').value;
        const remember = document.getElementById('rememberMe').checked;

        if(!u || !p) return alert("Mohon lengkapi data!");

        const { data, error } = await supabaseClient
            .from('karyawan')
            .select('*')
            .eq('nama_karyawan', u)
            .eq('aktif', true)
            .single();

        if (error || !data) {
            alert("Akun tidak ditemukan atau tidak aktif!");
        } else {
            // Proses Remember Me
            if(remember) {
                localStorage.setItem("rememberedUser", u);
            } else {
                localStorage.removeItem("rememberedUser");
            }

            // Simpan sesi login
            localStorage.setItem("userNama", data.nama_karyawan);
            window.location.href = "bon.html";
        }
    }

    function resetPass() {
        const email = prompt("Masukkan Username/Email Anda untuk reset password:");
        if(email) {
            alert("Permintaan reset password telah dikirim ke Admin. Silakan tunggu konfirmasi.");
        }
    }

    function daftar() {
    window.location.href = "daftar.html";

    }
</script>

</body>
</html>
