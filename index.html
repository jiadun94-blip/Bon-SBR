<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SBR Putra Food</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Roboto Condensed', sans-serif;
            background: #1e272e url('bg1.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }
        .login-card {
            position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 20px;
            width: 90%; max-width: 380px; text-align: center; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 { font-size: 32px; margin-bottom: 30px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
        h2 span { color: #72a339; }

        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group input {
            width: 100%; padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; color: white; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute; left: 15px; top: 15px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s ease all;
            pointer-events: none;
        }
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -22px; left: 5px; font-size: 13px; color: #fff; font-weight: bold;
        }
        .input-group input:focus { border-color: #72a339; background: rgba(255, 255, 255, 0.25); }

        .btn-login {
            width: 100%; padding: 15px; background: #5a822d;
            border: none; border-radius: 12px; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-login:hover { background: #72a339; transform: translateY(-2px); }
        .btn-login:active { transform: scale(0.98); }
        
        .extra {
            margin-top: 15px; display: flex; justify-content: space-between;
            font-size: 14px; color: rgba(255, 255, 255, 0.8);
        }

        .signup-area {
            margin-top: 30px; padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        .link { color: #fff; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-card">
    <h2>SBR<span>digital</span></h2>
    
    <div class="input-group">
        <input type="text" id="userLogin" placeholder=" " required autocomplete="off">
        <label>Nama Karyawan</label>
    </div>
    
    <div class="input-group">
        <input type="password" id="passLogin" placeholder=" " required>
        <label>Password</label>
    </div>

    <button class="btn-login" id="btnLogin" onclick="handleLogin()">Masuk Ke Sistem</button>

    <div class="extra">
        <label style="cursor: pointer;">
            <input type="checkbox" id="rememberMe"> Ingat Saya
        </label>
        <span class="link" onclick="forgot()">Lupa Sandi?</span>
    </div>

    <div class="signup-area">
        Belum terdaftar? <span class="link" onclick="location.href='daftar.html'">Daftar Sekarang</span>
    </div>
</div>

<script>
    // DATA KONEKSI SUPABASE PAK HADIAT
    const SB_URL = "https://yxcxvkairftqzmptkorr.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4Y3h2a2FpcmZ0cXptcHRrb3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTA0OTMsImV4cCI6MjA5MzM2NjQ5M30.t1l-EbUrTW_mz4sQfWG3vr6RER2_rdp3cSkfKWigGUs";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    window.onload = () => {
        const saved = localStorage.getItem("rememberedUser");
        if(saved) {
            document.getElementById('userLogin').value = saved;
            document.getElementById('rememberMe').checked = true;
        }
    }

    async function handleLogin() {
        const btn = document.getElementById('btnLogin');
        const user = document.getElementById('userLogin').value.trim();
        const pass = document.getElementById('passLogin').value;
        const remember = document.getElementById('rememberMe').checked;

        if(!user || !pass) return alert("Harap isi Nama dan Password!");

        btn.innerText = "Mengecek...";
        btn.disabled = true;

        try {
            const { data, error } = await supabaseClient
                .from('karyawan')
                .select('*')
                .eq('nama_karyawan', user)
                .single();

            if (error || !data) throw new Error("Nama Karyawan tidak ditemukan!");
            if (!data.aktif) throw new Error("Akun Anda sedang dinonaktifkan!");
            if (data.password !== pass) throw new Error("Password salah!");

            // SIMPAN SESI
            localStorage.setItem("userNama", data.nama_karyawan);
            localStorage.setItem("userRole", data.role);
            
            if(remember) localStorage.setItem("rememberedUser", user);
            else localStorage.removeItem("rememberedUser");

            alert("Selamat datang, " + data.nama_karyawan + "!");

            // LOGIKA REDIRECT BERDASARKAN ROLE
            if (data.role === 'admin') {
                window.location.href = "dashboard.html";
            } else {
                // Ke bon.html untuk Driver atau User biasa
                window.location.href = "dashboard_driver.html";
            }

        } catch (err) {
            alert(err.message);
            btn.innerText = "Masuk Ke Sistem";
            btn.disabled = false;
        }
    }

    function forgot() {
        alert("Silakan hubungi Pak Mpang (Admin Utama) untuk reset password Anda.");
    }
</script>

</body>
</html>
