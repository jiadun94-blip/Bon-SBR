<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBR Putra Food - Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #2c3e50; --s-color: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #000; font-size: 18px; }
        .container { background: white; padding: 12px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        header h2 { text-align: center; margin: 0 0 15px; color: #1a202c; font-size: 25px; text-transform: uppercase; font-weight: 900; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .info-grid select, .info-grid input { width: 100%; padding: 12px 8px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; font-weight: 700; color: #000; }
        
        .section-label { font-size: 18px; font-weight: 900; padding: 10px; background: #1a202c; color: white; border-radius: 6px; margin: 15px 0 8px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 5px; }
        th { font-size: 15px; text-align: left; padding: 8px 5px; background: #edf2f7; border-bottom: 2px solid #cbd5e0; font-weight: 900; }
        td { padding: 8px 5px; border-bottom: 1px solid #e2e8f0; font-size: 17px; font-weight: 700; }
        
        .btn-action { background: #4a5568; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 900; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .form-group label { display: block; font-weight: 900; margin-bottom: 5px; font-size: 16px; }
        .form-group select, .form-group input { width: 100%; padding: 12px; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 19px; font-weight: 700; box-sizing: border-box; }

        .sub-display { background: #f8fafc; padding: 10px; font-size: 18px; font-weight: 900; text-align: right; border: 2px solid #cbd5e0; border-top: none; display: flex; justify-content: space-between; }
        .pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #e2e8f0; padding: 12px; border-radius: 10px; }
        .input-manual { width: 100%; padding: 12px; border: 2px solid #4a5568; border-radius: 8px; font-weight: 900; text-align: right; box-sizing: border-box; font-size: 23px; background: #fff; }
        
        .summary-box { background: #1a202c; padding: 18px; border-radius: 12px; margin-top: 15px; color: white; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 19px; }
        
        .btn-save { width: 100%; padding: 20px; border: none; border-radius: 12px; font-weight: 900; color: white; background: #27ae60; margin-top: 20px; font-size: 21px; text-transform: uppercase; box-shadow: 0 5px 0 #1e8449; cursor: pointer; }

        @media print {
            @page { size: auto; margin: 80; }
            .no-print, .modal, .btn-save, #noticeTunggakan { display: none !important; }
            .print-area { display: block !important; width: 100%; padding: 15px; font-family: 'Roboto Mono', monospace !important; font-size: 22px; }
            .dashed { border-top: 2px dashed #000; margin: 10px 0; }
            .p-title { font-weight: 900; font-size: 28px; text-align: center; }
            .p-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
            .p-grand { border-top: 2px solid #000; border-bottom: 4px double #000; font-size: 26px; padding: 8px 0; margin-top: 10px; font-weight: 900; }
        }
        .print-area { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print"><h2>SBR PUTRA FOOD</h2></header>
    
    <div class="info-grid no-print">
        <input type="text" id="noNota" readonly>
        <input type="date" id="tglNota">
        <select id="pilihAgen" onchange="updateBon()"><option value="">-- AGEN --</option></select>
        <select id="driver1"><option value="">-- DRIVER 1 --</option></select>
        <select id="pilihMobil"><option value="">-- MOBIL --</option></select>
        <select id="driver2"><option value="">-- DRIVER 2 --</option></select>
    </div>

    <div class="no-print">
        <div class="section-label"><span>📦 KIRIM :</span><button class="btn-action" style="background:#27ae60" onclick="openModal('Kirim')">+ ITEM</button></div>
        <table id="tabelKirim"><thead><tr><th>BARANG</th><th>QTY</th><th>TOTAL</th><th>#</th></tr></thead><tbody></tbody></table>
        <div class="sub-display"><span>SUBTOTAL:</span><span id="subKirim">Rp 0</span></div>

        <div class="section-label"><span>🔄 RETUR :</span><button class="btn-action" style="background:#e67e22" onclick="openModal('Retur')">+ ITEM</button></div>
        <table id="tabelRetur"><thead><tr><th>BARANG</th><th>QTY</th><th>TOTAL</th><th>#</th></tr></thead><tbody></tbody></table>
        <div class="sub-display"><span>SUBTOTAL:</span><span id="subRetur">Rp 0</span></div>

        <div class="section-label">💵 PEMBAYARAN :</div>
        <div class="pay-row">
            <div><label style="font-size:14px; font-weight:900;">CASH</label><input type="text" id="inputCash" class="input-manual" value="0" oninput="formatRupiah(this); hitungTotal()" onfocus="clearZero(this)"></div>
            <div><label style="font-size:14px; font-weight:900;">TRANSFER</label><input type="text" id="inputTrf" class="input-manual" value="0" oninput="formatRupiah(this); hitungTotal()" onfocus="clearZero(this)"></div>
        </div>
        <div style="margin-top:10px; background:#fffaf0; padding:10px; border-radius:10px; border:2px solid #ed8936;">
            <label style="font-size:14px; font-weight:900;">BON LAMA</label>
            <input type="text" id="inputBonLama" class="input-manual" style="background:transparent; border:none;" value="0" oninput="formatRupiah(this); hitungTotal()" onfocus="clearZero(this)">
        </div>
    </div>

    <div class="summary-box no-print">
        <div class="sum-row"><span>SISA AKHIR:</span><span id="txtGrand" style="font-weight:900; color:#fc8181">Rp 0</span></div>
    </div>
    
    <button class="btn-save no-print" id="btnSimpan" onclick="simpanData()">SIMPAN & PRINT</button>

    <div id="modalInput" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Barang</h3>
            <div class="form-group"><label>Barang</label><select id="modalBarang"><option value="">-- Pilih Barang --</option></select></div>
            <div class="form-group"><label>Satuan</label><select id="modalSatuan"><option>Ball</option><option>Pack</option><option>Pcs</option></select></div>
            <div class="form-group"><label>Qty</label><input type="number" id="modalQty" value="0" onfocus="clearZero(this)"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button class="btn-action" style="background:#cbd5e0; color:black; padding:15px;" onclick="closeModal()">BATAL</button>
                <button class="btn-action" style="background:#27ae60; padding:15px;" onclick="addItem()">TAMBAH</button>
            </div>
        </div>
    </div>

    <div class="print-area">
        <div class="p-title">SBR PUTRA FOOD</div>
        <div style="text-align:center">Lembang, Bandung Barat</div><div class="dashed"></div>
        <div class="p-row"><span>NO: <span id="p-nota"></span></span><span><span id="p-tgl"></span></span></div>
        <div id="p-agen" style="font-weight:900; text-align:center; font-size:24px; margin:5px 0;"></div>
        <div id="p-drv" style="text-align:center; font-size:18px;"></div><div class="dashed"></div>
        
        <div id="print-items-kirim"></div>
        <div id="print-items-retur"></div><div class="dashed"></div>
        
        <div class="p-row"><span>Kirim:</span><span id="p-tk"></span></div>
        <div class="p-row"><span>Retur:</span><span id="p-tr"></span></div>
        <div class="p-row"><span>Bon Lama:</span><span id="p-sb"></span></div>
        
        <div class="dashed"></div>
        <div class="p-row" style="font-weight:900"><span>TOTAL TAGIHAN:</span><span id="p-tt"></span></div>
        <div class="dashed"></div>

        <div class="p-row"><span>Bayar CASH:</span><span id="p-byr-cash"></span></div>
        <div class="p-row"><span>Bayar TRF:</span><span id="p-byr-trf"></span></div>
        <div class="p-row p-grand"><span>SISA AKHIR:</span><span id="p-gt"></span></div>
        <div style="text-align:center; margin-top:30px">*** TERIMA KASIH ***</div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyA7m3C3oQia1eS3ui8fU870Q1_NTXg-_1wMlJlysLDsRoVNLN10zisLpEU0CDFlBY/exec"; // Masukkan URL GAS Anda
    
    let database = { harga: {}, barang: [], karyawan: [], kendaraan: [] };
    let itemsKirim = []; let itemsRetur = []; let currentMode = 'Kirim';

    function clearZero(el) { if(el.value === "0") el.value = ""; }

    async function init() {
        try {
            const r = await fetch(webAppUrl); 
            const d = await r.json();
            d.barang.forEach(x => database.barang.push(x[1]));
            d.agen.forEach(x => { 
                document.getElementById('pilihAgen').options.add(new Option(x[0], x[0])); 
                database.harga[x[0]] = { "bon": x[3] || 0 }; 
            });
            d.harga.forEach(x => { 
                if(!database.harga[x[0]]) database.harga[x[0]] = {}; 
                database.harga[x[0]][`${x[1]}_${x[2]}`] = x[3]; 
            });
            d.karyawan.forEach(x => { 
                document.getElementById('driver1').options.add(new Option(x[0],x[0])); 
                document.getElementById('driver2').options.add(new Option(x[0],x[0])); 
            });
            d.kendaraan.forEach(x => document.getElementById('pilihMobil').options.add(new Option(x[0],x[0])));
            database.barang.forEach(b => document.getElementById('modalBarang').options.add(new Option(b, b)));
            resetForm();
        } catch(e) { console.log("Init Error"); }
    }

    function resetForm() {
        document.getElementById('tglNota').valueAsDate = new Date();
        document.getElementById('noNota').value = "SBR" + Date.now().toString().slice(-6);
        document.getElementById('inputCash').value = "0";
        document.getElementById('inputTrf').value = "0";
        document.getElementById('inputBonLama').value = "0";
        itemsKirim = []; itemsRetur = []; render(); hitungTotal();
    }

    function openModal(mode) { 
        if(!document.getElementById('pilihAgen').value) return alert("Pilih Agen!");
        currentMode = mode; 
        document.getElementById('modalQty').value = "0";
        document.getElementById('modalInput').style.display = "block"; 
    }
    function closeModal() { document.getElementById('modalInput').style.display = "none"; }

    function addItem() {
        const b = document.getElementById('modalBarang').value;
        const s = document.getElementById('modalSatuan').value;
        const q = parseFloat(document.getElementById('modalQty').value) || 0;
        const ag = document.getElementById('pilihAgen').value;
        if(!b || q <= 0) return alert("Cek data!");
        const h = database.harga[ag]?.[`${b}_${s}`] || 0;
        const it = { barang: b, satuan: s, qty: q, harga: h, total: q * h };
        if(currentMode === 'Kirim') itemsKirim.push(it); else itemsRetur.push(it);
        render(); closeModal(); hitungTotal();
    }

    function render() {
        const draw = (data, id, mode) => {
            const tb = document.getElementById(id).querySelector('tbody'); tb.innerHTML = '';
            data.forEach((it, idx) => {
                const r = tb.insertRow();
                r.innerHTML = `<td>${it.barang}<br><small>${it.satuan}@${it.harga.toLocaleString()}</small></td>
                               <td>${it.qty}</td><td>${it.total.toLocaleString()}</td>
                               <td><button class="btn-action" style="background:#e74c3c" onclick="delItem(${idx},'${mode}')">x</button></td>`;
            });
        };
        draw(itemsKirim, 'tabelKirim', 'Kirim'); draw(itemsRetur, 'tabelRetur', 'Retur');
    }

    function delItem(i, m) { if(m==='Kirim') itemsKirim.splice(i,1); else itemsRetur.splice(i,1); render(); hitungTotal(); }

    function formatRupiah(el) { 
        let v = el.value.replace(/[^0-9]/g, ''); 
        el.value = v === "" ? "0" : Number(v).toLocaleString('id-ID'); 
    }

    function getAngka(id) { return parseFloat(document.getElementById(id).value.replace(/[^0-9]/g, '')) || 0; }

    function updateBon() {
        const ag = document.getElementById('pilihAgen').value;
        document.getElementById('inputBonLama').value = (database.harga[ag]?.bon || 0).toLocaleString('id-ID');
        hitungTotal();
    }

    function hitungTotal() {
        const tk = itemsKirim.reduce((a, b) => a + b.total, 0);
        const tr = itemsRetur.reduce((a, b) => a + b.total, 0);
        const bl = getAngka('inputBonLama');
        const cs = getAngka('inputCash');
        const tf = getAngka('inputTrf');
        document.getElementById('subKirim').innerText = "Rp " + tk.toLocaleString('id-ID');
        document.getElementById('subRetur').innerText = "Rp " + tr.toLocaleString('id-ID');
        document.getElementById('txtGrand').innerText = "Rp " + (tk - tr + bl - cs - tf).toLocaleString('id-ID');
    }

    async function simpanData() {
        const btn = document.getElementById('btnSimpan');
        const ag = document.getElementById('pilihAgen').value;
        if(!ag) return alert("Pilih Agen!");

        // Mapping Data Ke Print
        const tk = itemsKirim.reduce((a, b) => a + b.total, 0);
        const tr = itemsRetur.reduce((a, b) => a + b.total, 0);
        const bl = getAngka('inputBonLama');
        const cs = getAngka('inputCash');
        const tf = getAngka('inputTrf');

        document.getElementById('p-nota').innerText = document.getElementById('noNota').value;
        document.getElementById('p-tgl').innerText = document.getElementById('tglNota').value;
        document.getElementById('p-agen').innerText = ag.toUpperCase();
        document.getElementById('p-drv').innerText = document.getElementById('driver1').value + " [" + document.getElementById('pilihMobil').value + "]";
        
        let hK = ""; itemsKirim.forEach(i => hK += `<div class="p-row"><span>${i.barang} (${i.qty}${i.satuan})</span><span>${i.total.toLocaleString()}</span></div>`);
        let hR = ""; itemsRetur.forEach(i => hR += `<div class="p-row" style="color:red"><span>[R] ${i.barang}</span><span>-${i.total.toLocaleString()}</span></div>`);
        
        document.getElementById('print-items-kirim').innerHTML = hK;
        document.getElementById('print-items-retur').innerHTML = hR;
        document.getElementById('p-tk').innerText = "Rp " + tk.toLocaleString();
        document.getElementById('p-tr').innerText = "Rp " + tr.toLocaleString();
        document.getElementById('p-sb').innerText = "Rp " + bl.toLocaleString();
        document.getElementById('p-tt').innerText = "Rp " + (tk - tr + bl).toLocaleString(); // Total Tagihan
        document.getElementById('p-byr-cash').innerText = "Rp " + cs.toLocaleString();
        document.getElementById('p-byr-trf').innerText = "Rp " + tf.toLocaleString();
        document.getElementById('p-gt').innerText = document.getElementById('txtGrand').innerText;

        try {
            btn.innerText = "MENYIMPAN..."; btn.disabled = true;
            await fetch(webAppUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ noNota: document.getElementById('noNota').value, agen: ag, kirim: itemsKirim, retur: itemsRetur, cash: cs, trf: tf, total: document.getElementById('txtGrand').innerText })
            });
            window.print();
            location.reload(); 
        } catch(e) {
            alert("Gagal Simpan.");
            btn.innerText = "SIMPAN & PRINT"; btn.disabled = false;
        }
    }

    window.onload = init;
</script>
</body>
</html>
