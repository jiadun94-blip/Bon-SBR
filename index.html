<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBR Putra Food - Order System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p-color: #2c3e50; --s-color: #27ae60; --bg: #f4f7f9; }
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #000; }
        .container { background: white; padding: 12px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        header h2 { text-align: center; margin: 0 0 15px; color: #1a202c; font-size: 22px; text-transform: uppercase; font-weight: 900; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .info-grid select, .info-grid input { width: 100%; padding: 12px 8px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 15px; box-sizing: border-box; outline: none; font-weight: 700; color: #000; }
        
        .section-label { font-size: 15px; font-weight: 900; padding: 10px; background: #1a202c; color: white; border-radius: 6px; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { font-size: 13px; text-align: left; padding: 10px 2px; background: #edf2f7; border-bottom: 3px solid #cbd5e0; font-weight: 900; color: #2d3748; }
        td { padding: 6px 1px; border-bottom: 1px solid #e2e8f0; }
        
        /* PENYESUAIAN LEBAR KOLOM */
        .col-qty { width: 50px; }   /* Tetap */
        .col-sat { width: 52px; }   /* Dikurangi 20% (dari 65px ke 52px) */
        .col-tot { width: 105px; }  /* Tetap */
        /* Kolom Barang (sisa dari total lebar) akan otomatis melebar */
        
        .qty-in { width: 100%; padding: 10px 2px; text-align: center; border: 2px solid #a0aec0; border-radius: 6px; font-size: 18px; box-sizing: border-box; font-weight: 900; color: #000; background: #fff; }
        .select-barang { width: 100%; padding: 10px 2px; font-size: 15px; border-radius: 6px; border: 2px solid #a0aec0; box-sizing: border-box; font-weight: 700; color: #000; background: #fff; }
        
        /* Font Satuan disesuaikan sedikit agar pas di kolom sempit */
        .select-satuan { width: 100%; padding: 10px 0; font-size: 13px; border-radius: 6px; border: 2px solid #a0aec0; font-weight: 700; color: #000; text-align: center; }
        
        .input-read { width: 100%; border: none; background: transparent; text-align: right; font-size: 16px; font-weight: 900; color: #000; }

        .sub-display { background: #f8fafc; padding: 8px 12px; font-size: 15px; font-weight: 900; text-align: right; border: 2px solid #cbd5e0; border-top: none; border-radius: 0 0 8px 8px; display: flex; justify-content: space-between; margin-bottom: 10px; color: #000; }

        .pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #e2e8f0; padding: 12px; border-radius: 10px; }
        .pay-item label { font-size: 12px; font-weight: 900; margin-bottom: 5px; display: block; color: #1a202c; }
        .input-manual { width: 100%; padding: 12px; border: 2px solid #4a5568; border-radius: 8px; font-weight: 900; text-align: right; box-sizing: border-box; font-size: 20px; color: #000; background: #fff; }

        .summary-box { background: #1a202c; padding: 18px; border-radius: 12px; margin-top: 15px; color: white; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .grand-total { border-top: 2px dashed #4a5568; margin-top: 12px; padding-top: 12px; font-weight: 900; color: #fc8181; font-size: 20px; }
        
        .btn-save { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; color: white; background: #27ae60; margin-top: 20px; font-size: 18px; text-transform: uppercase; box-shadow: 0 5px 0 #1e8449; }
        .btn-save:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e8449; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <h2>SBR PUTRA FOOD</h2>
    </header>

    <div class="info-grid no-print">
        <input type="text" id="noNota" readonly>
        <input type="date" id="tglNota">
        <select id="pilihAgen" onchange="updateBon()"><option value="">-- PILIH AGEN --</option></select>
        <select id="driver1"><option value="">-- DRIVER 1 --</option></select>
        <select id="pilihMobil"><option value="">-- MOBIL --</option></select>
        <select id="driver2"><option value="">-- DRIVER 2 --</option></select>
    </div>

    <div id="noticeTunggakan" class="no-print" style="display:none; background:#fff5f5; color:#c53030; padding:12px; border-radius:8px; border:3px solid #fc8181; margin-bottom:12px; font-weight:900; font-size:14px; text-align:center;"></div>

    <div class="no-print">
        <div class="section-label">📦 BARANG DIKIRIM :</div>
        <div class="table-scroll">
            <table id="tabelKirim">
                <thead><tr><th class="col-qty">QTY</th><th>BARANG</th><th class="col-sat">SAT</th><th class="col-tot">TOTAL</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="sub-display"><span>SUBTOTAL:</span><span id="subKirim">Rp 0</span></div>
        
        <div class="section-label">🔄 BARANG RETUR :</div>
        <div class="table-scroll">
            <table id="tabelRetur">
                <thead><tr><th class="col-qty">QTY</th><th>BARANG</th><th class="col-sat">SAT</th><th class="col-tot">TOTAL</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="sub-display"><span>SUBTOTAL:</span><span id="subRetur">Rp 0</span></div>
        
        <div class="section-label">💵 PEMBAYARAN :</div>
        <div class="pay-row">
            <div class="pay-item">
                <label>TUNAI / CASH</label>
                <input type="text" id="inputCash" class="input-manual" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatRupiah(this); hitungTotal()">
            </div>
            <div class="pay-item">
                <label>TRANSFER</label>
                <input type="text" id="inputTrf" class="input-manual" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatRupiah(this); hitungTotal()">
            </div>
        </div>

        <div class="section-label">📄 BON LAMA :</div>
        <div style="background:#fffaf0; padding:12px; border-radius:10px; border:3px solid #ed8936;">
            <input type="text" id="inputBonLama" class="input-manual" style="background:transparent; border:none; padding:0; height:auto; color:#744210;" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="formatRupiah(this); hitungTotal()">
        </div>
    </div>

    <div class="summary-box no-print">
        <div class="sum-row"><span>Total Kirim:</span><span id="txtKirim">Rp 0</span></div>
        <div class="sum-row"><span>Total Retur:</span><span id="txtRetur">Rp 0</span></div>
        <div class="sum-row"><span>Bon Sebelumnya:</span><span id="txtBon">Rp 0</span></div>
        <div class="sum-row grand-total"><span>SISA AKHIR:</span><span id="txtGrand">Rp 0</span></div>
    </div>

    <button class="btn-save no-print" onclick="simpanDanOtomatisPrint()">SIMPAN & PRINT</button>
</div>

<script>
    // Script Logika tetap utuh
    const webAppUrl = "https://script.google.com/macros/s/AKfycbyA7m3C3oQia1eS3ui8fU870Q1_NTXg-_1wMlJlysLDsRoVNLN10zisLpEU0CDFlBY/exec";
    let database = { harga: {}, barang: [], karyawan: [], kendaraan: [] };

    async function init() {
        try {
            const r = await fetch(webAppUrl);
            const d = await r.json();
            database.barang = d.barang.map(x => x[1]);
            database.karyawan = d.karyawan.map(x => x[0]);
            database.kendaraan = d.kendaraan.map(x => x[0]);
            const sAgen = document.getElementById('pilihAgen');
            d.agen.forEach(x => { 
                sAgen.options.add(new Option(x[0], x[0])); 
                database.harga[x[0]] = { "bon": x[3] || 0 }; 
            });
            d.harga.forEach(x => { 
                if(!database.harga[x[0]]) database.harga[x[0]] = {}; 
                database.harga[x[0]][`${x[1]}_${x[2]}`] = x[3]; 
            });
            database.karyawan.forEach(x => { 
                document.getElementById('driver1').options.add(new Option(x,x)); 
                document.getElementById('driver2').options.add(new Option(x,x)); 
            });
            database.kendaraan.forEach(x => document.getElementById('pilihMobil').options.add(new Option(x,x)));
            const skrg = new Date(); document.getElementById('tglNota').valueAsDate = skrg;
            document.getElementById('noNota').value = "SBR-" + skrg.getTime().toString().slice(-6);
            tambahBaris('tabelKirim'); tambahBaris('tabelRetur');
        } catch(e) { console.error(e); }
    }

    function formatRupiah(el) {
        let val = el.value.replace(/[^0-9]/g, '');
        el.value = val === "" ? "0" : Number(val).toLocaleString('id-ID');
    }

    function getAngka(id) {
        let val = document.getElementById(id).value.replace(/[^0-9]/g, '');
        return parseFloat(val) || 0;
    }

    function tambahBaris(id) {
        const tb = document.getElementById(id).querySelector('tbody');
        const r = tb.insertRow();
        r.innerHTML = `
            <td class="col-qty"><input type="number" class="qty-in" value="0" onfocus="if(this.value=='0')this.value=''" onblur="if(this.value=='')this.value='0'" oninput="hitungTotal()"></td>
            <td><select class="select-barang" onchange="if(this.value!='') tambahBaris('${id}'); hitungTotal();"><option value="">--Pilih--</option>${database.barang.map(b=>`<option>${b}</option>`).join('')}</select></td>
            <td class="col-sat"><select class="select-satuan" onchange="hitungTotal()"><option>Ball</option><option>Pack</option><option>Pcs</option></select></td>
            <td class="col-tot"><input type="text" class="input-read" readonly value="0"></td>
        `;
    }

    function updateBon() {
        const ag = document.getElementById('pilihAgen').value;
        const bon = database.harga[ag]?.bon || 0;
        document.getElementById('inputBonLama').value = bon.toLocaleString('id-ID');
        document.getElementById('noticeTunggakan').style.display = bon > 0 ? "block" : "none";
        document.getElementById('noticeTunggakan').innerHTML = `⚠️ TUNGGAKAN: Rp ${bon.toLocaleString('id-ID')}`;
        hitungTotal();
    }

    function hitungTotal() {
        const agen = document.getElementById('pilihAgen').value;
        const hitung = (tId) => {
            let total = 0;
            document.querySelectorAll(`#${tId} tbody tr`).forEach(r => {
                const q = parseFloat(r.cells[0].querySelector('input').value) || 0;
                const b = r.cells[1].querySelector('select').value;
                const s = r.cells[2].querySelector('select').value;
                const h = database.harga[agen]?.[`${b}_${s}`] || 0;
                const jml = q * h;
                r.cells[3].querySelector('input').value = jml.toLocaleString('id-ID');
                total += jml;
            });
            return total;
        };
        const tk = hitung('tabelKirim');
        const tr = hitung('tabelRetur');
        const bl = getAngka('inputBonLama'), cs = getAngka('inputCash'), tf = getAngka('inputTrf');
        
        document.getElementById('subKirim').innerText = "Rp " + tk.toLocaleString('id-ID');
        document.getElementById('subRetur').innerText = "Rp " + tr.toLocaleString('id-ID');
        document.getElementById('txtKirim').innerText = "Rp " + tk.toLocaleString('id-ID');
        document.getElementById('txtRetur').innerText = "Rp " + tr.toLocaleString('id-ID');
        document.getElementById('txtBon').innerText = "Rp " + bl.toLocaleString('id-ID');
        document.getElementById('txtGrand').innerText = "Rp " + ((tk - tr + bl) - (cs + tf)).toLocaleString('id-ID');
    }

    async function simpanDanOtomatisPrint() {
        alert("Menyimpan data...");
    }

    window.onload = init;
</script>
</body>
</html>
